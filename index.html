const getNextSeries=(code)=>{
  const CYCLE=["H","M","U","Z"];
  const m=code.match(/^([A-Za-z0-9]+?)([HMUZ])(\d{2})$/);
  if(!m)return "";
  const ni=(CYCLE.indexOf(m[2])+1)%4;
  const ny=ni===0?((+m[3]+1)%100).toString().padStart(2,"0"):m[3];
  return m[1]+CYCLE[ni]+ny;
};

// ─── Google Sheets sync ───────────────────────────────────────────────────────
// Writes open positions to a public Google Sheet via Apps Script web app
// Sheet URL stored in localStorage key: tj_sheets_url
const sheetsSync={
  getUrl:()=>{try{return localStorage.getItem("tj_sheets_url")||"";}catch{return"";}},
  setUrl:(url)=>{try{localStorage.setItem("tj_sheets_url",url);}catch{}},
  async push(trades,products){
    const url=sheetsSync.getUrl();
    if(!url)return{ok:false,err:"no_url"};
    try{
      const open=(trades||[]).filter(t=>t.status==="open"&&t.entryPrice);
      const rows=open.map(t=>{
        const p=(products||[]).find(x=>x.id===t.productId);
        const posVal=p&&t.entryPrice?((p.contractSize||1)*t.entryPrice*(t.remainingContracts||t.contracts)):0;
        const margin=p?(p.initialMargin||0)*(t.remainingContracts||t.contracts):0;
        const sl=t.stopLoss||t.invalidation||null;
        const tp=t.takeProfit||t.target||null;
        const slTicks=sl&&p?Math.abs((t.entryPrice-sl)/p.tickSize):null;
        const tpTicks=tp&&p?Math.abs((tp-t.entryPrice)/p.tickSize):null;
        const rr=slTicks&&tpTicks&&slTicks>0?(tpTicks/slTicks):null;
        const slBaht=slTicks!=null&&p?slTicks*p.tickValue*(t.remainingContracts||t.contracts):null;
        return{
          symbol:t.contractCode||(p?p.currentContract:t.productId)||"",
          product:p?p.name:t.productId,
          side:t.direction||"",
          setup_type:t.setupType||"",
          contracts:t.remainingContracts||t.contracts||0,
          entry:t.entryPrice||0,
          stop_loss:sl||"",
          take_profit:tp||"",
          rr_ratio:rr?+rr.toFixed(2):"",
          sl_risk_baht:slBaht?+slBaht.toFixed(0):"",
          position_value:+posVal.toFixed(0),
          margin_used:+margin.toFixed(0),
          pre_note:t.preNote||"",
          rating:t.tradeRating||"",
          open_datetime:t.openDateTime||t.entryDate||"",
          gearing_limit:t.setupType?({"ประคองตลาด":2,"สวนเทรนด์":2,"Sideway":5,"Snow Ball":5,"Scalp":8,"Run-Trend":15,"Other":5}[t.setupType]||5):"","
        };
      });
      // Route through Netlify proxy to avoid CORS/redirect issues with Apps Script
      const proxyRes=await fetch("/.netlify/functions/sheets-proxy",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({url,action:"sync_positions",rows,ts:new Date().toISOString()}),
      });
      if(!proxyRes.ok)throw new Error("proxy "+proxyRes.status);
      return{ok:true,count:rows.length};
    }catch(e){return{ok:false,err:e.message};}
  },
};

const calcPL=(product,contracts,entryPrice,exitPrice,direction)=>{
  if(exitPrice==null||!product||!contracts||!entryPrice)return 0;
  const ticks=(exitPrice-entryPrice)/product.tickSize;
  return ticks*product.tickValue*contracts*(direction==="Long"?1:-1);
};
const getRoundTripComm=(p)=>{
  if(!p)return 0;
  const withVAT=p.vatEnabled?p.commissionPerLeg*(1+(p.vatRate||0.07)):p.commissionPerLeg;
  return withVAT*2;
};
const calcNetPL=(product,contracts,entryPrice,exitPrice,direction)=>{
  if(!product||exitPrice==null||!contracts||!entryPrice)return 0;
  return calcPL(product,contracts,entryPrice,exitPrice,direction)-getRoundTripComm(product)*contracts;
};
const calcPositionValue=(product,contracts,entryPrice)=>{
  if(!product||!entryPrice||!contracts)return 0;
  return contracts*product.contractSize*entryPrice;
};
const calcGearingX=(positionValue,balance)=>balance>0?(positionValue/balance):0;
const calcMargin=(product,contracts)=>product?(product.initialMargin||0)*contracts:0;

  if(n===undefined||n===null||isNaN(n))return"—";
  const abs=Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:dec,maximumFractionDigits:dec});
  return(n<0?"-":"")+abs;
};

const fmtDate=(dt)=>{if(!dt)return"—";try{const d=new Date(dt);const dd=String(d.getDate()).padStart(2,"0");const mm=String(d.getMonth()+1).padStart(2,"0");const yy=String(d.getFullYear()).slice(-2);return dd+"/"+mm+"/"+yy;}catch{return dt;}};

const fmtGearing=(g)=>{
  if(g===null||g===undefined||isNaN(g)||!isFinite(g))return"0.00X";
  return Number(g).toFixed(2)+"X";
};
const fmtCompact=(v)=>{
  if(v===null||v===undefined||isNaN(v))return"—";
  const abs=Math.abs(v);
  const sign=v<0?"-":(v>0?"+":"");
  if(abs>=1000000)return sign+(abs/1000000).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})+"m";
  if(abs>=100000)return sign+(abs/1000).toLocaleString("en-US",{minimumFractionDigits:0,maximumFractionDigits:0})+"K";
  return sign+abs.toLocaleString("en-US",{minimumFractionDigits:0,maximumFractionDigits:0});
};
const fmtRatio=(v,dec=2)=>{
  if(v===null||v===undefined||isNaN(v))return"—";

};
const gearingColor=(g)=>g>2?"text-red":g>1?"text-yellow":"text-green";
const duration=(a,b)=>{
  if(!a||!b)return"—";
  const d=Math.abs(new Date(b)-new Date(a));
  if(d<60000)return"< 1m";
  const totalMin=Math.floor(d/60000);
  const h=Math.floor(totalMin/60),m=totalMin%60;
  const days=Math.floor(h/24),remH=h%24;
  if(days>=30){const mo=Math.floor(days/30),remD=days%30;return remD>0?`${mo}mo ${remD}d`:`${mo}mo`;}
  if(days>=1)return remH>0?`${days}d ${remH}h`:`${days}d`;
  return h>0?`${h}h ${m}m`:`${m}m`;
};

function ImageUploader({images,onChange,maxImages=3,label="📎 แนบรูป"}){
  const inputRef=useRef();
  const handleFiles=async(e)=>{
    const files=Array.from(e.target.files||[]);
    if(!files.length)return;
    const remaining=maxImages-(images||[]).length;
    if(remaining<=0)return;
    const b64s=await Promise.all(files.slice(0,remaining).map(fileToBase64));
    onChange([...(images||[]),...b64s]);
    e.target.value="";
  };
  const remove=(i)=>onChange((images||[]).filter((_,idx)=>idx!==i));
  return(
    <div>
      <Label>{label} (สูงสุด {maxImages} รูป)</Label>
      <div className="flex flex-wrap gap-2">
        {(images||[]).map((src,i)=>(
          <div key={i} className="relative group">
            <img src={src} className="w-20 h-20 object-cover rounded-lg border border-border"/>
            <button type="button" onClick={()=>remove(i)}
              className="absolute -top-1.5 -right-1.5 w-5 h-5 rounded-full bg-red text-white text-xs flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">✕</button>
          </div>
        ))}
        {(images||[]).length<maxImages&&(
          <button type="button" onClick={()=>inputRef.current?.click()}
            className="w-20 h-20 rounded-lg border border-dashed border-border hover:border-yellow/50 text-muted hover:text-yellow text-2xl flex items-center justify-center transition-colors">+</button>
        )}
      </div>
      <input ref={inputRef} type="file" accept="image/*" multiple className="hidden" onChange={handleFiles}/>
    </div>
  );
}

function NotificationCenter({history,show,onClose,onMarkRead,onMarkAllRead,onDeleteAll,onDeleteOne}){
  if(!show)return null;
  const typeAccent={danger:"#F6465D",warn:"#F0B90B",info:"#0ECB81"};
  const typeBg={danger:"rgba(246,70,93,0.06)",warn:"rgba(240,185,11,0.06)",info:"rgba(14,203,129,0.06)"};
  const typeLabel={danger:"⚠️ Alert",warn:"⚡ Warning",info:"💡 Info"};
  const unread=(history||[]).filter(n=>!n.read).length;

  const fmtTime=(iso)=>{
    if(!iso)return"";
    const d=new Date(iso);
    const now=new Date();
    const diffMs=now-d;
    const diffMin=Math.floor(diffMs/60000);
    const diffHr=Math.floor(diffMs/3600000);
    const diffDay=Math.floor(diffMs/86400000);
    if(diffMin<1)return"เมื่อกี้";
    if(diffMin<60)return diffMin+"m ago";
    if(diffHr<24)return diffHr+"h ago";
    if(diffDay<7)return diffDay+"d ago";
    return d.toLocaleDateString("th-TH",{day:"numeric",month:"short"});
  };

  return(
    <div className="fixed inset-0 z-[70]"
      style={{background:"rgba(0,0,0,0.35)",backdropFilter:"blur(2px)",cursor:"default"}}
      onClick={onClose}>
      <div className="absolute top-0 right-0 h-full w-full max-w-xs pointer-events-auto"

function ProfitReminderBanner({trades,products,balance}){
  // Find open trades with unrealized P/L > 5% of balance
  const alerts=[];
  (trades||[]).filter(t=>t.status==="open"&&t.entryPrice).forEach(t=>{
    const p=(products||[]).find(x=>x.id===t.productId);
    if(!p)return;
    const livePrice=p._livePrice||p.entryPrice;
    const unrealPL=calcNetPL(p,t.contracts,t.entryPrice,livePrice,t.direction);
    if(balance>0&&unrealPL/balance>0.05){
      alerts.push({id:t.id,contract:t.contractCode||p.currentContract,unrealPL,pct:(unrealPL/balance*100).toFixed(1),
        type:"profit",msg:"ทอดสมอกลางพายุ 🪝 — ล็อค profit บางส่วน หรือออกตอนพุ่ง อย่ารอตอนย่อ"});
    }
  });
  if(alerts.length===0)return null;
  return(
    <div className="space-y-1.5 mb-3">
      {alerts.map(a=>(
        <div key={a.id} className="flex items-center gap-3 bg-yellow/5 border border-yellow/20 rounded-xl px-3 py-2.5 text-sm">
          <span className="text-xl">⚡</span>

            <span className="text-muted mx-1.5">+{a.pct}% port</span>

          </div>
        </div>
      ))}
    </div>
  );
}

function IMAlertBanner({trades,products,balance,livePrices,liveTimestamps}){
  const usedMargin=(trades||[]).filter(t=>t.status==="open").reduce((s,t)=>{
    const p=(products||[]).find(x=>x.id===t.productId);
    return s+(p?(p.initialMargin||0)*(t.remainingContracts||t.contracts):0);
  },0);
  // Stale price warning: any open trade whose live price is >10 min old
  const staleProducts=useMemo(()=>{
    const openProds=[...new Set((trades||[]).filter(t=>t.status==="open"&&t.entryPrice).map(t=>t.productId))];
    return openProds.filter(pid=>{
      const ts=liveTimestamps&&liveTimestamps[pid];
      if(!ts)return false;
      return(Date.now()-new Date(ts).getTime())>10*60*1000;
    });
  },[trades,liveTimestamps]);
  const marginPct=(!balance||balance<=0||usedMargin<=0)?0:usedMargin/balance*100;
  if(marginPct<80&&staleProducts.length===0)return null;
  return(
    <div className="space-y-2 mb-3">
      {marginPct>=80&&(
        <div className="flex items-center gap-3 bg-red/5 border border-red/20 rounded-xl px-3 py-2.5 text-sm">
          <span className="text-xl">⚠️</span>
          <div>
            <span className="font-semibold text-red">Margin Alert</span>
            <span className="text-muted ml-2">ใช้ margin ไปแล้ว {marginPct.toFixed(0)}% ({fmtTHB(usedMargin,0)} ฿) — IM เหลือน้อย</span>
          </div>
        </div>
      )}
      {staleProducts.length>0&&(
        <div className="flex items-center gap-3 bg-yellow/5 border border-yellow/20 rounded-xl px-3 py-2.5 text-sm">
          <span className="text-xl">🕐</span>
          <div>
            <span className="font-semibold text-yellow">ราคาเก่า</span>
            <span className="text-muted ml-2">ราคา live อาจค้างนานกว่า 10 นาที — กด 🔄 Refresh เพื่ออัปเดต</span>
          </div>
        </div>
      )}
    </div>
  );
}

                className={`w-full text-left rounded-xl px-3 py-2.5 flex items-start gap-3 transition-all border ${on?"border-green/30 bg-green/5":"border-border/50 bg-input/20 hover:bg-input/40"}`}>
                <div className={`mt-0.5 w-4 h-4 rounded border-2 flex-shrink-0 flex items-center justify-center transition-all ${on?"bg-green border-green":"border-muted/40"}`}>
                  {on&&<svg viewBox="0 0 10 8" width="10" height="8"><polyline points="1,4 3.5,7 9,1" fill="none" stroke="black" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                </div>
                <div className="flex-1 min-w-0">
                  <div className={`text-sm font-medium leading-tight ${on?"text-green":"text-txt"}`}>{item.icon} {item.text}</div>
                  <div className="text-muted text-xs mt-0.5 leading-tight">{item.sub}</div>
                </div>
              </button>
            );
          })}
        </div>
        <div className="px-4 pb-4 space-y-2 border-t border-border pt-3">
          {allDone?(
            <button onClick={()=>onConfirm([])}
              className="w-full py-2.5 rounded-xl font-semibold text-sm bg-green hover:bg-green/90 text-black transition cursor-pointer">
              ✅ พร้อมเข้าไม้!
            </button>
          ):(
            <>
              {triedOpen&&(
                <div className="bg-red/10 border border-red/30 rounded-xl px-3 py-2.5 text-center">
                  <p className="text-red font-bold text-sm">⚠️ พี่โอห์มรู้คงไม่ปลื้ม</p>
                  <p className="text-red text-xs mt-0.5">มีข้อที่ยังไม่ผ่านอีก {missed} ข้อ</p>
                </div>
              )}
              <button onClick={()=>setTriedOpen(true)}
                className="w-full py-2.5 rounded-xl font-semibold text-sm bg-input text-muted border border-border transition hover:bg-[#363c45]">
                เปิด Trade
              </button>
              {triedOpen&&(
                <div className="flex gap-2">
                  <button onClick={onSaveDraft}
                    className={`${clsBtn("default")} flex-1 text-xs`}>💾 Save Draft แทน</button>
                  <button onClick={()=>onConfirm(CHECKLIST_ITEMS.filter(item=>!checked[item.id]).map(item=>item.text))}
                    className="flex-1 py-2 rounded-lg text-xs font-semibold bg-orange/10 hover:bg-orange/20 text-orange border border-orange/30 transition">
                    ยืนยัน เปิดต่อ →
                  </button>
                </div>
              )}
              {!triedOpen&&(
                <button onClick={onSaveDraft}
                  className="w-full py-2 rounded-xl text-sm font-medium bg-input hover:bg-[#363c45] text-txt border border-border transition">
                  💾 Save Draft แทน
                </button>
              )}
            </>
          )}
          <button onClick={onCancel} className="w-full text-center text-muted text-xs py-1 hover:text-txt transition">ยกเลิก</button>
        </div>
      </div>
    </div>
  );
}

function OpenTradeForm({products,initialData,balance,openTrades,trades,portfolio,onSubmit,onCancel,showToast}){
  const isEdit=!!initialData;
  const allSeries=useMemo(()=>expandProducts(products),[products]);

  const[step,setStep]=useState(0);
  const[showChecklist,setShowChecklist]=useState(false);
  const[f,setF]=useState({
    productId:products[0]?.id||"",direction:"Long",contracts:"1",
    entryPrice:"",currentPrice:"",stopLoss:"",takeProfit:"",
    openDateTime:localNow(),setupType:"ประคองตลาด",preNote:"",preImages:[],
    ...(initialData?{
      ...initialData,
      contracts:String(initialData.contracts||1),
      entryPrice:String(initialData.entryPrice||""),
      currentPrice:String(initialData.currentPrice||initialData.entryPrice||""),
      stopLoss:String(initialData.stopLoss||""),
      takeProfit:String(initialData.takeProfit||""),
      preImages:initialData.preImages||[],
    }:{})
  });
  const set=k=>e=>setF(p=>({...p,[k]:e.target.value}));

  const product=useMemo(()=>{
    const pid=f.productId;
    if(pid.endsWith("_next")){const base=pid.replace("_next","");return products.find(p=>p.id===base);}
    return products.find(p=>p.id===pid);
  },[f.productId,products]);

  const selectedSeries=allSeries.find(s=>s.id===f.productId)||allSeries[0];

  const derived=useMemo(()=>{
    const contracts=+f.contracts||0;
    const ep=+f.entryPrice||0;
    const pv=calcPositionValue(product,contracts,ep);
    const gx=calcGearingX(pv,balance);
    const existingPV=(openTrades||[]).filter(t=>t.id!==initialData?.id&&t.status==="open")
      .reduce((s,t)=>{const p=products.find(x=>x.id===t.productId)||products.find(x=>t.productId.startsWith(x.id));return s+calcPositionValue(p,t.contracts,t.entryPrice);},0);
    const combinedGX=calcGearingX(existingPV+pv,balance);
    const vpc=product&&ep>0?product.contractSize*ep:0;
    const limit=GEARING_LIMITS[f.setupType]||5;
    const maxContracts=vpc>0?Math.floor(limit*balance/vpc):0;
    const tpPL=f.takeProfit&&product?calcNetPL(product,contracts,ep,+f.takeProfit,f.direction):null;
    const slPL=f.stopLoss&&product?calcNetPL(product,contracts,ep,+f.stopLoss,f.direction):null;
    const tpPct=tpPL&&balance?(tpPL/balance*100):null;
    const slPct=slPL&&balance?(slPL/balance*100):null;
    return{pv,gx,combinedGX,existingPV,vpc,limit,maxContracts,tpPL,slPL,tpPct,slPct};
  },[f.productId,f.contracts,f.entryPrice,f.stopLoss,f.takeProfit,f.direction,f.setupType,product,balance,openTrades,initialData]);

  const buildTrade=(status)=>({
    id:initialData?.id||uid(),status,
    productId:f.productId,direction:f.direction,
    contracts:+f.contracts,entryPrice:+f.entryPrice,
    currentPrice:+f.currentPrice||+f.entryPrice,
    stopLoss:f.stopLoss?+f.stopLoss:null,
    takeProfit:f.takeProfit?+f.takeProfit:null,
    openDateTime:f.openDateTime,setupType:f.setupType,preNote:f.preNote,
    preImages:f.preImages||[],postImages:[],partialCloses:[],
    isMerged:initialData?.isMerged||false,
    mergedFromIds:initialData?.mergedFromIds||[],
    subTrades:initialData?.subTrades||[],
    contractCode:initialData?.contractCode||(selectedSeries?.currentContract||product?.currentContract||null),
  });

  const submit=(status)=>{
    if(!f.productId||!f.entryPrice||!f.contracts){
      showToast("กรุณากรอก Product, Entry Price และ Contracts","error");return;
    }
    if(status==="open"&&balance<=0){
      showToast("ยังไม่มียอดเงินใน Portfolio — ไปที่ Settings เพื่อฝากเงินก่อน","error");return;
    }
    if(status==="open"&&product){
      const reqMargin=calcMargin(product,+f.contracts);
      if(reqMargin>0&&balance<reqMargin){
        showToast(
          `ยอดเงินไม่เพียงพอ — ต้องการ ${fmtTHB(reqMargin,0)} ฿ (${+f.contracts} สัญญา × margin ${fmtTHB(product.initialMargin,0)} ฿)`,
          "error"
        );return;
      }
    }
    onSubmit(buildTrade(status));
  };

  // Cooldown banner: check if today had a big win trade
  const cooldownBanner=(()=>{
    const today2=new Date().toISOString().slice(0,10);
    const threshold=portfolio?.cooldownPct??20;
    const bigWin=(openTrades?.filter(t=>false)||[]) // placeholder - check closed trades via trades prop
    // Actually use trades from prop
    ;
    const recentBigWins=(trades||[]).filter(t=>{
      if(t.status!=="closed"||!t.exitDateTime)return false;
      if(t.exitDateTime.slice(0,10)!==today2)return false;
      const p=products.find(x=>x.id===t.productId);
      const n=calcNetPL(p,t.contracts,t.entryPrice,t.exitPrice,t.direction);
      return balance>0&&n/balance*100>=threshold;
    });
    if(!recentBigWins.length)return null;
    return(
      <div className="flex items-start gap-2 text-sm mt-2 bg-yellow/5 border border-yellow/30 rounded-xl px-3 py-2.5">
        <span className="text-xl flex-shrink-0">🧊</span>
        <div>
          <p className="font-semibold text-yellow">Cooldown Mode</p>
          <p className="text-xs text-muted mt-0.5">วันนี้ทำกำไรใหญ่แล้ว — ลด position size ลงครึ่งนึง เพื่อรักษากำไรไว้</p>
        </div>
      </div>
    );
  })();
  const gearingBanner=(()=>{
    const{combinedGX,limit,maxContracts}=derived;
    if(!derived.pv||!+f.contracts)return null;
    // Portfolio total gearing (this trade + all open positions)
    const portfolioGX=calcGearingX(derived.existingPV+derived.pv,balance);
    const thisGX=calcGearingX(derived.pv,balance);
    const overLimit=combinedGX>limit;
    const nearLimit=combinedGX>limit*0.7;
    const color=overLimit?"text-red":nearLimit?"text-yellow":"text-green";
    const bg=overLimit?"bg-red/5 border-red/20":nearLimit?"bg-yellow/5 border-yellow/20":"bg-green/5 border-green/20";
    const icon=overLimit?"⚠️":nearLimit?"⚡":"✓";
    return(
      <div className={`text-sm mt-2 border rounded-xl px-3 py-2.5 space-y-1 ${bg}`}>
        <div className={`flex items-center justify-between ${color}`}>
          <span>{icon} ไม้นี้</span>
          <span className="font-bold tabular-nums">{fmtGearing(thisGX)}</span>
        </div>
        <div className={`flex items-center justify-between ${overLimit?"text-red font-semibold":nearLimit?"text-yellow":"text-green"}`}>
          <span>📊 พอร์ตรวม</span>
          <span className="font-bold tabular-nums">{fmtGearing(portfolioGX)}</span>
        </div>
        {overLimit&&<div className="text-red/80 text-xs mt-1">เกิน {limit}X · แนะนำ max {maxContracts} สัญญา</div>}
        {!overLimit&&nearLimit&&<div className="text-yellow/80 text-xs mt-1">ใกล้ขีดจำกัด {limit}X ของ {f.setupType}</div>}
      </div>
    );
  })();

  const TOTAL_STEPS=isEdit?1:7;
  const canNext=(()=>{
    if(step===0)return!!f.productId&&!!f.direction;
    if(step===1)return!!f.setupType;
    if(step===2)return!!f.entryPrice&&+f.entryPrice>0;
    if(step===3)return!!f.contracts&&+f.contracts>0;
    return true;
  })();

  const nextStep=()=>{if(step<TOTAL_STEPS-1)setStep(s=>s+1);};
  const prevStep=()=>{if(step>0)setStep(s=>s-1);};

  const PRODUCT_ICONS={"s50":"🇹🇭","gold":"🥇","silver":"⚪","usdjpy":"💴"};
  const getIcon=(id)=>PRODUCT_ICONS[id.replace("_next","")]||"📊";

  if(isEdit){
    return(
      <Modal title="แก้ไข Order" onClose={onCancel} width="max-w-xl">
        <div className="p-5 space-y-4">
          <div className="grid grid-cols-2 gap-3">
            <div><Label>Setup Type</Label>
              <select value={f.setupType} onChange={set("setupType")} className={clsInput}>
                {SETUP_TYPES.map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            <div><Label>Product</Label>
              <select value={f.productId} onChange={set("productId")} className={clsInput} disabled>
                {allSeries.map(s=><option key={s.id} value={s.id}>{s.name} ({s.currentContract}) — {s._seriesLabel}</option>)}
              </select>
            </div>
          </div>
          <div><Label>Direction</Label>
            <div className="flex gap-2">
              {["Long","Short"].map(d=>(
                <button key={d} type="button" onClick={()=>setF(p=>({...p,direction:d}))}
                  className={`flex-1 py-2.5 rounded-xl font-semibold text-sm transition ${f.direction===d?(d==="Long"?"bg-green text-black":"bg-red text-white"):"bg-input text-muted hover:text-txt"}`}>
                  {d==="Long"?"▲ Long":"▼ Short"}
                </button>
              ))}
            </div>
          </div>
          <div><Label>Entry Price</Label><input type="number" value={f.entryPrice} onChange={set("entryPrice")} className={clsInput+" no-spin"}/></div>
          <div><Label>Contracts</Label><input type="number" value={f.contracts} onChange={set("contracts")} className={clsInput+" no-spin"}/></div>
          <div className="grid grid-cols-2 gap-3">
            <div><Label>Stop Loss</Label><input type="number" value={f.stopLoss} onChange={set("stopLoss")} className={clsInput+" no-spin"}/></div>
            <div><Label>Take Profit</Label><input type="number" value={f.takeProfit} onChange={set("takeProfit")} className={clsInput+" no-spin"}/></div>
          </div>
          <div><Label>Open Date & Time</Label><input type="datetime-local" value={f.openDateTime} onChange={set("openDateTime")} className={clsInput}/></div>
          <div><Label>Pre-trade Note</Label><textarea value={f.preNote} onChange={set("preNote")} rows={2} className={clsInput+" resize-none"}/></div>
        </div>
        <div className="flex gap-2 px-5 py-4 border-t border-border flex-shrink-0">
          <button onClick={onCancel} className={clsBtn("default")}>ยกเลิก</button>
          <button onClick={()=>{if(!f.entryPrice||!f.contracts){showToast("กรุณากรอกข้อมูลให้ครบ","error");return;}onSubmit(buildTrade(initialData.status));}} className={`${clsBtn("yellow")} flex-1`}>✅ ยืนยันแก้ไข</button>
        </div>
      </Modal>
    );
  }

  return(
    <div className="fixed inset-0 bg-black/85 backdrop-blur-sm z-50 flex items-end sm:items-center justify-center">
      <div className="fade-in bg-card w-full sm:max-w-lg rounded-t-3xl sm:rounded-2xl border border-border shadow-2xl flex flex-col" style={{maxHeight:"96vh"}}>
        <div className="px-5 pt-5 pb-3 border-b border-border flex-shrink-0">
          <div className="flex items-center justify-between mb-3">
            <span className="text-muted text-xs font-medium">Step {step+1} / {TOTAL_STEPS}</span>
            <button onClick={onCancel} className="text-muted hover:text-txt transition text-xl w-8 h-8 flex items-center justify-center rounded-lg hover:bg-input">✕</button>
          </div>
          <div className="flex gap-1">
            {Array.from({length:TOTAL_STEPS},(_,i)=>(
              <div key={i} className={`h-1 flex-1 rounded-full transition-all ${i<=step?"bg-yellow":"bg-input"}`}/>
            ))}
          </div>
        </div>

        <div className="flex-1 overflow-y-auto p-5">

          
          {step===0&&(
            <div className="space-y-5">
              <div>
                <p className="text-txt font-semibold text-lg mb-1">เลือก Product</p>
                <p className="text-muted text-sm mb-4">Active = series ปัจจุบัน · Next = series ถัดไป</p>
                <div className="grid grid-cols-2 gap-2.5">
                  {allSeries.map(s=>(
                    <button key={s.id} type="button" onClick={()=>setF(p=>({...p,productId:s.id}))}
                      className={`flex items-center gap-3 rounded-2xl p-4 border transition text-left ${f.productId===s.id?"border-yellow bg-yellow/10":"border-border bg-input/30 hover:border-border/80 hover:bg-input/50"}`}>
                      <span className="text-2xl">{getIcon(s.id)}</span>
                      <div className="min-w-0">
                        <div className="font-semibold text-sm text-txt">{s.currentContract}</div>
                        <div className="text-xs text-muted truncate">{s.name}</div>
                        <span className={`text-[10px] font-semibold px-1.5 py-0.5 rounded mt-0.5 inline-block ${s._seriesLabel==="Active"?"bg-green/10 text-green":"bg-muted/10 text-muted"}`}>{s._seriesLabel}</span>
                      </div>
                    </button>
                  ))}
                </div>
              </div>
              <div>
                <p className="text-txt font-semibold mb-2">Direction</p>
                <div className="flex gap-3">
                  {["Long","Short"].map(d=>(
                    <button key={d} type="button" onClick={()=>setF(p=>({...p,direction:d}))}
                      className={`flex-1 py-4 rounded-2xl font-bold text-lg transition ${f.direction===d?(d==="Long"?"bg-green text-black":"bg-red text-white"):"bg-input text-muted hover:text-txt border border-border"}`}>
                      {d==="Long"?"▲ Long":"▼ Short"}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          )}

          
          {step===1&&(
            <div>
              <p className="text-txt font-semibold text-lg mb-1">Setup Type</p>
              <p className="text-muted text-sm mb-4">เลือกรูปแบบการเทรดครั้งนี้</p>
              <div className="grid grid-cols-2 gap-2.5">
                {SETUP_TYPES.map(s=>(
                  <button key={s} type="button" onClick={()=>setF(p=>({...p,setupType:s}))}
                    className={`py-4 px-3 rounded-2xl border font-semibold text-sm transition ${f.setupType===s?"border-yellow bg-yellow/10 text-yellow":"border-border bg-input/30 text-muted hover:text-txt hover:border-border/80"}`}>
                    {s}
                    <div className="text-xs font-normal mt-0.5 text-muted">{s!=="Other"&&GEARING_LIMITS[s]?`max ${GEARING_LIMITS[s]}X`:""}</div>
                  </button>
                ))}
              </div>
            </div>
          )}

          
          {step===2&&(
            <div className="space-y-4">
              <div className="flex items-center gap-2 text-muted text-sm">
                <span>{getIcon(f.productId)}</span>
                <span>{selectedSeries?.currentContract} · {f.direction==="Long"?"▲ Long":"▼ Short"} · {f.setupType}</span>
              </div>
              <p className="text-txt font-semibold text-lg">Entry Price</p>
              <input type="number" value={f.entryPrice} autoFocus
                onChange={e=>{const v=e.target.value;setF(p=>({...p,entryPrice:v,currentPrice:v}));}}
                placeholder={product?`0.${"0".repeat(product.digits||1)}`:"0"}
                className="w-full bg-input border border-border rounded-2xl px-5 py-5 text-txt text-3xl font-bold text-center focus:outline-none focus:border-yellow/60 no-spin tabular-nums"/>
              {product&&<p className="text-center text-muted text-xs">Tick size: {product.tickSize} · Tick value: {fmtTHB(product.tickValue,0)} ฿</p>}
            </div>
          )}

          
          {step===3&&(
            <div className="space-y-4">
              <div className="flex items-center gap-2 text-muted text-sm">
                <span>{getIcon(f.productId)}</span>
                <span>{selectedSeries?.currentContract} · Entry {fmtNum(+f.entryPrice||0,product?.digits)}</span>
              </div>
              <p className="text-txt font-semibold text-lg">Contracts (สัญญา)</p>
              <div className="flex items-center gap-3">
                <button type="button" onClick={()=>setF(p=>({...p,contracts:String(Math.max(1,(+p.contracts||1)-1))}))}
                  className="w-14 h-14 rounded-2xl bg-input border border-border text-2xl font-bold flex items-center justify-center hover:bg-[#363c45] transition">−</button>
                <input type="number" value={f.contracts} onChange={set("contracts")}
                  className="flex-1 bg-input border border-border rounded-2xl px-4 py-4 text-txt text-3xl font-bold text-center focus:outline-none focus:border-yellow/60 no-spin tabular-nums"/>
                <button type="button" onClick={()=>setF(p=>({...p,contracts:String((+p.contracts||0)+1)}))}
                  className="w-14 h-14 rounded-2xl bg-input border border-border text-2xl font-bold flex items-center justify-center hover:bg-[#363c45] transition">+</button>
              </div>
              {cooldownBanner}
              {gearingBanner}
              {derived.pv>0&&(
                <div className="grid grid-cols-2 gap-3 mt-2">
                  <div className="bg-input/50 rounded-xl p-3"><span className="text-muted text-xs block">Position Value</span><span className="font-bold">{fmtTHB(derived.pv,0)} ฿</span></div>
                  <div className="bg-input/50 rounded-xl p-3"><span className="text-muted text-xs block">Max Contracts</span><span className="font-bold text-yellow">{derived.maxContracts} สัญญา</span></div>
                </div>
              )}
            </div>
          )}

          
          {step===4&&(
            <div className="space-y-4">
              <p className="text-txt font-semibold text-lg">Stop Loss & Take Profit</p>
              <p className="text-muted text-sm">ไม่บังคับ — กรอกเพื่อดู P/L Preview</p>
              <div>
                <Label>Take Profit</Label>
                <input type="number" value={f.takeProfit} onChange={set("takeProfit")} placeholder="—" className={clsInput+" no-spin"}/>
                {derived.tpPL!=null&&(
                  <div className="mt-2 bg-green/5 border border-green/20 rounded-xl px-4 py-3">
                    <span className="text-green font-bold text-lg">+{fmtTHB(derived.tpPL,0)} ฿</span>
                    {derived.tpPct!=null&&<span className="text-green/70 text-sm ml-2">({derived.tpPct>=0?"+":""}{derived.tpPct?.toFixed(1)}% ของพอร์ต)</span>}
                  </div>
                )}
              </div>
              <div>
                <Label>Stop Loss</Label>
                <input type="number" value={f.stopLoss} onChange={set("stopLoss")} placeholder="—" className={clsInput+" no-spin"}/>
                {derived.slPL!=null&&(
                  <div className="mt-2 bg-red/5 border border-red/20 rounded-xl px-4 py-3">
                    <span className="text-red font-bold text-lg">{fmtTHB(derived.slPL,0)} ฿</span>
                    {derived.slPct!=null&&<span className="text-red/70 text-sm ml-2">({derived.slPct>=0?"+":""}{derived.slPct?.toFixed(1)}% ของพอร์ต)</span>}
                  </div>
                )}
              </div>
            </div>
          )}

          
          {step===5&&(
            <div className="space-y-4">
              <p className="text-txt font-semibold text-lg">วันที่และเวลาเปิด Trade</p>
              <input type="datetime-local" value={f.openDateTime} onChange={set("openDateTime")} className={clsInput}/>
            </div>
          )}

          
          {step===6&&(
            <div className="space-y-4">
              <p className="text-txt font-semibold text-lg">บันทึก Pre-trade</p>
              <div><Label>เหตุผลที่เข้า trade</Label><textarea value={f.preNote} onChange={set("preNote")} rows={4} placeholder="เหตุผล, แนวรับ, pattern..." className={clsInput+" resize-none"}/></div>
              <ImageUploader images={f.preImages} onChange={imgs=>setF(p=>({...p,preImages:imgs}))} label="📎 แนบรูป Pre-trade"/>
            </div>
          )}

          
          {step===TOTAL_STEPS-1&&step>=6&&(
            <div className="mt-4 space-y-3 border-t border-border pt-4">
              <p className="text-muted text-xs font-semibold uppercase tracking-wide">สรุป Order</p>
              {[
                ["Product",`${selectedSeries?.currentContract} (${selectedSeries?._seriesLabel})`],
                ["Direction",f.direction],["Setup",f.setupType],
                ["Entry",fmtNum(+f.entryPrice||0,product?.digits)],["Contracts",f.contracts],
                ["SL",f.stopLoss||"—"],["TP",f.takeProfit||"—"],
                ["เปิดเมื่อ",fmtDT(f.openDateTime)],
              ].map(([k,v])=>(
                <div key={k} className="flex justify-between text-sm">
                  <span className="text-muted">{k}</span><span className="font-medium">{v}</span>
                </div>
              ))}
              {f.preNote&&<div className="bg-input/40 rounded-xl px-3 py-2 text-sm text-muted whitespace-pre-wrap">{f.preNote}</div>}
            </div>
          )}
        </div>

        <div className="flex gap-2 px-5 py-4 border-t border-border flex-shrink-0">
          {step===0?(
            <button onClick={onCancel} className={clsBtn("default")}>ยกเลิก</button>
          ):(
            <button onClick={prevStep} className={clsBtn("default")}>← ย้อนกลับ</button>
          )}
          {step<TOTAL_STEPS-1?(
            <button onClick={()=>{if(!canNext){showToast("กรุณากรอกข้อมูลให้ครบ","error");return;}nextStep();}}
              disabled={!canNext}
              className={`${clsBtn("yellow")} flex-1 disabled:opacity-30 disabled:cursor-not-allowed`}>ถัดไป →</button>
          ):(
            <>
              <button onClick={()=>submit("draft")} className={clsBtn("default")}>💾 Draft</button>
              <button onClick={()=>{if(!f.entryPrice||!f.contracts){showToast("กรุณากรอกข้อมูลให้ครบ","error");return;}setShowChecklist(true);}}
                className={`${clsBtn("yellow")} flex-1`}>✅ Open Trade</button>
            </>
          )}
        </div>
      </div>
      {showChecklist&&(
        <MindsetChecklistModal
          onConfirm={(missedItems)=>{
            setShowChecklist(false);
            if(missedItems&&missedItems.length>0){
              const riskNote="⚠️ เข้าไม้โดยไม่ผ่าน checklist:\n"+missedItems.map(t=>"• "+t).join("\n")+"\n---\n";
              setF(prev=>({...prev,preNote:riskNote+(prev.preNote||"")}));
            }
            submit("open");
          }}
          onSaveDraft={()=>{setShowChecklist(false);submit("draft");}}
          onCancel={()=>setShowChecklist(false)}
        />
      )}
    </div>
  );
}

          </div>

function MergedCloseForm({trade,product,onClose,onCancel,showToast}){
  const openSubs=useMemo(()=>{
    const closedBySubId={};
    (trade.partialCloses||[]).forEach(pc=>{
      closedBySubId[pc.subTradeId]=(closedBySubId[pc.subTradeId]||0)+pc.contracts;
    });
    return(trade.subTrades||[])
      .filter(st=>(closedBySubId[st.id]||0)<st.contracts)
      .map(st=>({...st,contracts:st.contracts-(closedBySubId[st.id]||0)}));
  },[trade.partialCloses,trade.subTrades]);
  const[items,setItems]=useState(()=>openSubs.map(st=>({
    subTradeId:st.id,contracts:st.contracts,entryPrice:st.entryPrice,selected:true,
    exitPrice:String(trade.currentPrice||st.entryPrice||""),exitDateTime:localNow(),exitReason:"Manual",
  })));
  if(openSubs.length===0&&trade.isMerged)return(
    <Modal title="ปิด Order" onClose={onCancel} width="max-w-xs">
      <div className="p-5 space-y-4 text-center">
        <div className="text-2xl">✅</div>
        <p className="text-sm text-txt">ปิดครบทุก contracts แล้ว</p>
        <div className="flex gap-2 justify-center">
          <button onClick={onCancel} className={clsBtn("default")}>ยกเลิก</button>
          <button onClick={()=>onClose({...trade,status:"closed"})} className={clsBtn("yellow")}>ยืนยันปิด Order</button>
        </div>
      </div>
    </Modal>
  );
  const[overall,setOverall]=useState({
    tradeRating:trade.tradeRating||3,feeling:trade.feeling||"😊",
    winLossReason:trade.winLossReason||"",postNote:trade.postNote||"",postImages:trade.postImages||[],
  });
  const updateItem=(idx,field,value)=>setItems(prev=>prev.map((it,i)=>i===idx?{...it,[field]:value}:it));
  const sel=items.filter(it=>it.selected);
  const totalC=sel.reduce((s,it)=>s+it.contracts,0);
  const totalPL=sel.reduce((s,it)=>{
    if(!it.exitPrice||!product)return s;
    return s+calcNetPL(product,it.contracts,it.entryPrice,+it.exitPrice,trade.direction);
  },0);
  const contractOffset=(trade.partialCloses||[]).length;
  const handleSubmit=()=>{
    if(!sel.length){showToast("กรุณาเลือกอย่างน้อย 1 contract","error");return;}
    if(sel.find(it=>!it.exitPrice||+it.exitPrice<=0)){showToast("กรุณากรอก Exit Price ให้ครบ","error");return;}
    const newPCs=sel.map(it=>({
      id:uid(),subTradeId:it.subTradeId,contracts:it.contracts,
      exitPrice:+it.exitPrice,exitDateTime:it.exitDateTime,exitReason:it.exitReason,
      pl:calcNetPL(product,it.contracts,it.entryPrice,+it.exitPrice,trade.direction),
    }));
    const allPCs=[...(trade.partialCloses||[]),...newPCs];
    const closedC=allPCs.reduce((s,pc)=>s+pc.contracts,0);
    const remaining=Math.max(0,trade.contracts-closedC);
    const allDone=remaining===0;
    const avgExit=allPCs.reduce((s,pc)=>s+pc.exitPrice*pc.contracts,0)/trade.contracts;
    const updated={
      ...trade,partialCloses:allPCs,remainingContracts:remaining,status:allDone?"closed":"open",
      ...(allDone?{
        exitPrice:+avgExit.toFixed(product?.digits||1),
        exitDateTime:newPCs[newPCs.length-1].exitDateTime,exitReason:"Manual",
        feeling:overall.feeling,tradeRating:overall.tradeRating,
        winLossReason:overall.winLossReason,postNote:overall.postNote,postImages:overall.postImages,
      }:{}),
    };
    onClose(updated);
    showToast(allDone?`ปิด order เรียบร้อย (${trade.contracts} สัญญา)`:`ปิด ${totalC} สัญญา · เหลือ ${remaining} สัญญา`,"success");
  };
  return(
    <Modal title={`ปิด ${product?.currentContract||"?"} — ${trade.contracts} contracts total`} onClose={onCancel} width="max-w-xl">
      <div className="p-5 space-y-5">
        {(trade.partialCloses||[]).length>0&&(
          <div className="bg-input/40 rounded-lg px-3 py-2.5 text-xs text-muted">
            <span className="font-medium text-orange">ปิดไปแล้ว: </span>
            {(trade.partialCloses||[]).map((pc,i)=>(
              <span key={pc.id} className="mr-2">Contract {i+1} @{fmtNum(pc.exitPrice,product?.digits)}
                <span className={pc.pl>=0?" text-green":" text-red"}> ({pc.pl>=0?"+":""}{fmtTHB(pc.pl,0)}฿)</span>
              </span>
            ))}
          </div>
        )}
        <div>
          <Label>เลือก Contracts ที่ต้องการปิดในครั้งนี้</Label>
          <div className="space-y-3">
            {items.map((item,idx)=>{
              const p=item.exitPrice&&product?calcNetPL(product,item.contracts,item.entryPrice,+item.exitPrice,trade.direction):null;
              return(
                <div key={item.subTradeId} className={`rounded-xl p-3 border transition ${item.selected?"border-yellow/30 bg-yellow/5":"border-border bg-input/20"}`}>
                  <div className="flex items-center gap-3 mb-2">
                    <input type="checkbox" checked={item.selected} onChange={e=>updateItem(idx,"selected",e.target.checked)} className="w-4 h-4 accent-yellow cursor-pointer flex-shrink-0"/>
                    <span className="font-semibold text-sm">Contract {idx+1+contractOffset}</span>
                    <span className="text-muted text-xs">{item.contracts} สัญญา @ entry {fmtNum(item.entryPrice,product?.digits)}</span>
                    {p!==null&&<PLDisplay value={p} className="text-xs ml-auto"/>}
                  </div>
                  {item.selected&&(
                    <div className="grid grid-cols-3 gap-2">
                      <div><Label>Exit Price</Label><input type="number" value={item.exitPrice} onChange={e=>updateItem(idx,"exitPrice",e.target.value)} className={clsInput+" no-spin text-xs py-1.5"}/></div>
                      <div><Label>วันที่/เวลา</Label><input type="datetime-local" value={item.exitDateTime} onChange={e=>updateItem(idx,"exitDateTime",e.target.value)} className={clsInput+" text-xs py-1.5"}/></div>
                      <div><Label>Exit Reason</Label><select value={item.exitReason} onChange={e=>updateItem(idx,"exitReason",e.target.value)} className={clsInput+" text-xs py-1.5"}>{EXIT_REASONS.map(r=><option key={r}>{r}</option>)}</select></div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
        {sel.length>0&&(
          <div className="bg-input/50 rounded-lg p-3 flex items-center justify-between">
            <span className="text-muted text-sm">Net P/L รวม ({totalC} สัญญา)</span>
            <PLDisplay value={totalPL} className="text-base"/>
          </div>
        )}
        <div className="border-t border-border pt-4 space-y-3">
          <p className="text-muted text-xs font-medium uppercase tracking-wide">Overall Assessment</p>
          <div><Label>Trade Rating</Label><Stars value={overall.tradeRating} onChange={v=>setOverall(p=>({...p,tradeRating:v}))}/></div>
          <div>
            <Label>Feeling</Label>
            <div className="flex gap-2">
              {FEELINGS.map(em=>(
                <button key={em} type="button" onClick={()=>setOverall(p=>({...p,feeling:em}))}
                  className={`flex-1 py-2 text-xl rounded-lg transition ${overall.feeling===em?"bg-yellow/10 ring-1 ring-yellow/40":"bg-input"}`}>{em}</button>
              ))}
            </div>
          </div>
          <div><Label>Win/Loss Reason</Label><textarea value={overall.winLossReason} onChange={e=>setOverall(p=>({...p,winLossReason:e.target.value}))} rows={2} placeholder="เหตุผล..." className={clsInput+" resize-none"}/></div>
          <div><Label>Post-trade Note</Label><textarea value={overall.postNote} onChange={e=>setOverall(p=>({...p,postNote:e.target.value}))} rows={2} placeholder="บทเรียน..." className={clsInput+" resize-none"}/></div>
          <ImageUploader images={overall.postImages} onChange={imgs=>setOverall(p=>({...p,postImages:imgs}))} label="📎 แนบรูป Post-trade"/>
        </div>
      </div>
      <div className="flex gap-2 px-5 py-4 border-t border-border flex-shrink-0">
        <button onClick={onCancel} className={clsBtn("default")}>ยกเลิก</button>
        <button onClick={handleSubmit} disabled={!sel.length}
          className={`${clsBtn("red")} flex-1 disabled:opacity-30 disabled:cursor-not-allowed`}>
          ✕ ปิด {totalC} contracts ที่เลือก
        </button>
      </div>
    </Modal>
  );
}

function NoteField({label,value,onSave,editable=true}){
  const[editing,setEditing]=useState(false);
  const[draft,setDraft]=useState(value||"");
  const start=()=>{setDraft(value||"");setEditing(true);};
  const cancel=()=>setEditing(false);
  const save=()=>{onSave(draft);setEditing(false);};
  if(editing){
    return(
      <div>
        <span className="text-muted text-xs font-medium block mb-1.5">{label}</span>
        <textarea value={draft} onChange={e=>setDraft(e.target.value)} rows={3} autoFocus
          className={clsInput+" resize-none text-sm"}/>
        <div className="flex gap-2 mt-2">
          <button onClick={cancel} className={clsBtn("default","sm")}>ยกเลิก</button>
          <button onClick={save} className={clsBtn("yellow","sm")}>💾 บันทึก</button>
        </div>
      </div>
    );
  }
  return(
    <div className="group relative">
      <div className="flex items-center justify-between mb-1.5">
        <span className="text-muted text-xs font-medium">{label}</span>
        {editable&&<button onClick={start}
          className="opacity-0 group-hover:opacity-100 transition-opacity text-xs text-muted hover:text-yellow px-1">✏️</button>}
      </div>
      {value
        ?<p onClick={editable?start:undefined}
            className={`text-sm text-txt leading-relaxed whitespace-pre-wrap bg-input/30 rounded-lg px-3 py-2.5 ${editable?"cursor-pointer hover:bg-input/50 transition-colors":""}`}>
            {value}
          </p>
        :(editable
          ?<button onClick={start}
              className="text-sm text-muted/50 hover:text-muted transition-colors py-1.5 px-1">
              + เพิ่ม note...
            </button>
          :null)
      }
    </div>
  );
}

const fetchYahooPrice=async(sym)=>{
  try{
    const r=await fetch(`/.netlify/functions/price?sym=${encodeURIComponent(sym)}`,{cache:"no-store"});
    if(!r.ok)throw new Error("status "+r.status);
    const d=await r.json();
    if(d?.price!=null&&!isNaN(d.price))return+d.price;
    throw new Error("no price in response");
  }catch(e){throw new Error("price fetch failed: "+e.message);}
};

// Manual price fetch — ref-based, no stale closure
function useLivePrices(products,openTrades){
  const[livePrices,setLivePrices]=useState(()=>{try{return JSON.parse(localStorage.getItem("tj_live_prices")||"{}");}catch{return{};}});
  const[liveTimestamps,setLiveTimestamps]=useState({});
  const[liveErrors,setLiveErrors]=useState({});
  const[fetching,setFetching]=useState(false);
  const fetchingRef=useRef(false);
  const productsRef=useRef(products);
  useEffect(()=>{productsRef.current=products;},[products]);

  const fetchNow=useCallback(async()=>{
    if(fetchingRef.current)return;
    fetchingRef.current=true;
    setFetching(true);
    const syms=productsRef.current.filter(p=>p.yahooSymbol);
    const newPrices={};
    const newTs={};
    const newErrs={};
    await Promise.all(syms.map(async(p)=>{
      try{
        const price=await fetchYahooPrice(p.yahooSymbol);
        newPrices[p.id]=price;
        newTs[p.id]=new Date();
      }catch{
        newErrs[p.id]=true;
      }
    }));
    try{localStorage.setItem("tj_live_prices",JSON.stringify(newPrices));}catch{}
    setLivePrices(prev=>({...prev,...newPrices}));
    setLiveTimestamps(prev=>({...prev,...newTs}));
    setLiveErrors(prev=>({...prev,...newErrs}));
    fetchingRef.current=false;
    setFetching(false);
  },[]);



  useEffect(()=>{
    const t=setInterval(()=>{if(!document.hidden)fetchNow();},3*60*1000);
    const v=()=>{if(!document.hidden)fetchNow();};
    document.addEventListener("visibilitychange",v);
    return()=>{clearInterval(t);document.removeEventListener("visibilitychange",v);};
  },[fetchNow]);
  return{prices:livePrices,timestamps:liveTimestamps,errors:liveErrors,fetchNow,fetching};
}
function TVWidget({tvSymbol,productId}){
  const idRef=useRef(`tv_${productId}_${Math.random().toString(36).slice(2)}`);
  const containerRef=useRef();
  const loadedRef=useRef(false);
  useEffect(()=>{
    if(!containerRef.current||loadedRef.current)return;
    loadedRef.current=true;
    containerRef.current.id=idRef.current;
    const load=()=>{
      if(!window.TradingView||!containerRef.current)return;
      new window.TradingView.widget({
        autosize:true,symbol:tvSymbol,interval:"15",
        timezone:"Asia/Bangkok",theme:"dark",style:"1",locale:"th",
        toolbar_bg:"#1E2329",enable_publishing:false,
        hide_side_toolbar:true,hide_top_toolbar:false,
        container_id:idRef.current,
      });
    };
    if(window.TradingView){load();return;}
    // Only add script once globally
    if(!document.getElementById("tv-script")){
      const script=document.createElement("script");
      script.id="tv-script";
      script.src="https://s3.tradingview.com/tv.js";
      script.async=true;
      script.onload=()=>document.querySelectorAll("[data-tv-pending]").forEach(el=>{
        el.removeAttribute("data-tv-pending");
      });
      document.head.appendChild(script);
    }
    // Poll until TradingView loaded
    const poll=setInterval(()=>{if(window.TradingView){clearInterval(poll);load();}},300);
    return()=>clearInterval(poll);
  },[]);// run once only
  return<div ref={containerRef} style={{height:220}} className="rounded-lg overflow-hidden tv-widget-wrap"/>;
}
