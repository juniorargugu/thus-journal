function StepsProgressBar({portfolio,trades,products,compact=true}){
  const txs=portfolio?.transactions||[];
  const sorted=[...txs].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const firstDeposit=sorted.find(t=>t.type==="deposit");
  const stepBaseMode=portfolio?.stepBaseMode||"first_deposit";
  const baseAmount=(()=>{
    if(stepBaseMode==="sum_deposits")return txs.filter(t=>t.type==="deposit").reduce((s,t)=>s+t.amount,0);
    if(stepBaseMode==="weighted_deposits"){
      let eff=0,runBal=0;
      [...txs].sort((a,b)=>new Date(a.date)-new Date(b.date)).filter(t=>t.type==="deposit").forEach(t=>{
        if(runBal===0){eff=t.amount;}else{const tot=runBal+t.amount;eff=(runBal/tot)*eff+(t.amount/tot)*t.amount;}
        runBal+=t.amount;
      });
      return eff||0;
    }
    return firstDeposit?.amount||0;
  })();
  const txBalance=txs.reduce((s,t)=>s+(t.type==="deposit"?t.amount:-t.amount),0);

  const realizedPL=useMemo(()=>(trades||[]).filter(t=>t.status==="closed").reduce((s,t)=>{
    const p=(products||[]).find(p=>p.id===t.productId);
    return s+calcNetPL(p,t.contracts,t.entryPrice,t.exitPrice,t.direction);
  },0),[trades,products]);

  const balance=txBalance+realizedPL;
  if(!baseAmount||baseAmount<=0)return null;

  const STEPS=21;
  const thresholds=Array.from({length:STEPS},(_,i)=>baseAmount*Math.pow(1.5,i+1));
  const currentStep=thresholds.filter(t=>balance>=t).length;
  const isMaxLevel=currentStep>=STEPS;

  const lo=currentStep===0?0:thresholds[currentStep-1]||0;
  const hi=currentStep<STEPS?thresholds[currentStep]:thresholds[STEPS-1];
  const pct=isMaxLevel?100:Math.min(100,Math.max(0,((balance-lo)/(hi-lo))*100));
  const nextTarget=isMaxLevel?null:thresholds[currentStep];
  const amountNeeded=nextTarget?Math.max(0,nextTarget-balance):0;
  const daysSinceStart=firstDeposit?Math.floor((Date.now()-new Date(firstDeposit.date))/(86400000)):0;

  if(isMaxLevel){
    return(
      <div className="bg-card border border-border rounded-xl px-4 py-3">
        <div className="flex items-center gap-2">
          <span className="text-2xl">🏆</span>
          <span className="text-yellow font-bold">MAX LEVEL — ยอดเยี่ยมมาก!</span>
          <span className="text-muted text-sm ml-auto">{fmtTHB(balance,0)} ฿</span>
        </div>
      </div>
    );
  }

  return(
    <div className="bg-card border border-border rounded-xl px-4 py-3 space-y-2">
      <div className="flex items-center justify-between">
        <span className="text-yellow font-bold text-sm">⚡ 21 Steps — Step {currentStep}</span>
        <div className="text-right">
          <span className="text-txt font-semibold text-sm tabular-nums">{fmtTHB(balance,0)} ฿</span>
          {nextTarget&&<span className="text-muted text-xs ml-2">→ {fmtTHB(nextTarget,0)} ฿</span>}
        </div>
      </div>
      <div className="bg-input rounded-full h-3 overflow-hidden">
        <div className="step-bar-fill h-full rounded-full"
          style={{width:`${pct}%`,background:"linear-gradient(to right,#0ECB81,#F0B90B)"}}/>
      </div>
      <span className="text-muted text-[10px]">ระบบติดตามการเติบโตของ Port (×1.5)</span>
      {compact?(
        <div className="flex items-center justify-between text-xs text-muted">
          <span>เพิ่มอีก <span className="text-txt font-semibold">{fmtTHB(amountNeeded,0)} ฿</span> เพื่อขึ้น Step {currentStep+1}</span>
          <span>{daysSinceStart} วัน</span>
        </div>
      ):(
        <div className="text-xs text-muted space-y-0.5">
          <div className="flex justify-between flex-wrap gap-x-3">
            <span>Deposits: <span className="text-txt">{fmtTHB(txBalance,0)} ฿</span></span>
            <span>Realized P/L: <span className={realizedPL>=0?"text-green":"text-red"}>{realizedPL>=0?"+":""}{fmtTHB(realizedPL,0)} ฿</span></span>
            <span>Total: <span className="text-yellow font-semibold">{fmtTHB(balance,0)} ฿</span></span>
          </div>
          <div>เพิ่มอีก <span className="text-txt font-semibold">{fmtTHB(amountNeeded,0)} ฿</span> เพื่อขึ้น Step {currentStep+1} · {daysSinceStart} วัน</div>
        </div>
      )}
    </div>
  );
}

function StepHistoryPopup({stepNum,events,targetBalance,onClose}){
  return(
    <div className="fixed inset-0 bg-black/75 backdrop-blur-sm z-[60] flex items-center justify-center p-4" onClick={onClose}>
      <div className="fade-in bg-card border border-border rounded-2xl w-full max-w-xs shadow-2xl" onClick={e=>e.stopPropagation()}>
        <div className="px-5 pt-5 pb-3 border-b border-border">
          <h3 className="font-bold text-txt">Step {stepNum}</h3>
          <p className="text-muted text-xs mt-0.5">เป้าหมาย {fmtTHB(targetBalance,0)} ฿</p>
        </div>
        <div className="px-4 py-4 space-y-2 max-h-72 overflow-y-auto">
          {events.length===0
            ?<p className="text-muted text-sm text-center py-4">ยังไม่มีประวัติการตก</p>
            :events.map((e,i)=>(
              <div key={i} className={`flex items-start gap-3 rounded-xl px-3 py-2.5 ${e.event==="reached"?"bg-green/5 border border-green/20":"bg-orange/5 border border-orange/20"}`}>
                <span className="text-lg mt-0.5">{e.event==="reached"?"📈":"📉"}</span>
                <div className="flex-1 min-w-0">
                  <div className={`text-sm font-semibold ${e.event==="reached"?"text-green":"text-orange"}`}>
                    {e.event==="reached"?"ขึ้น Step":"ตกจาก Step"} {e.step}
                  </div>
                  <div className="text-muted text-xs">{fmtDate(e.date)}{e.daysFromPrev!=null&&e.daysFromPrev>0&&` · ${e.daysFromPrev} วัน`}</div>
                  {e.balance!=null&&<div className="text-xs tabular-nums text-txt/70">{fmtTHB(e.balance,0)} ฿</div>}
                </div>
              </div>
            ))
          }
        </div>
        <div className="px-4 pb-4">
          <button onClick={onClose} className={`${clsBtn("default")} w-full`}>ปิด</button>
        </div>
      </div>
    </div>
  );
}

function PageSteps({trades,products,portfolio,onPortfolioChange,livePrices}){
  const txs=portfolio?.transactions||[];
  const sorted=[...txs].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const firstDeposit=sorted.find(t=>t.type==="deposit");
  const initialDeposit=firstDeposit?.amount||0;
  const txBalance=txs.reduce((s,t)=>s+(t.type==="deposit"?t.amount:-(t.amount)),0);
  const stepBaseMode=portfolio?.stepBaseMode||"first_deposit";
  const stepHistory=portfolio?.stepHistory||[];
  const[selectedStepCell,setSelectedStepCell]=useState(null);

  const realizedPL=useMemo(()=>(trades||[]).filter(t=>t.status==="closed").reduce((s,t)=>{
    const p=(products||[]).find(p=>p.id===t.productId);
    return s+calcNetPL(p,t.contracts,t.entryPrice,t.exitPrice,t.direction);
  },0),[trades,products]);

  const balance=txBalance+realizedPL;
  // weighted mode: new deposit's influence = deposit_amount / (runningBalance + deposit_amount)
  const baseAmount=useMemo(()=>{
    if(stepBaseMode==="sum_deposits")
      return txs.filter(t=>t.type==="deposit").reduce((s,t)=>s+t.amount,0);
    if(stepBaseMode==="weighted_deposits"){
      let eff=0,runBal=0;
      [...txs].sort((a,b)=>new Date(a.date)-new Date(b.date))
        .filter(t=>t.type==="deposit")
        .forEach(t=>{
          if(runBal===0){eff=t.amount;}
          else{const tot=runBal+t.amount;eff=(runBal/tot)*eff+(t.amount/tot)*t.amount;}
          runBal+=t.amount;
        });
      return eff||0;
    }
    return firstDeposit?.amount||0;
  },[txs,stepBaseMode,firstDeposit]);

  const STEPS=21;
  const thresholds=useMemo(()=>Array.from({length:STEPS},(_,i)=>baseAmount*Math.pow(1.5,i+1)),[baseAmount]);
  const currentStep=thresholds.filter(t=>balance>=t).length;
  const isMaxLevel=currentStep>=STEPS;
  const lo=currentStep===0?0:(thresholds[currentStep-1]||0);
  const hi=currentStep<STEPS?thresholds[currentStep]:thresholds[STEPS-1];
  const pct=isMaxLevel?100:Math.min(100,Math.max(0,((balance-lo)/(hi-lo))*100));
  const nextTarget=isMaxLevel?null:thresholds[currentStep];
  const amountNeeded=nextTarget?Math.max(0,nextTarget-balance):0;
  const daysSinceStart=firstDeposit?Math.max(1,Math.floor((Date.now()-new Date(firstDeposit.date))/(86400000))):1;
  const avgPLPerDay=realizedPL/daysSinceStart;
  const daysToNextStep=nextTarget&&avgPLPerDay>0?Math.ceil(amountNeeded/avgPLPerDay):null;

  const toggleMode=()=>{
    const next=stepBaseMode==="first_deposit"?"sum_deposits":stepBaseMode==="sum_deposits"?"weighted_deposits":"first_deposit";
    if(onPortfolioChange)onPortfolioChange({...portfolio,stepBaseMode:next});
  };

  const dropCountPerStep=useMemo(()=>{
    const m={};
    (stepHistory||[]).filter(e=>e.event==="dropped").forEach(e=>{m[e.step]=(m[e.step]||0)+1;});
    return m;
  },[stepHistory]);

  const stepStartedDate=useMemo(()=>{
    const reachedCurrent=[...stepHistory].filter(e=>e.step===currentStep&&e.event==="reached").slice(-1)[0];
    return reachedCurrent?.date||(firstDeposit?.date||null);
  },[stepHistory,currentStep,firstDeposit]);
  const daysInCurrentStep=stepStartedDate?Math.max(0,Math.floor((Date.now()-new Date(stepStartedDate))/86400000)):0;

  const[manualPrices,setManualPrices]=useState({});
  const[editingPrice,setEditingPrice]=useState(null);
  const[priceInput,setPriceInput]=useState("");
  const getPrice=(pid)=>(manualPrices[pid]!=null?manualPrices[pid]:(livePrices&&livePrices[pid]!=null?livePrices[pid]:0));

  const GCOLS=15;
  const gGroupLabel=(i)=>i<2?"ประคอง/สวน":i<5?"Sideway":i<8?"Run-Trend":"Scalp+";
  const gColStyle=(i)=>{
  if(i<3)return{th:"text-green",style:{background:"rgba(14,203,129,0.08)"},cell:"text-green"};
  if(i<6)return{th:"text-yellow",style:{background:"rgba(240,185,11,0.08)"},cell:"text-yellow"};
  if(i<9)return{th:"text-red-400",style:{background:"rgba(246,70,93,0.08)"},cell:"text-red-400"};
  return{th:"text-red-500",style:{background:"rgba(246,70,93,0.18)"},cell:"text-red-500 font-bold"};
};

  if(!initialDeposit||initialDeposit<=0){
    return(
      <div className="flex items-center justify-center min-h-[60vh]">
        <div className="text-center space-y-3">
          <div className="text-5xl">⚡</div>
          <p className="text-muted">ยังไม่มีข้อมูล Portfolio — กรุณาฝากเงินเริ่มต้นใน Settings</p>
        </div>
      </div>
    );
  }

  return(
    <div className="space-y-6">

      {txBalance===0&&(
        <div className="bg-yellow/5 border border-yellow/20 rounded-xl p-4 flex items-center gap-3">
          <span className="text-2xl">💡</span>
          <div>
            <p className="text-yellow font-semibold text-sm">เริ่มต้นด้วยการฝากเงิน</p>
            <p className="text-muted text-xs mt-0.5">ไปที่ <span className="text-yellow">Settings → Portfolio</span> แล้วกด ฝากเงิน เพื่อตั้งต้น Port</p>
          </div>
        </div>
      )}

      <div className="bg-card border border-border rounded-2xl p-6 space-y-4">
        <div className="flex items-end justify-between flex-wrap gap-3">
          <div>
            <p className="text-muted text-sm mb-1">Current Step</p>
            <div className="flex items-end gap-3">
              <span className="text-7xl font-bold text-yellow tabular-nums leading-none">{isMaxLevel?"MAX":currentStep}</span>
              <span className="text-3xl text-muted font-light pb-1">/ {STEPS}</span>
            </div>
          </div>
          <div className="text-right space-y-1">
            <div><span className="text-muted text-xs block">Portfolio Balance</span>
              <span className="text-2xl font-bold text-txt tabular-nums">{fmtTHB(balance,0)} ฿</span></div>
            {nextTarget&&<div><span className="text-muted text-xs block">Next Target</span>
              <span className="text-lg font-semibold text-yellow tabular-nums">{fmtTHB(nextTarget,0)} ฿</span></div>}
          </div>
        </div>
        <div className="bg-input rounded-full h-6 overflow-hidden relative">
          <div className="step-bar-fill h-full rounded-full relative overflow-hidden"
            style={{width:`${pct}%`,background:"linear-gradient(to right,#0ECB81,#F0B90B)"}}>
            <div className="absolute inset-0 bg-white/10 animate-pulse"/>
          </div>
          {pct>8&&<span className="absolute left-3 top-1/2 -translate-y-1/2 text-xs font-bold text-black/70 tabular-nums">{pct.toFixed(1)}%</span>}
        </div>
        <div className="flex items-center justify-between flex-wrap gap-3">
          <div className="flex gap-6 flex-wrap text-sm">
            <div><span className="text-muted text-xs block">Deposits</span><span className="font-semibold">{fmtTHB(txBalance,0)} ฿</span></div>
            <div><span className="text-muted text-xs block">Realized P/L</span>
              <span className={`font-semibold ${realizedPL>=0?"text-green":"text-red"}`}>{realizedPL>=0?"+":""}{fmtTHB(realizedPL,0)} ฿</span></div>
            {nextTarget&&<div><span className="text-muted text-xs block">เพิ่มอีก</span><span className="font-semibold text-yellow">{fmtTHB(amountNeeded,0)} ฿</span></div>}
          </div>
          <div className="flex rounded-lg overflow-hidden border border-border text-xs">
            {[["first_deposit","First Deposit"],["sum_deposits","Sum Deposits"],["weighted_deposits","ถัวเฉลี่ย"]].map(([mode,label])=>(
              <button key={mode} onClick={()=>stepBaseMode!==mode&&onPortfolioChange({...portfolio,stepBaseMode:mode})}
                className={`px-3 py-1.5 transition ${stepBaseMode===mode?"bg-yellow text-black font-semibold":"text-muted hover:text-txt hover:bg-input"}`}
                title={mode==="weighted_deposits"?"น้ำหนัก = deposit ใหม่ / (balance ณ เวลานั้น + deposit ใหม่)":""}>
                {label}
              </button>
            ))}
          </div>
        </div>
      </div>

      
      <div className="bg-card border border-border rounded-2xl p-5">
        <h2 className="font-semibold text-txt mb-4">⚡ 21-Step Roadmap</h2>
        <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-7 gap-2">
          {[(
            <div key="s0"
              className={`rounded-xl p-2.5 border text-center
                ${balance>=baseAmount
                  ?"border-green/30 bg-green/5"
                  :"border-yellow bg-yellow/10"}`}>
              <div className={`text-xs font-bold mb-0.5 ${balance>=baseAmount?"text-green":"text-yellow"}`}>Step 0</div>
              <div className="text-[10px] text-muted tabular-nums leading-tight mb-1">{fmtTHB(baseAmount,0)}</div>
              <div className="text-base leading-none mb-1">{balance>=baseAmount?"✅":"🔑"}</div>
              <div className="text-[9px] text-muted leading-tight">Capital</div>
            </div>
          ),...thresholds.map((target,i)=>{
            const stepNum=i+1;
            const done=balance>=target;
            const isCurrent=currentStep===i;
            const drops=dropCountPerStep[stepNum]||0;
            const stepEvents=(stepHistory||[]).filter(e=>e.step===stepNum);
            const reachedEvent=[...stepEvents].filter(e=>e.event==="reached").slice(-1)[0];
            return(
              <div key={i} onClick={()=>stepEvents.length>0&&setSelectedStepCell(selectedStepCell===stepNum?null:stepNum)}
                className={`rounded-xl p-2.5 border text-center transition ${stepEvents.length>0?"cursor-pointer":""}
                  ${isCurrent?"border-yellow bg-yellow/10 shadow-yellow/10"
                    :done?"border-green/30 bg-green/5"
                    :"border-border bg-input/20 opacity-60"}`}>
                <div className={`text-xs font-bold mb-0.5 ${isCurrent?"text-yellow":done?"text-green":"text-muted"}`}>Step {stepNum}</div>
                <div className="text-[10px] text-muted tabular-nums leading-tight mb-1">{fmtTHB(target,0)}</div>
                <div className="text-base leading-none mb-1">{done&&!isCurrent?"✅":isCurrent?"🔄":"🔒"}</div>
                {done&&!isCurrent&&reachedEvent&&(
                  <div className="space-y-0.5 mt-0.5">
                    <div className="text-muted text-[10px] leading-tight">{fmtDate(reachedEvent.date)}</div>
                    {reachedEvent.daysFromPrev!=null&&<div className="text-muted text-[10px] leading-tight">⏱ {reachedEvent.daysFromPrev} วัน</div>}
                  </div>
                )}
                {isCurrent&&(
                  <div className="space-y-1 mt-0.5">
                    <div className="bg-black/20 rounded-full h-1 overflow-hidden">
                      <div className="h-full rounded-full bg-yellow/70 step-bar-fill" style={{width:`${pct}%`}}/>
                    </div>
                    {stepStartedDate&&<div className="text-[9px] text-yellow/60 leading-tight">{fmtDate(stepStartedDate)}</div>}
                    <div className="text-[9px] text-yellow/70 leading-tight">{daysInCurrentStep}d</div>
                  </div>
                )}
                {drops>0&&<div className="mt-0.5 text-[9px] text-orange font-semibold">⬇ {drops}x</div>}
              </div>
            );
          })]}
        </div>
      </div>
      {selectedStepCell!=null&&(
        <StepHistoryPopup
          stepNum={selectedStepCell}
          events={(stepHistory||[]).filter(e=>e.step===selectedStepCell)}
          targetBalance={thresholds[selectedStepCell-1]||0}
          onClose={()=>setSelectedStepCell(null)}
        />
      )}

      
      <div className="bg-card border border-border rounded-2xl p-5">
        <h2 className="font-semibold text-txt mb-3">📜 Step History</h2>
        <div className="space-y-2 max-h-64 overflow-y-auto">
          {(stepHistory||[]).length===0?(
            <div className="text-center py-5">
              <p className="text-muted text-sm">ยังไม่มีประวัติการเปลี่ยน Step</p>
              <p className="text-muted/50 text-xs mt-1">ระบบจะบันทึกอัตโนมัติเมื่อยอดพอร์ตข้ามเกณฑ์</p>
            </div>
          ):(
            <div className="space-y-2">
            {[...(stepHistory||[])].reverse().map((e,i)=>(
              <div key={i} className={`flex items-center gap-3 text-sm rounded-lg px-3 py-2 ${e.event==="reached"?"bg-green/5 border border-green/10":"bg-orange/5 border border-orange/10"}`}>
                <span className="text-base">{e.event==="reached"?"📈":"📉"}</span>
                <div className="flex-1">
                  <span className={`font-semibold ${e.event==="reached"?"text-green":"text-orange"}`}>
                    {e.event==="reached"?"ขึ้น Step":"ตกจาก Step"} {e.step}
                  </span>
                  {e.daysFromPrev!=null&&e.daysFromPrev>0&&<span className="text-muted text-xs ml-2">({e.daysFromPrev} วัน)</span>}
                </div>
                <div className="text-right">
                  <div className="text-muted text-xs">{fmtDate(e.date)}</div>
                  {e.balance!=null&&<div className="text-xs tabular-nums">{fmtTHB(e.balance,0)} ฿</div>}
                </div>
              </div>
            ))}
            </div>
          )}
        </div>
      </div>

      
      <div className="bg-card border border-border rounded-2xl p-5">
        <h2 className="font-semibold text-txt mb-4">📊 Statistics</h2>
        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
          <div className="bg-input/40 rounded-xl p-3">
            <span className="text-muted text-xs block mb-0.5">วันเริ่มต้น</span>
            <span className="font-semibold text-sm">{firstDeposit?fmtDate(firstDeposit.date):"—"}</span>
          </div>
          <div className="bg-input/40 rounded-xl p-3">
            <span className="text-muted text-xs block mb-0.5">วันที่ผ่านมาแล้ว</span>
            <span className="font-semibold text-sm">{daysSinceStart} วัน</span>
          </div>
          <div className="bg-input/40 rounded-xl p-3">
            <span className="text-muted text-xs block mb-0.5">กำไรเฉลี่ย/วัน</span>
            <span className={`font-semibold text-sm ${avgPLPerDay>=0?"text-green":"text-red"}`}>
              {avgPLPerDay>=0?"+":""}{fmtTHB(avgPLPerDay,0)} ฿
            </span>
          </div>
          <div className="bg-input/40 rounded-xl p-3">
            <span className="text-muted text-xs block mb-0.5">ETA Step {currentStep+1}</span>
            <span className="font-semibold text-sm text-yellow">
              {isMaxLevel?"MAX ✅":daysToNextStep?`~${daysToNextStep} วัน`:"—"}
            </span>
          </div>
        </div>
        <div className="mt-3 text-xs text-muted text-right">
          {(()=>{
            const cl2=(trades||[]).filter(t=>t.status==="closed");
            const bePct3=portfolio?.breakevenPct??1.0;
            let w2=0,l2=0,be2=0;
            cl2.forEach(t=>{const p=(products||[]).find(x=>x.id===t.productId);const n=calcNetPL(p,t.contracts,t.entryPrice,t.exitPrice,t.direction);const pct3=balance>0?n/balance*100:0;if(Math.abs(pct3)<bePct3)be2++;else if(n>0)w2++;else l2++;});
            return <span className="text-xs text-muted">{cl2.length} trades · <span className="text-green font-semibold">{w2}W</span> <span className="text-red font-semibold">{l2}L</span> <span className="text-muted font-semibold">{be2}BE</span></span>;
          })()} · avg P/L: {(()=>{
            const cl=(trades||[]).filter(t=>t.status==="closed");
            if(!cl.length)return"—";
            const tot=cl.reduce((s,t)=>{const p=(products||[]).find(p=>p.id===t.productId);return s+calcNetPL(p,t.contracts,t.entryPrice,t.exitPrice,t.direction);},0);
            return`${tot/cl.length>=0?"+":""}${fmtTHB(tot/cl.length,0)} ฿`;
          })()}
        </div>
      </div>

      {(()=>{
        if(!(balance>0))return(<div className="bg-card border border-border rounded-2xl p-5 text-center text-muted py-8">กรุณาฝากเงินใน Settings ก่อน</div>);
        return(
          <div className="bg-card border border-border rounded-2xl p-5 overflow-x-auto">
            <h2 className="font-semibold text-txt mb-1">📊 Gearing Cheat Sheet — Port {fmtTHB(balance,0)} ฿</h2>
            <p className="text-muted text-xs mb-3">max contracts ต่อระดับ Gearing (คำนวณจาก balance ปัจจุบัน)</p>
            <table className="w-full text-xs" style={{minWidth:700}}>
              <thead>
                <tr className="border-b border-border/50">
                  <th className="text-left text-muted pb-1 pr-3 font-medium">Product</th>
                  <th className="text-left text-muted pb-1 pr-3 font-medium">ราคา</th>
                  <th className="text-left text-muted pb-1 pr-3 font-medium">Val/Con</th>
                  <th colSpan={2} className="text-center pb-1 text-red-300 font-semibold text-[10px]">ประคอง/สวน</th>
                  <th colSpan={3} className="text-center pb-1 text-yellow font-semibold text-[10px]">Sideway</th>
                  <th colSpan={3} className="text-center pb-1 text-orange font-semibold text-[10px]">Scalp</th>
                  <th colSpan={7} className="text-center pb-1 text-green font-semibold text-[10px]">Run-Trend</th>
                </tr>
                <tr className="border-b border-border">
                  <th className="pb-2 pr-3"/><th className="pb-2 pr-3"/><th className="pb-2 pr-3"/>
                  {Array.from({length:GCOLS},(_,i)=>{
                    const s=gColStyle(i);
                    return<th key={i} className={`text-center pb-2 px-1 font-bold ${s.th}`} style={s.style}>G{i+1}</th>;
                  })}
                </tr>
              </thead>
              <tbody>
                {(products||[]).map(p=>{
                  const price=getPrice(p.id);
                  const vpc=price>0?p.contractSize*price:0;
                  return(
                    <tr key={p.id} className="border-b border-border/20">
                      <td className="py-2 pr-3 font-medium whitespace-nowrap">{p.currentContract}</td>
                      <td className="py-2 pr-2 tabular-nums">
                        {editingPrice===p.id
                          ?<span className="flex items-center gap-1">
                              <input autoFocus value={priceInput} onChange={e=>setPriceInput(e.target.value)}
                                onBlur={()=>{var v=+priceInput;setManualPrices(function(m){return Object.assign({},m,{[p.id]:v});});setEditingPrice(null);}}
                                className="w-20 bg-input border border-yellow/40 rounded px-1.5 py-0.5 text-xs text-txt"/>
                           </span>
                          :<span className="flex items-center gap-1.5">
                              <span className="text-muted">{price>0?fmtNum(price,p.digits):"—"}</span>
                              <button onClick={()=>{setEditingPrice(p.id);setPriceInput(price>0?String(price):"");}} className="text-muted hover:text-yellow text-xs opacity-60 hover:opacity-100">edit</button>
                           </span>}
                      </td>
                      <td className="py-2 pr-3 text-muted tabular-nums whitespace-nowrap">{vpc>0?fmtTHB(vpc,0):"—"}</td>
                      {Array.from({length:GCOLS},(_,i)=>{
                        const n=i+1;
                        const s=gColStyle(i);
                        const contracts=(vpc>0&&balance>0)?Math.floor(n*balance/vpc):null;
                        return(
                          <td key={i} className={`py-2 px-1 text-center tabular-nums font-semibold ${s.cell}`} style={s.style}>
                            {contracts!=null?contracts.toLocaleString("en-US"):"—"}
                          </td>
                        );
                      })}
                    </tr>
                  );
                })}
              </tbody>
            </table>
            <p className="text-muted text-[10px] mt-3">
              ราคา: {(products||[]).map(p=>`${p.baseSymbol||p.id} ${getPrice(p.id)>0?fmtNum(getPrice(p.id),p.digits):"—"}`).join(" · ")}
            </p>
          </div>
        );
      })()}

    </div>
  );
}
function PagePositions({trades,products,balance,portfolio,onAddTrade,onUpdateTrade,onDeleteTrade,showConfirm,showToast,livePrices:livePricesProp,liveTimestamps:liveTimestampsProp,liveErrors:liveErrorsProp,fetchPricesFn}){
  const[showForm,setShowForm]=useState(false);
  const[editTrade,setEditTrade]=useState(null);
  const[closingTrade,setClosingTrade]=useState(null);
  const[updatingPrice,setUpdatingPrice]=useState(null);
  const[detailTrade,setDetailTrade]=useState(null);
  const[executingDraft,setExecutingDraft]=useState(null);
  const[mergeMode,setMergeMode]=useState(false);
  const[mergeSym,setMergeSym]=useState(null);
  const[mergeIds,setMergeIds]=useState([]);

  const openTrades=useMemo(()=>trades.filter(t=>t.status==="open"),[trades]);
  const draftTrades=useMemo(()=>trades.filter(t=>t.status==="draft"),[trades]);
  const closedTrades=useMemo(()=>trades.filter(t=>t.status==="closed"),[trades]);

  const livePrices=livePricesProp||{};
  const liveTimestamps=liveTimestampsProp||{};
  const liveErrors=liveErrorsProp||{};

  const totalPV=useMemo(()=>{
    if(!openTrades.length)return 0;
    return openTrades.reduce((s,t)=>{const p=products.find(p=>p.id===t.productId);return s+calcPositionValue(p,t.contracts,t.entryPrice);},0);
  },[openTrades,products]);
  const totalGearingX=useMemo(()=>calcGearingX(totalPV,balance),[totalPV,balance]);
  const totalUnreal=useMemo(()=>openTrades.reduce((s,t)=>{
    const p=products.find(p=>p.id===t.productId);
    const lp=livePrices[t.productId];
    const cp=lp!=null?lp:(t.currentPrice||t.entryPrice);
    return s+calcPL(p,t.contracts,t.entryPrice,cp,t.direction);
  },0),[openTrades,products,livePrices]);
  const wins=closedTrades.filter(t=>{const p=products.find(p=>p.id===t.productId);return calcNetPL(p,t.contracts,t.entryPrice,t.exitPrice,t.direction)>0;}).length;
  const winRate=closedTrades.length?((wins/closedTrades.length)*100).toFixed(0):null;
  const todayStr=new Date().toDateString();
  const todayPL=useMemo(()=>closedTrades
    .filter(t=>t.exitDateTime&&new Date(t.exitDateTime).toDateString()===todayStr)
    .reduce((s,t)=>{const p=products.find(p=>p.id===t.productId);return s+calcNetPL(p,t.contracts,t.entryPrice,t.exitPrice,t.direction);},0)
  ,[closedTrades,products,todayStr]);

  const handleDuplicate=(trade)=>{
    const clone={...trade,id:uid(),openDateTime:localNow(),status:"draft",
      preNote:"[Copy] "+(trade.preNote||""),isMerged:false,mergedFromIds:[],subTrades:[],partialCloses:[],
      preImages:[...(trade.preImages||[])],};
    onAddTrade(clone);showToast("Duplicate เป็น Draft แล้ว","success");
  };

  const handleMerge=()=>{
    const sel=openTrades.filter(t=>mergeIds.includes(t.id));
    if(sel.length<2){showToast("เลือกอย่างน้อย 2 positions","error");return;}
    const totalC=sel.reduce((s,t)=>s+t.contracts,0);
    const avgEntry=sel.reduce((s,t)=>s+t.entryPrice*t.contracts,0)/totalC;
    const avgCurrent=sel.reduce((s,t)=>s+(t.currentPrice||t.entryPrice)*t.contracts,0)/totalC;
    const base=sel[0];
    const p=products.find(p=>p.id===base.productId);
    const digs=p?.digits||1;
    const merged={
      ...base,id:uid(),contracts:totalC,
      entryPrice:+avgEntry.toFixed(digs),currentPrice:+avgCurrent.toFixed(digs),
      isMerged:true,mergedFromIds:mergeIds,preImages:[],partialCloses:[],
      remainingContracts:totalC,
      preNote:`[Merged ${sel.length} positions — avg entry ${avgEntry.toFixed(digs)}]\n`
        +sel.map(t=>`• ${t.contracts} contracts @${t.entryPrice}`).join("\n"),
      subTrades:sel.map(t=>({id:t.id,contracts:t.contracts,entryPrice:t.entryPrice,exitPrice:null})),
    };
    sel.forEach(t=>onDeleteTrade(t.id));
    onAddTrade(merged);
    setMergeMode(false);setMergeSym(null);setMergeIds([]);
    showToast(`⊕ Merged ${sel.length} positions เรียบร้อย`,"success");
  };

  const startMerge=(tradeKey)=>{
    if(mergeMode&&mergeSym&&mergeSym!==tradeKey){
      showToast("เลือกได้เฉพาะ product และ direction เดียวกันเท่านั้น","error");return;
    }
    setMergeMode(true);setMergeSym(tradeKey);
    const tid=openTrades.find(t=>`${t.productId}_${t.direction}`===tradeKey&&!mergeIds.includes(t.id))?.id;
    if(tid)setMergeIds(prev=>[...prev,tid]);
  };
  const cancelMerge=()=>{setMergeMode(false);setMergeSym(null);setMergeIds([]);};
  const closingProduct=closingTrade?products.find(p=>p.id===closingTrade.productId):null;
  const useMergedClose=closingTrade?.isMerged&&(closingTrade?.subTrades||[]).length>0;

  return(
    <div className="space-y-4">
      {/* FTMO-style header — Current Results */}
      <div className="bg-card border border-border rounded-xl overflow-hidden">
        {/* Top bar: key metrics */}
        <div className="px-5 py-4 border-b border-border/40">
          <div className="flex items-center justify-between flex-wrap gap-4">
            {/* Balance */}
            <div>
              <span className="text-muted text-xs block mb-0.5">Portfolio Balance</span>
              <span className="text-2xl font-bold text-txt tabular-nums">{fmtTHB(balance,0)} ฿</span>
            </div>
            {/* Equity = balance + unrealized */}
            <div>
              <span className="text-muted text-xs block mb-0.5">Equity</span>
              <span className={`text-2xl font-bold tabular-nums ${(balance+totalUnreal)>=balance?"text-green":"text-red"}`}>
                {totalUnreal>=0?"+":""}{fmtTHB(balance+totalUnreal,0)} ฿
              </span>
            </div>
            {/* Unrealized P/L */}
            {openTrades.length>0&&(
              <div>
                <span className="text-muted text-xs block mb-0.5">Unrealized P/L</span>
                <span className={`text-xl font-bold tabular-nums ${totalUnreal>=0?"text-green":"text-red"}`}>
                  {totalUnreal>=0?"+":""}{fmtTHB(totalUnreal,0)} ฿
                </span>
              </div>
            )}
            {/* HWM & Drawdown */}
            {(()=>{
              const hwm=portfolio?.peakEquity||0;
              const equity=balance+totalUnreal;
              if(hwm<=0)return null;
              const dd=hwm>equity?(hwm-equity)/hwm*100:0;
              return(
                <div>
                  <span className="text-muted text-xs block mb-0.5">
                    HWM
                    {dd>0&&<span className={`ml-1.5 text-[10px] px-1.5 py-0.5 rounded-full font-bold ${dd>=20?"bg-red/15 text-red":dd>=10?"bg-yellow/15 text-yellow":"bg-muted/10 text-muted"}`}>
                      -{dd.toFixed(1)}%
                    </span>}
                  </span>
                  <span className="text-lg font-bold text-muted tabular-nums">{fmtTHB(hwm,0)} ฿</span>
                </div>
              );
            })()}
            <button onClick={()=>setShowForm(true)}
              className="px-5 py-2.5 rounded-xl font-bold text-sm bg-yellow text-black hover:bg-yellow/90 transition ml-auto">
              + เปิด Order
            </button>
          </div>
        </div>
        {/* Stats row */}
        <div className="px-5 py-3 flex gap-6 overflow-x-auto">
              <div className="flex-shrink-0">
                <span className="text-muted text-[10px] block">Position Value</span>
                <span className="text-sm font-semibold text-yellow tabular-nums">{openTrades.length?`${fmtTHB(totalPV,0)} ฿`:"0 ฿"}</span>
              </div>
              <div className="flex-shrink-0">
                <span className="text-muted text-[10px] block">Gearing</span>
                <span className={`text-sm font-semibold ${gearingColor(totalGearingX)}`}>{fmtGearing(totalGearingX)}</span>
              </div>
              <div className="flex-shrink-0">
                <span className="text-muted text-[10px] block">Today P/L (Net)</span>
                <span className={`text-sm font-semibold tabular-nums ${todayPL>=0?"text-green":"text-red"}`}>{todayPL>=0?"+":""}{fmtTHB(todayPL)} ฿</span>
              </div>
              <div className="flex-shrink-0">
                <span className="text-muted text-[10px] block mb-1">Win Rate</span>
                {(()=>{
                  const bePctX=portfolio?.breakevenPct??1.0;
                  let wX=0,lX=0,beX=0;
                  closedTrades.forEach(t=>{const p=products.find(x=>x.id===t.productId);const n=calcNetPL(p,t.contracts,t.entryPrice,t.exitPrice,t.direction);const pct=balance>0?n/balance*100:0;if(Math.abs(pct)<bePctX)beX++;else if(n>0)wX++;else lX++;});
                  return(<div><span className={`text-xs font-semibold ${winRate&&+winRate>=50?"text-green":winRate?"text-red":"text-muted"}`}>{winRate?`${winRate}%`:"—"}</span><div className="flex items-center gap-1 mt-0.5 flex-wrap"><span className="text-[10px] font-bold px-1 py-0.5 rounded bg-green/15 text-green">{wX}W</span><span className="text-[10px] font-bold px-1 py-0.5 rounded bg-red/15 text-red">{lX}L</span>{beX>0&&<span className="text-[10px] font-bold px-1 py-0.5 rounded bg-muted/15 text-muted">{beX}BE</span>}</div></div>);
                })()}
              </div>
              
        </div>{/* closes px-5 py-3 stats row */}
      </div>{/* closes bg-card overflow-hidden */}

      
      <StepsProgressBar portfolio={portfolio} trades={trades} products={products}/>

      
      {openTrades.length>0&&(()=>{
        const ALLOC_COLORS={s50:"#3B82F6",gold:"#F0B90B",silver:"#9CA3AF",usdjpy:"#8B5CF6"};
        const allocs=products.map(p=>{
          const ts=openTrades.filter(t=>{
            const pid=t.productId;
            return pid===p.id||pid===p.id+"_next";
          });
          const pv=ts.reduce((s,t)=>s+calcPositionValue(p,t.contracts,t.entryPrice),0);
          const c=ts.reduce((s,t)=>s+t.contracts,0);
          return{...p,pv,contracts:c,color:ALLOC_COLORS[p.id]||"#848E9C"};
        }).filter(a=>a.pv>0);
        const totalAllocated=allocs.reduce((s,a)=>s+a.pv,0);
        const cash=Math.max(0,balance-totalAllocated);
        const total=totalAllocated+cash;
        return(
          <AssetAllocationBar allocs={allocs} cash={cash} total={total}/>
        );
      })()}

      
      {mergeMode&&(
        <div className="fade-in bg-yellow/5 border border-yellow/30 rounded-xl px-4 py-3 flex items-center justify-between flex-wrap gap-2">
          <div className="text-yellow text-sm font-semibold">
            ⊕ Merge Mode
            {mergeSym&&<span className="text-muted font-normal ml-2">
              {(()=>{const[pid,dir]=mergeSym.split("_");const p=products.find(x=>x.id===pid);return`${p?.currentContract||pid} ${dir}`;})()}
              {" — "}{mergeIds.length} selected
            </span>}
          </div>
          <div className="flex gap-2">
            <button onClick={cancelMerge} className={clsBtn("default","sm")}>ยกเลิก</button>
            <button onClick={handleMerge} disabled={mergeIds.length<2}
              className={`${clsBtn("yellow","sm")} disabled:opacity-30 disabled:cursor-not-allowed`}>
              ⊕ Merge {mergeIds.length} positions
            </button>
          </div>
        </div>
      )}

      
      <section>
        <IMAlertBanner trades={trades} products={products} balance={balance} livePrices={livePrices} liveTimestamps={liveTimestamps}/>
        <h2 className="font-semibold text-txt mb-3 flex items-center justify-between">Open Positions <span className="text-muted font-normal text-sm">({openTrades.length})</span><button onClick={()=>fetchPricesFn&&fetchPricesFn()} className="text-xs text-muted hover:text-yellow transition px-2 py-0.5 rounded hover:bg-input font-normal">🔄 Refresh</button></h2>
        {openTrades.length===0
          ?<div className="bg-card border border-border border-dashed rounded-2xl p-10 text-center space-y-3">
            <div className="text-4xl">📭</div>
            <p className="text-txt font-semibold">ยังไม่มี Open Position</p>
            <p className="text-muted text-sm">กด <span className="text-yellow font-medium">+ เปิด Order</span> เพื่อเริ่มบันทึก trade แรก</p>
          </div>
          :(
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
              {openTrades.map(t=>{
                const p=products.find(p=>p.id===t.productId);
                const tradeKey=`${t.productId}_${t.direction}`;
                return(
                  <PositionCard key={t.id} trade={t} product={p} isDraft={false} balance={balance}
                    mergeMode={mergeMode} mergeSym={mergeSym}
                    isChecked={mergeIds.includes(t.id)}
                    onCheck={id=>setMergeIds(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id])}
                    onClose={()=>setClosingTrade(t)}
                    onEdit={()=>{setEditTrade(t);setShowForm(true);}}
                    onDelete={()=>showConfirm({title:"ลบ Order?",message:"ไม่สามารถกู้คืนได้",variant:"danger",onConfirm:()=>onDeleteTrade(t.id)})}
                    onExecute={null}
                    onUpdatePrice={()=>setUpdatingPrice(t)}
                    onMergeStart={startMerge}
                    onDuplicate={()=>handleDuplicate(t)}
                    livePrice={livePrices[t.productId]??null}
                    liveTimestamp={liveTimestamps[t.productId]??null}
                    liveError={!!liveErrors[t.productId]}
                    onShowDetail={setDetailTrade}
                  />
                );
              })}
            </div>
          )
        }
      </section>

      
      {draftTrades.length>0&&(
        <section>
          <h2 className="font-semibold text-txt mb-3">Plans / Drafts <span className="text-muted font-normal text-sm">({draftTrades.length})</span></h2>
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
            {draftTrades.map(t=>{
              const p=products.find(p=>p.id===t.productId);
              return(
                <PositionCard key={t.id} trade={t} product={p} isDraft={true} balance={balance}
                  mergeMode={false} mergeSym={null} isChecked={false} onCheck={()=>{}}
                  onClose={null}
                  onEdit={()=>{setEditTrade(t);setShowForm(true);}}
                  onDelete={()=>showConfirm({title:"ลบ Draft?",message:"ลบ draft นี้?",variant:"danger",onConfirm:()=>onDeleteTrade(t.id)})}
                  onExecute={()=>setExecutingDraft(t)}
                  onUpdatePrice={()=>setUpdatingPrice(t)}
                  onMergeStart={()=>{}}
                  onDuplicate={()=>handleDuplicate(t)}
                  livePrice={null}
                  liveTimestamp={null}
                  onShowDetail={setDetailTrade}
                />
              );
            })}
          </div>
        </section>
      )}

      
      {showForm&&(
        <OpenTradeForm products={products} initialData={editTrade} balance={balance} openTrades={openTrades}
          onSubmit={t=>{editTrade?onUpdateTrade(t):onAddTrade(t);setShowForm(false);setEditTrade(null);showToast(editTrade?"แก้ไข order แล้ว":"เพิ่ม order แล้ว","success");}} trades={trades} portfolio={portfolio}
          onCancel={()=>{setShowForm(false);setEditTrade(null);}}
          showToast={showToast}
        />
      )}
      {closingTrade&&closingProduct&&(
        useMergedClose?(
          <MergedCloseForm trade={closingTrade} product={closingProduct}
            onClose={updated=>{onUpdateTrade(updated);setClosingTrade(null);}}
            onCancel={()=>setClosingTrade(null)} showToast={showToast}/>
        ):(
          <CloseTradeForm trade={closingTrade} product={closingProduct}
            onClose={d=>{onUpdateTrade({...closingTrade,...d,status:"closed"});setClosingTrade(null);showToast("ปิด order เรียบร้อย","success");}}
            onCancel={()=>setClosingTrade(null)} showToast={showToast}/>
        )
      )}
      {updatingPrice&&(
        <UpdatePriceModal trade={updatingPrice} product={products.find(p=>p.id===updatingPrice.productId)}
          onSubmit={price=>{onUpdateTrade({...updatingPrice,currentPrice:price});setUpdatingPrice(null);}}
          onCancel={()=>setUpdatingPrice(null)}/>
      )}
      {detailTrade&&(
        <TradeDetailModal trade={detailTrade} product={products.find(p=>p.id===detailTrade.productId)}
          onClose={()=>setDetailTrade(null)}
          onUpdateTrade={t=>{onUpdateTrade(t);setDetailTrade(t);}}/>
      )}
      {executingDraft&&(
        <MindsetChecklistModal
          onConfirm={(missedItems)=>{
            const updated={...executingDraft,status:"open"};
            if(missedItems&&missedItems.length>0){
              const riskNote="⚠️ เข้าไม้โดยไม่ผ่าน checklist:\n"+missedItems.map(t=>"• "+t).join("\n")+"\n---\n";
              updated.preNote=riskNote+(executingDraft.preNote||"");
            }
            onUpdateTrade(updated);
            setExecutingDraft(null);
            showToast("Execute trade แล้ว ✅","success");
          }}
          onSaveDraft={()=>{
            setExecutingDraft(null);
            showToast("ยังคงเป็น Draft อยู่","info");
          }}
          onCancel={()=>setExecutingDraft(null)}
        />
      )}
    </div>
  );
}

function PageJournal({trades,products,balance,portfolio,onUpdateTrade,onImportTrades,onProductsChange,onBalanceSet}){
  const[detail,setDetail]=useState(null);
  const[showImport,setShowImport]=useState(false);
  const initFilters={product:"",direction:"",setup:"",rating:"",dateFrom:"",dateTo:""};
  const[filters,setFilters]=useState(initFilters);
  const[sortKey,setSortKey]=useState("exitDateTime");
  const[sortAsc,setSortAsc]=useState(false);
  const setFlt=k=>e=>setFilters(p=>({...p,[k]:e.target.value}));

  const closed=useMemo(()=>trades.filter(t=>t.status==="closed"),[trades]);

  const filtered=useMemo(()=>{
    let r=[...closed];
    if(filters.product)  r=r.filter(t=>t.productId===filters.product);
    if(filters.direction)r=r.filter(t=>t.direction===filters.direction);
    if(filters.setup)    r=r.filter(t=>t.setupType===filters.setup);
    if(filters.rating)   r=r.filter(t=>t.tradeRating===+filters.rating);
    if(filters.dateFrom) r=r.filter(t=>t.exitDateTime&&new Date(t.exitDateTime)>=new Date(filters.dateFrom));
    if(filters.dateTo)   r=r.filter(t=>t.exitDateTime&&new Date(t.exitDateTime)<=new Date(filters.dateTo+"T23:59:59"));
    r.sort((a,b)=>{
      const getPL=t=>{const p=products.find(p=>p.id===t.productId);return t.exitPrice!=null?calcPL(p,t.contracts,t.entryPrice,t.exitPrice,t.direction):0;};
      const getNetPL=t=>{const p=products.find(p=>p.id===t.productId);return t.exitPrice!=null?calcNetPL(p,t.contracts,t.entryPrice,t.exitPrice,t.direction):0;};
      let va,vb;
      const getTks=t=>{const p=products.find(p=>p.id===t.productId);if(!p||t.exitPrice==null)return 0;return((t.exitPrice-t.entryPrice)/p.tickSize)*(t.direction==="Long"?1:-1);};
      if(sortKey==="pl"){va=getPL(a);vb=getPL(b);}
      else if(sortKey==="netpl"){va=getNetPL(a);vb=getNetPL(b);}
      else if(sortKey==="ticks"){va=getTks(a);vb=getTks(b);}
    else if(sortKey==="comm"){const pa=products.find(p=>p.id===a.productId);const pb2=products.find(p=>p.id===b.productId);va=pa?getRoundTripComm(pa)*a.contracts:0;vb=pb2?getRoundTripComm(pb2)*b.contracts:0;}
    else if(sortKey==="outcome"){const bePct2=portfolio?.breakevenPct??1.0;const toOrd=t=>{const pp=products.find(p=>p.id===t.productId);const n=calcNetPL(pp,t.contracts,t.entryPrice,t.exitPrice,t.direction);const bal=balance||1;const pct2=n/bal*100;return Math.abs(pct2)<bePct2?1:n>0?0:2;};va=toOrd(a);vb=toOrd(b);}
      else{
        var isDate=(sortKey==="openDateTime"||sortKey==="exitDateTime");
        if(isDate){
          va=a[sortKey]?new Date(a[sortKey]).getTime():0;
          vb=b[sortKey]?new Date(b[sortKey]).getTime():0;
        } else {
          va=a[sortKey]||"";vb=b[sortKey]||"";
        }
      }
      if(typeof va==="number"&&typeof vb==="number")return sortAsc?va-vb:vb-va;
      return sortAsc?(String(va)>String(vb)?1:-1):(String(va)<String(vb)?1:-1);
    });
    return r;
  },[closed,filters,sortKey,sortAsc,products]);

  const toggleSort=k=>{if(sortKey===k)setSortAsc(p=>!p);else{setSortKey(k);setSortAsc(false);}};
  const TH=({k,children})=>(
    <th onClick={()=>toggleSort(k)}
      className="px-3 py-2.5 text-left text-muted text-xs font-medium cursor-pointer hover:text-txt select-none whitespace-nowrap">
      {children}{sortKey===k&&<span className="ml-0.5">{sortAsc?"▲":"▼"}</span>}
    </th>
  );
  const filteredWins=filtered.filter(t=>{const p=products.find(p=>p.id===t.productId);return t.exitPrice!=null&&calcNetPL(p,t.contracts,t.entryPrice,t.exitPrice,t.direction)>0;}).length;

  const[mergeActive,setMergeActive]=useState(false);
  const[selMerge,setSelMerge]=useState(new Set());
  const toggleSelMerge=(id)=>setSelMerge(prev=>{const s=new Set(prev);s.has(id)?s.delete(id):s.add(id);return s;});
  const exitMergeMode=()=>{setMergeActive(false);setSelMerge(new Set());};
  const mergeSelected=()=>{
    const sel=filtered.filter(t=>selMerge.has(t.id));
    if(sel.length<2)return;
    const p=products.find(px=>px.id===sel[0].productId);
    if(!p)return;
    const totalC=sel.reduce((s,t)=>s+(t.contracts||0),0);
    const avgEntry=sel.reduce((s,t)=>s+(t.entryPrice*(t.contracts||0)),0)/totalC;
    const avgExit=sel.filter(t=>t.exitPrice!=null).reduce((s,t,_,a)=>s+(t.exitPrice*(t.contracts||0)/a.reduce((ss,tt)=>ss+(tt.contracts||0),0)),0);
    const earliest=sel.map(t=>t.openDateTime).filter(Boolean).sort()[0];
    const latest=sel.map(t=>t.exitDateTime).filter(Boolean).sort().slice(-1)[0];
    const merged={
      id:"mrg_"+Date.now(),productId:sel[0].productId,contractCode:sel[0].contractCode,
      direction:sel[0].direction,contracts:totalC,
      entryPrice:+avgEntry.toFixed(p.digits||2),exitPrice:avgExit?+avgExit.toFixed(p.digits||2):null,
      openDateTime:earliest,exitDateTime:latest,
      setupType:sel[0].setupType,tradeRating:Math.round(sel.reduce((s,t)=>s+(t.tradeRating||0),0)/sel.length),
      isMerged:true,mergedFromIds:sel.map(t=>t.id),
      preNote:"[Merged "+sel.length+" trades] | "+sel.map(t=>fmtDate(t.openDateTime)+" "+fmtNum(t.entryPrice,p.digits)+"→"+(t.exitPrice?fmtNum(t.exitPrice,p.digits):"?")).join(" / "),
      postNote:"",preImages:[],postImages:[],partialCloses:[],subTrades:[],
      status:sel.every(t=>t.status==="closed")?"closed":"open",
    };
    onUpdateTrade&&sel.forEach(t=>onUpdateTrade({...t,_hiddenByMerge:true}));
    onImportTrades&&onImportTrades([merged]);
    setSelMerge(new Set());
  };

function parseBrokerDate(v){
  if(!v)return null;
  // SheetJS cellDates:true returns Date objects
  if(v instanceof Date){
    var y=v.getFullYear();
    var mo=String(v.getMonth()+1).padStart(2,"0");
    var d=String(v.getDate()).padStart(2,"0");
    var h=String(v.getHours()).padStart(2,"0");
    var mi=String(v.getMinutes()).padStart(2,"0");
    return y+"-"+mo+"-"+d+"T"+h+":"+mi;
  }
  // SheetJS serial number fallback (raw:true without cellDates)
  if(typeof v==="number"&&v>40000){
    var epoch=new Date(Math.round((v-25569)*86400*1000));
    return parseBrokerDate(epoch);
  }
  // String "4/8/2025" or "2025-08-04"
  var str=String(v).trim();
  if(!str)return null;
  if(str.includes("-")&&str.length>=10)return str.slice(0,16)||str;
  var parts=str.split(" ");
  var datePart=parts[0],timePart=parts[1]||"00:00";
  var dp=datePart.split("/");
  if(dp.length<3)return null;
  var dd=dp[0],mm=dp[1],yy=dp[2];
  return yy+"-"+mm.padStart(2,"0")+"-"+dd.padStart(2,"0")+"T"+timePart;
}

function loadSheetJS(cb){

  s.onload=cb;
  document.head.appendChild(s);
}

// Normalize column key: trim + collapse double spaces
function normCol(s){return String(s).trim().replace(/\s+/g," ");}

// Dynamic product resolver — rebuilt each parse using current products list
// Known typo corrections: maps bad prefix → {correctedCode, baseSymbol, productId}
var TYPO_CORRECTIONS=[
  {test:function(su){return su.startsWith("SO50");}, fix:function(s){return"S50"+s.slice(4);}, base:"S50"},
];

function resolveProductCode(v,products){
  var s=String(v||"").trim();
  if(!s)return{productId:null,contractCode:s};
  var su=s.toUpperCase();
  // Try exact contractCode match first
  var exact=(products||[]).find(function(p){return p.currentContract===s||(p.nextContract&&p.nextContract===s);});
  if(exact)return{productId:exact._baseId||exact.id,contractCode:s};
  // Try prefix match (baseSymbol)
  var prefix=(products||[]).find(function(p){return su.startsWith(p.baseSymbol.toUpperCase());});
  if(prefix)return{productId:prefix._baseId||prefix.id,contractCode:s};
  // Check typo corrections — return as unknown but with suggestion metadata
  for(var i=0;i<TYPO_CORRECTIONS.length;i++){
    var tc=TYPO_CORRECTIONS[i];
    if(tc.test(su)){
      var suggested=tc.fix(s);
      // Check if the corrected code already exists in products (user already accepted suggestion)
      var fixedExact=(products||[]).find(function(p){
        return p.currentContract===suggested||(p.nextContract&&p.nextContract===suggested);
      });
      if(fixedExact)return{productId:fixedExact._baseId||fixedExact.id,contractCode:suggested};
      // Otherwise return as unknown with suggestion metadata
      return{productId:null,contractCode:s,_typoSuggestion:{original:s,suggested:suggested,base:tc.base}};
    }
  }
  // Standard unknown fallbacks (these still hard-map, no typo suggestion needed)
  if(su.startsWith("GO"))return{productId:"gold",contractCode:s};
  if(su.startsWith("SVF"))return{productId:"silver",contractCode:s};
  if(su.startsWith("USDJPY"))return{productId:"usdjpy",contractCode:s};
  return{productId:null,contractCode:s};
}

const COLUMN_MAP={
  "Product":      function(v,products){
    var r=resolveProductCode(v,products);
    var out={productId:r.productId,contractCode:r.contractCode};
    if(r._typoSuggestion)out._typoSuggestion=r._typoSuggestion;
    return out;
  },
  "Side":         function(v){var s=String(v).trim();return{direction:s==="Long"?"Long":"Short"};},
  "Contract Size":function(v){return{contracts:+v||0};},
  "Date Start":   function(v){return{openDateTime:parseBrokerDate(v)};},
  "Start":        function(v){return{entryPrice:+v||0};},
  "Stop Loss":    function(v){return{stopLoss:(+v||0)||null};},
  "Take Profit":  function(v){return{takeProfit:(+v||0)||null};},
  "End":          function(v){
    // Could be formula string, 0, or actual price
    if(!v||v===0||typeof v==="string")return{exitPrice:null};
    return{exitPrice:+v||null};
  },
  "Date End":     function(v){return{exitDateTime:v?parseBrokerDate(v):null};},
  "Status":       function(v){var s=String(v).trim();return{status:(s==="Win"||s==="Lose")?"closed":"open"};},
  "Remark":       function(v){return{preNote:String(v||"").trim()};},
};

function UnknownProductErrors({errors,onCancel,products,onProductsChange,onReparse}){
  const[open,setOpen]=useState(true);
  const[created,setCreated]=useState({});
  const[creating,setCreating]=useState(null);// code being created

  // Group by product code
  var groups={};
  errors.forEach(function(e){var k=e._rawProduct||"?";groups[k]=(groups[k]||0)+1;});
  var keys=Object.keys(groups);

  function findBase(code){
    if(!code)return null;
    var c=String(code).toUpperCase();
    if(c.startsWith("SO50"))c="S50"+c.slice(4);
    return(products||[]).find(function(p){return c.startsWith(p.baseSymbol.toUpperCase());})||null;
  }

  // Get typo suggestion for a code (from parsed errors that have _typoSuggestion)
  function getTypoSuggestion(code){
    var e=(errors||[]).find(function(e){return (e._rawProduct===code||e.contractCode===code)&&e._typoSuggestion;});
    return e?e._typoSuggestion:null;
  }

  function quickAddWithCode(originalCode,useCode){
    var base=findBase(useCode);
    if(!base)return;
    var newId=base.id+"_"+useCode.toLowerCase().replace(/[^a-z0-9]/g,"");
    var newProduct={...base,id:newId,currentContract:useCode,nextContract:"",series:useCode.slice(-3),_isLegacy:true,_baseId:base.id};
    onProductsChange&&onProductsChange(function(prev){
      if(prev.find(function(p){return p.id===newId;}))return prev;
      return [...prev,newProduct];
    });
    setCreated(function(p){return{...p,[originalCode]:newId};});
    setCreating(null);
  }

  function quickAdd(code){
    var base=findBase(code);
    if(!base)return;
    var newId=base.id+"_"+code.toLowerCase().replace(/[^a-z0-9]/g,"");
    var newProduct={...base,id:newId,currentContract:code,nextContract:"",series:code.slice(-3),_isLegacy:true,_baseId:base.id};
    onProductsChange&&onProductsChange(function(prev){
      if(prev.find(function(p){return p.id===newId;}))return prev;
      return [...prev,newProduct];
    });
    setCreated(function(p){return{...p,[code]:newId};});
    setCreating(null);
  }

  var anyCreated=Object.keys(created).length>0;

  return(

                    <div className="font-semibold text-yellow text-[11px] mb-1">✦ สร้าง Product ใหม่จาก {base.name}</div>

                      {[

                        ["Initial Margin","฿"+fmtNum(base.initialMargin,0)+" / สัญญา"],

                      ].map(function(row){return(
                        <div key={row[0]}><span className="text-muted">{row[0]}</span><br/><span className="text-txt font-medium">{row[1]}</span></div>
                      );})}
                    </div>
                    <div className="flex gap-2 pt-1">
                      <button onClick={function(){quickAdd(k);}}
                        className="flex-1 py-1.5 rounded-lg bg-yellow text-black font-semibold hover:bg-yellow/90 transition text-xs">
                        ✓ ยืนยัน สร้าง {k}
                      </button>
                      <button onClick={function(){setCreating(null);}}
                        className="px-3 py-1.5 rounded-lg bg-input text-muted hover:text-txt transition text-xs">
                        ยกเลิก
                      </button>

              <button onClick={onReparse}
                className="w-full py-2 rounded-lg bg-green/10 text-green border border-green/20 hover:bg-green/20 transition font-semibold">

            <div className="px-3 py-2.5 text-muted/60">

function BalanceSetBannerWithDate({parsed,onBalanceSet}){
  var allDates=(parsed||[]).filter(function(t){return t.openDateTime;}).map(function(t){return t.openDateTime;}).sort();
  var firstDT=allDates[0]||null;
  var firstDate=null;
  if(firstDT){var d=new Date(firstDT);d.setDate(d.getDate()-1);firstDate=d.toISOString().slice(0,10);}
  function handleSet(amount){
    var txDate=firstDate?firstDate+"T09:00":new Date().toISOString().slice(0,16);
    onBalanceSet&&onBalanceSet({amount,date:txDate});
  }
  return<BalanceSetBanner onBalanceSet={handleSet} firstTradeDate={firstDate}/>;
}

function ExcelImportModal({products,existingTrades,balance,onImport,onCancel,onProductsChange,onBalanceSet}){
  const[step,setStep]=useState("upload");
  const[parsed,setParsed]=useState([]);
  const[errors,setErrors]=useState([]);
  const[selected,setSelected]=useState(new Set());
  const[loading,setLoading]=useState(false);
  const[dragOver,setDragOver]=useState(false);
  const[currentFile,setCurrentFile]=useState(null);

  function processFile(file,currentProducts){
    setCurrentFile(file);
    setLoading(true);
    loadSheetJS(function(){
      var reader=new FileReader();
      reader.onload=function(e){
        var wb=XLSX.read(e.target.result,{type:"array",cellDates:true});
        var ws=wb.Sheets[wb.SheetNames[0]];
        // Skip row 1 (metadata), use row 2 as headers, parse dates as Date objects
        // raw:true + cellDates:true in XLSX.read → Date objects for date cells, numbers for numerics
        var rowsRaw=XLSX.utils.sheet_to_json(ws,{defval:"",range:1,raw:true,cellDates:true});
        var goodRows=[],badRows=[];
        rowsRaw.forEach(function(row){
          // Normalize keys: trim all column names
          var normRow={};
          Object.keys(row).forEach(function(k){normRow[normCol(k)]=row[k];});
          // Skip completely empty rows (Excel reserves blank rows)
          if(!normRow["Order"]&&!normRow["Product"])return;
          var trade={setupType:"Other",postNote:"",preImages:[],postImages:[],partialCloses:[],isMerged:false,mergedFromIds:[],subTrades:[],id:"imp_"+Date.now()+"_"+Math.random().toString(36).slice(2)};
          Object.keys(COLUMN_MAP).forEach(function(col){
            if(normRow[col]!==undefined&&normRow[col]!==""){
              Object.assign(trade,COLUMN_MAP[col](normRow[col],currentProducts));
            }
          });
          if(!trade.productId)badRows.push({...trade,_raw:normRow,_rawProduct:normRow["Product"]||"?"});
          else{if(trade.exitPrice!=null&&trade.exitPrice!==0)trade.status="closed";goodRows.push({...trade,_raw:normRow});}
        });
        setParsed(goodRows);
        setErrors(badRows);
        var sel=new Set();
        goodRows.forEach(function(_,i){sel.add(i);});
        setSelected(sel);
        setLoading(false);
        setStep("preview");
      };
      reader.readAsArrayBuffer(file);
    });
  }

  function handleFile(file){
    if(!file)return;
    processFile(file,products);
  }

  function isDuplicate(t){
    return(existingTrades||[]).some(function(e){
      return e.productId===t.productId&&e.openDateTime===t.openDateTime&&e.entryPrice===t.entryPrice;
    });
  }

  function confirmImport(){
    var newTrades=[...selected].map(function(i){
      var t=parsed[i];
      return{...t,id:uid(),_raw:undefined};
    });
    onImport(newTrades);
  }

  function toggleAll(){
    if(selected.size===parsed.length)setSelected(new Set());
    else{var s=new Set();parsed.forEach(function(_,i){s.add(i);});setSelected(s);}
  }

  return(
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4"
      style={{background:"rgba(11,14,17,0.80)",backdropFilter:"blur(4px)"}}
      onClick={function(e){if(e.target===e.currentTarget)onCancel();}}>
      <div className="bg-card border border-border rounded-2xl w-full max-w-3xl shadow-2xl fade-in flex flex-col max-h-[90vh]">
        <div className="flex items-center justify-between px-5 pt-4 pb-3 border-b border-border/40 flex-shrink-0">
          <div>
            <span className="font-bold text-txt">📥 Import Excel</span>
            <span className="text-muted text-xs ml-3">{step==="upload"?"อัปโหลดไฟล์ broker":"ตรวจสอบและเลือก trades"}</span>
          </div>
          <button onClick={onCancel} className="text-muted hover:text-txt text-xl leading-none">✕</button>
        </div>

        {step==="upload"&&(
          <div className="p-8 flex flex-col items-center gap-4">
            <div
              onDragOver={function(e){e.preventDefault();setDragOver(true);}}
              onDragLeave={function(){setDragOver(false);}}
              onDrop={function(e){e.preventDefault();setDragOver(false);var f=e.dataTransfer.files[0];if(f)handleFile(f);}}
              onClick={function(){document.getElementById("xlsx-input").click();}}
              className={"border-2 border-dashed rounded-2xl p-10 w-full text-center cursor-pointer transition "+
                (dragOver?"border-yellow bg-yellow/5":"border-border/50 hover:border-yellow/50 bg-input/20")}>
              {loading?(
                <div className="text-yellow text-3xl animate-spin">⟳</div>
              ):(
                <>
                  <div className="text-4xl mb-3">📊</div>
                  <div className="text-txt font-semibold mb-1">วาง .xlsx ที่นี่ หรือคลิกเพื่อเลือกไฟล์</div>
                  <div className="text-muted text-xs">รองรับ .xlsx, .xls จาก broker TFEX T053</div>
                </>
              )}
            </div>
            <input id="xlsx-input" type="file" accept=".xlsx,.xls" className="hidden"
              onChange={function(e){if(e.target.files[0])handleFile(e.target.files[0]);}}/>
            {errors.length>0&&(
              <div className="text-yellow/80 text-xs bg-yellow/5 border border-yellow/20 rounded-lg px-3 py-2 w-full text-center">
                ⚠️ {errors.length} แถวไม่รู้จัก product — จะแสดงรายละเอียดใน preview
              </div>
            )}
          </div>
        )}

        {step==="preview"&&(
          <>
            <div className="overflow-y-auto flex-1 p-4">
              {/* Balance warning with inline set */}
              {balance<=0&&<BalanceSetBannerWithDate parsed={parsed} onBalanceSet={onBalanceSet}/>}
              {/* Unknown products breakdown */}
              {errors.length>0&&(
                <UnknownProductErrors errors={errors} onCancel={onCancel}
                  products={products} onProductsChange={onProductsChange}
                  onReparse={function(){if(currentFile)processFile(currentFile,products);}}/>
              )}
              {parsed.length===0?(
                <p className="text-muted text-sm text-center py-8">ไม่พบ trade ที่สามารถ import ได้</p>
              ):(
                <div className="overflow-x-auto">
                  <table className="w-full text-xs">
                    <thead>
                      <tr className="text-muted border-b border-border/40">
                        <th className="pb-2 font-medium text-center w-8">#</th>
                        <th className="text-left pb-2 font-medium pr-2">
                          <input type="checkbox" checked={selected.size===parsed.length}
                            onChange={toggleAll} className="accent-yellow cursor-pointer"/>
                        </th>
                        <th className="text-left pb-2 font-medium">Product</th>
                        <th className="pb-2 font-medium">Direction</th>
                        <th className="text-right pb-2 font-medium">Lots</th>
                        <th className="text-right pb-2 font-medium">Entry</th>
                        <th className="text-right pb-2 font-medium">Exit</th>
                        <th className="text-left pb-2 font-medium pl-2">Date Open</th>
                        <th className="pb-2 font-medium">W/L</th>
                        <th className="text-left pb-2 font-medium pl-2">Remark</th>
                      </tr>
                    </thead>
                    <tbody>
                      {parsed.map(function(t,i){
                        var dup=isDuplicate(t);
                        var chk=selected.has(i);
                        return(
                          <tr key={i} className={"border-b border-border/20 "+
                            (dup?"bg-yellow/5":"")}>
                            <td className="py-1.5 text-center text-muted/50 text-[10px] w-8 tabular-nums">{i+1}</td>
                            <td className="py-1.5 pr-2">
                              <input type="checkbox" checked={chk}
                                onChange={function(){var s=new Set(selected);s.has(i)?s.delete(i):s.add(i);setSelected(s);}}
                                className="accent-yellow cursor-pointer"/>
                            </td>
                            <td className="py-1.5">
                              <span className="font-semibold text-txt">{t.contractCode||t.productId}</span>
                              {dup&&<span className="ml-1 text-[10px] px-1.5 py-0.5 bg-yellow/20 text-yellow rounded font-semibold">ซ้ำ</span>}
                            </td>
                            <td className="py-1.5 text-center">
                              <span className={"text-[10px] font-bold px-1.5 py-0.5 rounded "+
                                (t.direction==="Long"?"bg-green/20 text-green":"bg-red/20 text-red")}>
                                {t.direction==="Long"?"L":"S"}
                              </span>
                            </td>
                            <td className="py-1.5 text-right tabular-nums text-muted">{t.contracts}</td>
                            <td className="py-1.5 text-right tabular-nums">{fmtNum(t.entryPrice,t.entryPrice>=100?1:2)}</td>
                            <td className="py-1.5 text-right tabular-nums text-muted">{t.exitPrice!=null?fmtNum(t.exitPrice,t.exitPrice>=100?1:2):"—"}</td>
                            <td className="py-1.5 pl-2 text-muted whitespace-nowrap">{t.openDateTime?.slice(0,10)||"—"}</td>
                            <td className="py-1.5 text-center">{(()=>{
                              if(t.status!=="closed"||t.exitPrice==null)return<span className="text-[10px] px-1.5 py-0.5 rounded bg-yellow/10 text-yellow/70">open</span>;
                              const p=products.find(p=>p.id===t.productId);
                              const net=p?calcNetPL(p,t.contracts,t.entryPrice,t.exitPrice,t.direction):null;
                              if(net==null)return<span className="text-muted text-[10px]">—</span>;
                              return net>0
                                ?<span className="text-[10px] font-bold px-1.5 py-0.5 rounded bg-green/20 text-green">W</span>
                                :<span className="text-[10px] font-bold px-1.5 py-0.5 rounded bg-red/20 text-red">L</span>;
                            })()}</td>
                            <td className="py-1.5 pl-2 text-muted max-w-[140px] truncate">{t.preNote||"—"}</td>

                        );
                      })}
                    </tbody>
                  </table>
                  {errors.length>0&&(
                    <div className="mt-3 text-red/70 text-xs bg-red/10 border border-red/20 rounded-lg px-3 py-2">

                  )}

              )}
            </div>
            <div className="p-4 border-t border-border/40 flex-shrink-0 flex items-center justify-between gap-3">

                  className={clsBtn("ghost","sm")}>← กลับ</button>

function PageDashboard({trades,products,balance,portfolio}){
  const SETUP_COLORS={"ประคองตลาด":"#3B82F6","สวนเทรนด์":"#F59E0B","Sideway":"#8B5CF6","Snow Ball":"#06B6D4","Scalp":"#F97316","Run-Trend":"#0ECB81","Other":"#848E9C"};
  const PROD_COLORS={gold:"#F0B90B",s50:"#3B82F6",silver:"#9CA3AF",usdjpy:"#8B5CF6"};
  const PROD_NAME={gold:"GOLD",s50:"S50",silver:"SILVER",usdjpy:"USDJPY"};

  const[timeFilter,setTimeFilter]=useState("all");
  const[activeSetups,setActiveSetups]=useState(()=>new Set(SETUP_TYPES));

  const getP=useCallback(t=>(products||[]).find(p=>p.id===t.productId),[products]);

  const allClosed=useMemo(()=>(trades||[]).filter(t=>t.status==="closed"&&t.exitDateTime).sort((a,b)=>new Date(a.exitDateTime)-new Date(b.exitDateTime)),[trades]);

  const closed=useMemo(()=>{
    var r=allClosed;
    if(timeFilter!=="all"){
      var now=new Date();
      var cutoff;
      if(timeFilter==="ytd"){
        cutoff=new Date(now.getFullYear(),0,1);
      }else{
        var months=timeFilter==="3m"?3:timeFilter==="6m"?6:12;
        cutoff=new Date(now.getFullYear(),now.getMonth()-months,now.getDate());
      }
      r=r.filter(t=>new Date(t.exitDateTime)>=cutoff);
    }
    if(activeSetups.size<SETUP_TYPES.length){
      r=r.filter(t=>activeSetups.has(t.setupType||"Other"));
    }
    return r;
  },[allClosed,timeFilter,activeSetups]);

  const metrics=useMemo(()=>{
    if(!closed.length)return null;
    var nets=closed.map(t=>calcNetPL(getP(t),t.contracts,t.entryPrice,t.exitPrice,t.direction));
    var bePctD=portfolio?.breakevenPct??1.0;
    var wA=[],lA=[],bA=[];
    nets.forEach(function(n){var pp=balance>0?Math.abs(n)/balance*100:0;if(pp<bePctD)bA.push(n);else if(n>0)wA.push(n);else lA.push(n);});
    var wins=wA,losses=lA;
    var winRate=nets.length>0?(wA.length/nets.length*100):0;
    var totalWinSum=wins.reduce((s,v)=>s+v,0);
    var totalLossSum=losses.reduce((s,v)=>s+v,0);
    var avgWin=wins.length?totalWinSum/wins.length:0;
    var avgLoss=losses.length?Math.abs(totalLossSum/losses.length):0;
    var pf=(totalWinSum>0&&totalLossSum<0)?totalWinSum/Math.abs(totalLossSum):null;
    var rr=avgLoss>0?avgWin/avgLoss:null;
    var running=0,peak=0,maxDDraw=0;
    nets.forEach(function(v){running+=v;if(running>peak)peak=running;var dd=running-peak;if(dd<maxDDraw)maxDDraw=dd;});
    var maxDDAbs=Math.abs(maxDDraw);
    var maxDDPct=peak>0?maxDDAbs/peak*100:(balance>0?maxDDAbs/balance*100:0);
    var largestWin=wins.length?Math.max.apply(null,wins):null;
    var largestLoss=losses.length?Math.min.apply(null,losses):null;
    var durations=closed.filter(t=>t.openDateTime&&t.exitDateTime).map(t=>(new Date(t.exitDateTime)-new Date(t.openDateTime)));

    return{winRate,pf,rr,maxDDAbs,maxDDPct,largestWin,largestLoss,avgHoldMs,fmtMs,avgWin,avgLoss,wins,losses,nets,totalTrades:nets.length};

      winPct:v.wins/(v.wins+v.losses)*100,

      var avgTkDur=tksArr.length?tksArr.reduce((s,v)=>s+v,0)/tksArr.length:null;
      return{label:b.label,trades:ts.length,avgPL,winPct,avgTkDur};

        {/* Winner / Loser Product */}
