            <p className="text-muted text-xs mt-0.5">{dateKey}</p>
          </div>
          <button onClick={onClose} className="text-muted hover:text-txt w-7 h-7 flex items-center justify-center rounded hover:bg-input">✕</button>
        </div>
        <div className="px-5 pb-5 space-y-4">
          <div>
            <span className="text-muted text-xs font-medium block mb-2">ความรู้สึกวันนี้</span>
            <div className="flex gap-2">
              {FEELINGS.map(em=>(
                <button key={em} onClick={()=>setMood(em)}
                  className={`flex-1 py-2.5 text-2xl rounded-xl transition border
                    ${mood===em?"bg-yellow/10 border-yellow/40":"bg-input border-border hover:border-yellow/20"}`}>
                  {em}
                </button>
              ))}
            </div>
          </div>
          <div>
            <span className="text-muted text-xs font-medium block mb-1.5">Note</span>
            <textarea value={note} onChange={e=>setNote(e.target.value)} rows={3}
              placeholder="จดความรู้สึก สิ่งที่เกิดขึ้น หรือบทเรียนวันนี้..."
              className={clsInput+" resize-none text-sm"}/>
          </div>
          <div className="flex gap-2 pt-1">
            {existing&&(
              <button onClick={()=>{onSave(dateKey,null,null);onClose();}}
                className={clsBtn("default","sm")}>🗑 ลบ</button>
            )}
            <button onClick={()=>{onSave(dateKey,mood,note);onClose();}}
              className={clsBtn("yellow","sm")+" flex-1"}>💾 บันทึก</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function PageCalendar({trades,products,uid,syncNotesToCloud}){
  const PROD_COLORS={gold:"#F0B90B",s50:"#3B82F6",silver:"#9CA3AF",usdjpy:"#8B5CF6"};
  const[calMode,setCalMode]=useState("heatmap");
  const[calLightbox,setCalLightbox]=useState(null);
  const[calMonth,setCalMonth]=useState(()=>{
    const n=new Date();
    return n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0");
  });
  const[calTooltip,setCalTooltip]=useState(null);
  const[dailyNotes,setDailyNotes]=useState(()=>ls.get("tj_daily_notes",{}));
  const[noteModal,setNoteModal]=useState(null);
  const[ganttDetail,setGanttDetail]=useState(null);

  const saveDailyNote=(dateKey,mood,note)=>{
    if(!mood){
      const updated={...dailyNotes};
      delete updated[dateKey];
      setDailyNotes(updated);
      ls.set("tj_daily_notes",updated);
      if(syncNotesToCloud)syncNotesToCloud(ls.get("tj_notes",[]),updated);
    }else{
      const updated={...dailyNotes,[dateKey]:{mood,note}};
      setDailyNotes(updated);
      ls.set("tj_daily_notes",updated);
      if(syncNotesToCloud)syncNotesToCloud(ls.get("tj_notes",[]),updated);
    }
  };

  const changeMonth=(delta)=>{
    const parts=calMonth.split("-"),yr=+parts[0],mo=+parts[1];
    const d=new Date(yr,mo-1+delta,1);
    setCalMonth(d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"));
  };

  const calData=useMemo(()=>{
    const m={};
    (trades||[]).forEach(t=>{
      const prod=(products||[]).find(p=>p.id===t.productId);
      // closed trades
      if(t.status==="closed"&&t.exitDateTime){
        const net=calcNetPL(prod,t.contracts,t.entryPrice,t.exitPrice,t.direction);
        const d=t.exitDateTime.slice(0,10);
        if(!m[d])m[d]={pnl:0,count:0};
        m[d].pnl+=net;m[d].count++;
      }
      // partial closes from merged open trades
      (t.partialCloses||[]).forEach(pc=>{
        if(!pc.exitDateTime||!pc.exitPrice)return;
        const net=calcNetPL(prod,pc.contracts,t.entryPrice,pc.exitPrice,t.direction);
        const d=pc.exitDateTime.slice(0,10);
        if(!m[d])m[d]={pnl:0,count:0};
        m[d].pnl+=net;m[d].count++;
      });
    });
    return m;
  },[trades,products]);

  const parts=calMonth.split("-"),yr=+parts[0],moNum=+parts[1];
  const days=new Date(yr,moNum,0).getDate();
  const first=new Date(yr,moNum-1,1).getDay();
  const maxPnl=Math.max(...Object.values(calData).map(v=>Math.abs(v.pnl)),1);
  const moName=new Date(yr,moNum-1,1).toLocaleDateString("th-TH",{month:"long",year:"numeric"});
  const cells=Array.from({length:days},(_,i)=>{
    const d=String(i+1).padStart(2,"0");
    const k=calMonth+"-"+d;
    return{day:i+1,key:k,data:calData[k]||null};
  });
  const moPnl=cells.reduce((s,c)=>s+(c.data?c.data.pnl:0),0);
  const moTrades=cells.reduce((s,c)=>s+(c.data?c.data.count:0),0);
  const today=new Date().toISOString().slice(0,10);

  const moStartStr=calMonth+"-01";
  const moEndStr=calMonth+"-"+String(days).padStart(2,"0");
  const timelineTrades=useMemo(()=>(trades||[]).filter(t=>{
    if(!t.openDateTime)return false;
    const tStart=t.openDateTime.slice(0,10);
    const tEnd=t.status==="open"?today:(t.exitDateTime?.slice(0,10)||today);
    return tStart<=moEndStr&&tEnd>=moStartStr;
  }),[trades,calMonth,today]);

  return(
    <div className="space-y-4">
      <div className="bg-card border border-border rounded-xl p-4">
        <div className="flex items-center justify-between flex-wrap gap-3">
          <div className="flex items-center gap-3">
            <div className="flex rounded-lg overflow-hidden border border-border text-xs">
              <button onClick={()=>setCalMode("heatmap")}
                className={`px-3 py-1.5 font-medium transition
                  ${calMode==="heatmap"?"bg-yellow text-black":"text-muted hover:text-txt hover:bg-input"}`}>
                🔥 Heatmap
              </button>
              <button onClick={()=>setCalMode("timeline")}
                className={`px-3 py-1.5 font-medium transition
                  ${calMode==="timeline"?"bg-yellow text-black":"text-muted hover:text-txt hover:bg-input"}`}>
                📊 Timeline
              </button>
            </div>
            {calMode==="heatmap"&&moTrades>0&&(
              <span className={"text-sm font-semibold tabular-nums "+(moPnl>=0?"text-green":"text-red")}>
                {moPnl>=0?"+":""}{fmtTHB(moPnl,0)} ฿ · {moTrades}t
              </span>
            )}
          </div>
          <div className="flex items-center gap-2">
            <button onClick={()=>changeMonth(-1)} className="w-8 h-8 rounded-lg bg-input hover:bg-input/80 text-muted hover:text-txt flex items-center justify-center transition">‹</button>
            <span className="font-semibold min-w-[120px] text-center">{moName}</span>
            <button onClick={()=>changeMonth(1)} className="w-8 h-8 rounded-lg bg-input hover:bg-input/80 text-muted hover:text-txt flex items-center justify-center transition">›</button>
            <button onClick={()=>setCalMonth(()=>{const n=new Date();return n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0");})}
              className="px-2.5 py-1.5 rounded-lg bg-input hover:bg-input/80 text-muted hover:text-txt text-xs transition">
              วันนี้
            </button>
          </div>
        </div>
      </div>

      <div className="bg-card border border-border rounded-xl p-5">
        {calMode==="heatmap"&&(
          <>
            <div className="border border-border/30 rounded-xl overflow-hidden">
            <div className="grid grid-cols-7">
              {["อา","จ","อ","พ","พฤ","ศ","ส"].map(d=>(
                <div key={d} className="py-1 text-center text-muted text-[10px] font-medium border-r border-b border-border/20 last:border-r-0">{d}</div>
              ))}
              {Array.from({length:first},(_,i)=><div key={"e"+i}/>)}
              {cells.map(cell=>{
                const{day,key:k,data}=cell;
                const has=!!data,profit=data&&data.pnl>0;
                const intensity=has?Math.min(1.0,0.35+Math.abs(data.pnl)/maxPnl*0.65):0;
                const bg=has?(profit?"rgba(14,203,129,"+intensity+")":"rgba(246,70,93,"+intensity+")"):"#1E2329";
                const isToday=k===today;
                const dn=dailyNotes[k];
                const isSelected=calTooltip&&calTooltip.key===k;
                return(
                  <div key={k}
                    onClick={()=>{
                      if(k>today)return;
                      setCalTooltip({key:k,day,data:data||null});
                    }}
                    className={"relative aspect-square flex flex-col items-center justify-center gap-0 cursor-pointer select-none border-r border-b border-border/20 "
                      +(isToday?"ring-2 ring-inset ring-yellow/60 ":"")
                      +(isSelected?"ring-2 ring-inset ring-white/30 ":"")}
                    style={{background:bg,minHeight:"44px"}}>
                    <span className="text-xs font-semibold leading-tight"
                      style={{color:has?"#EAECEF":"#4B5563"}}>{day}</span>
                    {data&&(
                      <span className="text-[9px] font-bold tabular-nums leading-tight mt-0.5"
                        style={{color:"#FFFFFF",textShadow:"0 1px 2px rgba(0,0,0,0.7)"}}>
                        {data.pnl>=0?"+":""}{fmtTHB(data.pnl,0)}
                      </span>
                    )}
                    {data&&data.count>1&&(
                      <span className="text-[8px] leading-none text-white/70">{data.count}t</span>
                    )}
                    {dn&&(
                      <span className="absolute bottom-0.5 right-0.5 text-[9px] leading-none">{dn.mood}</span>
                    )}
                    {!data&&!dn&&(
                      <span className="absolute bottom-0.5 right-0.5 text-[8px] text-border/60 leading-none">+</span>
                    )}
                  </div>
                );
              })}
            </div>
            </div>

            {calTooltip&&(
              <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4"
                style={{background:"rgba(11,14,17,0.7)",backdropFilter:"blur(2px)"}}
                onClick={e=>{if(e.target===e.currentTarget)setCalTooltip(null);}}>
                <div className="bg-card border border-border rounded-2xl w-full max-w-sm shadow-2xl fade-in">
                  <div className="flex items-center justify-between px-4 pt-4 pb-2 border-b border-border/40">
                    <span className="font-semibold text-sm">{calTooltip.key}</span>
                    <button onClick={()=>setCalTooltip(null)} className="text-muted hover:text-txt text-lg leading-none">✕</button>
                  </div>
                  <div className="p-4 space-y-3 overflow-y-auto max-h-[70vh]">
                    {(()=>{
                      const dayTrades=(trades||[]).filter(t=>t.status==="closed"&&(t.exitDateTime?.startsWith(calTooltip.key)||t.openDateTime?.startsWith(calTooltip.key)));
                      const w=dayTrades.filter(t=>{const p=(products||[]).find(pr=>pr.id===t.productId);return t.exitPrice!=null&&calcNetPL(p,t.contracts,t.entryPrice,t.exitPrice,t.direction)>0;}).length;
                      const l=dayTrades.filter(t=>t.exitPrice!=null).length-w;
                      return(
                        <>
                          {calTooltip.data&&(
                            <div className="flex items-center gap-4 flex-wrap pb-2 border-b border-border/30">
                              <div>
                                <span className="text-muted text-xs block">P/L</span>
                                <div className={"text-xl font-bold tabular-nums "+(calTooltip.data.pnl>=0?"text-green":"text-red")}>
                                  {calTooltip.data.pnl>=0?"+":""}{fmtTHB(calTooltip.data.pnl,0)} ฿
                                </div>
                              </div>
                              <div className="text-center">
                                <span className="text-muted text-xs block">เทรด</span>
                                <span className="text-txt font-semibold">{dayTrades.length} ไม้ · <span className="text-green">{w}W</span> <span className="text-red">{l}L</span></span>
                              </div>
                              <div className="text-center">
                                <span className="text-muted text-xs block">เฉลี่ย/ไม้</span>
                                <span className={"font-semibold tabular-nums "+(calTooltip.data.pnl>=0?"text-green":"text-red")}>
                                  {calTooltip.data.pnl>=0?"+":""}{fmtTHB(calTooltip.data.count>0?calTooltip.data.pnl/calTooltip.data.count:0,0)} ฿
                                </span>
                              </div>
                            </div>
                          )}
                          {dayTrades.length>0&&(
                            <div className="space-y-2">
                              {dayTrades.map(t=>{
                                const p=(products||[]).find(pr=>pr.id===t.productId);
                                const netPL=t.exitPrice!=null?calcNetPL(p,t.contracts,t.entryPrice,t.exitPrice,t.direction):null;
                                const isWin=netPL!=null&&netPL>0;
                                const isOpen=t.exitPrice==null;
                                return(
                                  <div key={t.id} className={"border rounded-xl p-2.5 "+(isOpen?"border-yellow/20 bg-yellow/5":isWin?"border-green/20 bg-green/5":"border-red/20 bg-red/5")}>
                                    <div className="flex items-center gap-2">
                                      {isOpen
                                        ?<span className="text-[10px] font-bold px-1.5 py-0.5 rounded-full bg-yellow/20 text-yellow shrink-0">OPEN</span>
                                        :isWin
                                          ?<span className="text-[10px] font-bold px-1.5 py-0.5 rounded-full bg-green/20 text-green shrink-0">WIN</span>
                                          :<span className="text-[10px] font-bold px-1.5 py-0.5 rounded-full bg-red/20 text-red shrink-0">LOSS</span>
                                      }
                                      <span className="font-semibold text-xs text-txt">{t.contractCode||p?.currentContract||t.productId}</span>
                                      <DirBadge dir={t.direction}/>
                                      <span className="text-muted text-[10px]">{t.contracts}สัญญา</span>
                                      {netPL!=null&&(
                                        <span className={"ml-auto font-bold tabular-nums text-xs "+(isWin?"text-green":"text-red")}>
                                          {isWin?"+":""}{fmtTHB(netPL,0)} ฿
                                        </span>
                                      )}
                                    </div>
                                    <div className="flex items-center gap-2 mt-1 text-[10px] text-muted">
                                      <span className="tabular-nums">{fmtNum(t.entryPrice,p?.digits)} → {t.exitPrice!=null?fmtNum(t.exitPrice,p?.digits):"?"}</span>
                                      <span>·</span>
                                      <span>{t.openDateTime?.slice(11,16)} → {t.exitDateTime?.slice(11,16)||"?"}</span>
                                      {t.setupType&&<><span>·</span><span className="text-yellow/60">{t.setupType}</span></>}
                                    </div>
                                    {/* Pre/Post images + notes in calendar */}
                                    {((t.preImages||[]).length>0||(t.postImages||[]).length>0||t.preNote||t.postNote)&&(
                                      <div className="mt-2 space-y-1.5 border-t border-border/20 pt-2">
                                        {(t.preImages||[]).length>0&&(
                                          <div className="flex gap-1 flex-wrap">
                                            {(t.preImages||[]).slice(0,3).map((src,idx)=>(
                                              <img key={idx} src={src}
                                                onClick={e=>{e.stopPropagation();setCalLightbox(src);}}
                                                className="w-24 h-16 object-cover rounded-lg cursor-pointer hover:opacity-80 transition border border-green/20"
                                                title="Pre-trade — กดขยาย"/>
                                            ))}
                                            {t.preNote&&<p className="w-full text-[10px] text-muted/80 leading-snug">{t.preNote.slice(0,80)}{t.preNote.length>80?"...":""}</p>}
                                          </div>
                                        )}
                                        {(t.postImages||[]).length>0&&(
                                          <div className="flex gap-1 flex-wrap">
                                            {(t.postImages||[]).slice(0,3).map((src,idx)=>(
                                              <img key={idx} src={src}
                                                onClick={e=>{e.stopPropagation();setCalLightbox(src);}}
                                                className="w-24 h-16 object-cover rounded-lg cursor-pointer hover:opacity-80 transition border border-blue-400/20"
                                                title="Post-trade — กดขยาย"/>
                                            ))}
                                            {t.postNote&&<p className="w-full text-[10px] text-muted/80 leading-snug">{t.postNote.slice(0,80)}{t.postNote.length>80?"...":""}</p>}
                                          </div>
                                        )}
                                        {!((t.preImages||[]).length>0||(t.postImages||[]).length>0)&&(t.preNote||t.postNote)&&(
                                          <p className="text-[10px] text-muted/80 leading-snug">{(t.preNote||t.postNote||"").slice(0,100)}</p>
                                        )}
                                      </div>
                                    )}
                                  </div>
                                );
                              })}
                            </div>
                          )}
                          {dailyNotes[calTooltip.key]?(
                            <div className="flex items-start gap-3 bg-input/30 rounded-xl p-3">
                              <span className="text-2xl flex-shrink-0">{dailyNotes[calTooltip.key].mood}</span>
                              <p className="text-sm text-txt leading-relaxed flex-1">
                                {dailyNotes[calTooltip.key].note||<span className="text-muted italic">ไม่มี note</span>}
                              </p>
                            </div>
                          ):(
                            <div className="text-muted text-sm text-center py-1 italic">ยังไม่มี note วันนี้</div>
                          )}
                          <button
                            onClick={()=>{setNoteModal({key:calTooltip.key});setCalTooltip(null);}}
                            className={clsBtn("yellow")+" w-full"}>
                            {dailyNotes[calTooltip.key]?"✏️ แก้ไข Note":"+ เพิ่ม Note"}
                          </button>
                        </>
                      );
                    })()}
                  </div>
                </div>
              </div>
            )}

            <div className="flex items-center gap-4 mt-3 text-xs text-muted flex-wrap">
              <div className="flex items-center gap-1.5"><span className="w-3 h-3 rounded" style={{background:"rgba(14,203,129,0.65)"}}/>Profit</div>
              <div className="flex items-center gap-1.5"><span className="w-3 h-3 rounded" style={{background:"rgba(246,70,93,0.65)"}}/>Loss</div>
              <div className="flex items-center gap-1.5"><span className="w-3 h-3 rounded" style={{background:"#1E2329",border:"1px solid #2B3139"}}/>No trade</div>
              <div className="flex items-center gap-1.5"><span className="text-[10px]">😊</span>มี daily note</div>
            </div>
          </>
        )}

        {calMode==="timeline"&&(
          <div className="space-y-2">
            <div className="flex" style={{marginLeft:"88px"}}>
              {Array.from({length:days},(_,i)=>(
                <div key={i} className="flex-1 text-center text-[9px] text-muted select-none"
                  style={{minWidth:0}}>
                  {i+1===1||i+1===8||i+1===15||i+1===22||i+1===days||i+1===today.slice(-2)*1?i+1:""}
                </div>
              ))}
            </div>

            {timelineTrades.length===0&&(
              <div className="text-center text-muted text-sm py-10">ไม่มี trade ในเดือนนี้</div>
            )}

            {timelineTrades.map(t=>{
              const p=(products||[]).find(x=>x.id===t.productId);
              const tStart=t.openDateTime.slice(0,10);
              const rawEnd=t.status==="open"?today:(t.exitDateTime?.slice(0,10)||today);
              const clampedStart=tStart<moStartStr?moStartStr:tStart;
              const clampedEnd=rawEnd>moEndStr?moEndStr:rawEnd;
              const startDay=new Date(clampedStart).getDate();
              const endDay=new Date(clampedEnd).getDate();
              const leftPct=(startDay-1)/days*100;
              const widthPct=Math.max(1/days*100,(endDay-startDay+1)/days*100);
              const isOpen=t.status==="open";
              const netPL=!isOpen?calcNetPL(p,t.contracts,t.entryPrice,t.exitPrice,t.direction):null;
              const color=isOpen
                ?(PROD_COLORS[t.productId]||"#848E9C")
                :(netPL>=0?"#0ECB81":"#F6465D");
              return(
                <React.Fragment key={t.id}>
                <div className="flex items-center gap-2 cursor-pointer"
                  onClick={()=>setGanttDetail(ganttDetail===t.id?null:t.id)}>
                  <div className="flex-shrink-0 text-right" style={{width:"88px"}}>
                    <div className="text-xs font-semibold text-txt leading-tight truncate">{p?.currentContract||t.productId}</div>
                    <div className={`text-[9px] leading-tight ${t.direction==="Long"?"text-green":"text-red"}`}>
                      {t.direction==="Long"?"▲ Long":"▼ Short"} · {t.contracts}c
                    </div>
                  </div>
                  <div className="flex-1 relative h-9 bg-input/20 rounded-lg overflow-hidden">
                    <div className="absolute top-1 bottom-1 rounded-md flex items-center overflow-hidden"
                      style={{
                        left:leftPct+"%",
                        width:widthPct+"%",
                        background:color+"25",
                        border:"1.5px solid "+color+(isOpen?"cc":"66"),
                        minWidth:"6px",
                        boxShadow:isOpen?"0 0 8px "+color+"44":"none",
                      }}>
                      <span className="px-1.5 text-[9px] font-semibold whitespace-nowrap truncate" style={{color}}>
                        {isOpen?(
                          <span className="flex items-center gap-0.5">
                            <span className="w-1.5 h-1.5 rounded-full live-dot inline-block" style={{background:color}}/>
                            {" open · "+t.contracts+"c"+(t.partialCloses?.length>0?" ("+t.partialCloses.length+"TP)":"")}{/* partial TP count */}
                          </span>
                        ):((netPL>=0?"+":"")+fmtCompact(netPL||0)+" ฿")}
                      </span>
                      {/* Partial close markers on bar */}
                      {isOpen&&(t.partialCloses||[]).map((pc,pi)=>{
                        if(!pc.exitDateTime)return null;
                        const pcDay=new Date(pc.exitDateTime.slice(0,10)).getDate();
                        const pcLeft=(pcDay-1)/days*100;
                        return<div key={pi} className="absolute top-0 bottom-0 w-0.5" style={{left:pcLeft+"%",background:"#F0B90B88",pointerEvents:"none"}} title={"Partial TP: "+pc.contracts+"c @ "+pc.exitPrice}/>;
                      })}
                    </div>
                    {today.slice(0,7)===calMonth&&(()=>{
                      const td=new Date(today).getDate();
                      return<div className="absolute top-0 bottom-0 w-0.5 bg-yellow/50 pointer-events-none"
                        style={{left:((td-0.5)/days*100)+"%"}}/>;
                    })()}
                  </div>
                </div>
                {ganttDetail===t.id&&(
                  <div className="ml-[92px] mt-1 mb-1 fade-in bg-input/80 border border-border rounded-xl px-3 py-2.5 text-xs space-y-1.5">
                    <div className="flex items-center justify-between">
                      <span className="font-semibold text-txt">{p?.currentContract} · {t.direction} · {t.contracts}c</span>
                      <button onClick={e=>{e.stopPropagation();setGanttDetail(null);}} className="text-muted hover:text-txt">✕</button>
                    </div>
                    <div className="flex gap-4 flex-wrap text-muted">
                      <span>Entry: <span className="text-txt font-medium">{fmtNum(t.entryPrice,p?.digits)}</span></span>
                      {!isOpen&&<span>Exit: <span className="text-txt font-medium">{fmtNum(t.exitPrice,p?.digits)}</span></span>}
                      <span>เปิด: <span className="text-txt">{t.openDateTime?.slice(0,10)}</span></span>
                      {!isOpen&&<span>ปิด: <span className="text-txt">{t.exitDateTime?.slice(0,10)}</span></span>}
                      {t.setupType&&<span>Setup: <span className="text-yellow">{t.setupType}</span></span>}
                    </div>
                    {!isOpen&&netPL!=null&&(
                      <div className={`font-bold text-sm tabular-nums ${netPL>=0?"text-green":"text-red"}`}>
                        {netPL>=0?"+":""}{fmtTHB(netPL,0)} ฿
                      </div>
                    )}
                  </div>
                )}
                </React.Fragment>
              );
            })}

            <div className="flex items-center gap-2 mt-3 pt-3 border-t border-border/30">
              <div className="w-24 flex-shrink-0 flex items-center justify-end pr-2">
                <span className="text-[10px] text-muted font-medium">📝 Note</span>
              </div>
              <div className="flex-1 flex">
                {Array.from({length:days},(_,i)=>{
                  const d=String(i+1).padStart(2,"0");
                  const k=calMonth+"-"+d;
                  const dn=dailyNotes[k];
                  const isFuture=k>today;
                  return(
                    <button key={k}

                      disabled={isFuture}
                      title={dn?(dn.mood+" "+(dn.note||"").slice(0,40)+(dn.note&&dn.note.length>40?"...":"")):(isFuture?"—":("กด + เพิ่ม note วัน "+k))}
                      className={`flex-1 flex items-center justify-center h-8 rounded transition
                        ${isFuture?"opacity-20 cursor-not-allowed":"hover:bg-input/60 cursor-pointer"}`}
                      style={{minWidth:0}}>
                      {dn
                        ?<span className="text-[12px] leading-none">{dn.mood}</span>
                        :<span className={`text-[9px] font-bold ${isFuture?"text-border/30":k===today?"text-yellow/60":"text-border/50 group-hover:text-muted"}`}>
                          {k===today?"＋":"·"}
                        </span>}
                    </button>
                  );
                })}
              </div>
            </div>
            {/* Gantt instruction hint */}
            <div className="mt-2 flex items-center gap-1.5 text-[10px] text-muted/60">
              <span>💡</span>
              <span>กดที่ emoji 📝 เพื่อดู/แก้ไข note · กดที่ · เพื่อเพิ่ม note ในวันนั้น · วันอนาคตเพิ่มไม่ได้</span>
            </div>

            <div className="flex items-center gap-3 mt-1 text-[10px] text-muted flex-wrap">
              <span className="flex items-center gap-1">
                <span className="w-1.5 h-1.5 rounded-full bg-yellow live-dot inline-block"/>open trade
              </span>
              <span className="flex items-center gap-1.5">
                <span className="w-0.5 h-3 bg-yellow/50 inline-block"/>วันนี้
              </span>
              {Object.entries(PROD_COLORS).map(([k,c])=>(
                <span key={k} className="flex items-center gap-1">
                  <span className="w-2.5 h-2.5 rounded-sm inline-block"
                    style={{background:c+"33",border:"1.5px solid "+c+"77"}}/>
                  {k.toUpperCase()}
                </span>
              ))}
            </div>
          </div>
        )}
      </div>

      <div className="bg-card border border-border rounded-xl p-4">
        <div className="flex items-center justify-between mb-3">
          <h3 className="font-semibold text-sm">📝 Note วันนี้</h3>
          <span className="text-muted text-xs">{today}</span>
        </div>
        {dailyNotes[today]?(
          <div className="flex items-start gap-3">
            <span className="text-2xl flex-shrink-0">{dailyNotes[today].mood}</span>
            <div className="flex-1 min-w-0">
              <p className="text-sm text-txt leading-relaxed whitespace-pre-wrap">
                {dailyNotes[today].note||<span className="text-muted italic">ไม่มี note</span>}
              </p>
            </div>
            <button onClick={()=>setNoteModal({key:today})}
              className="text-xs text-muted hover:text-yellow transition px-2 py-1 rounded hover:bg-input flex-shrink-0">
              ✏️ แก้ไข
            </button>
          </div>
        ):(
          <button onClick={()=>setNoteModal({key:today})}
            className="w-full py-3 rounded-xl border border-dashed border-border hover:border-yellow/40 text-muted hover:text-yellow text-sm transition flex items-center justify-center gap-2">
            <span className="text-lg">+</span> เพิ่ม note วันนี้
          </button>
        )}
      </div>

      {noteModal&&(
        <DailyNoteModal
          dateKey={noteModal.key}
          existing={dailyNotes[noteModal.key]||null}
          onSave={saveDailyNote}
          onClose={()=>setNoteModal(null)}
        />
      )}
    {calLightbox&&(
      <div className="fixed inset-0 bg-black/95 z-[90] flex items-center justify-center p-4"
        onClick={()=>setCalLightbox(null)}>
        <button onClick={()=>setCalLightbox(null)}
          className="absolute top-4 right-4 text-white/70 hover:text-white text-2xl w-10 h-10 flex items-center justify-center rounded-full bg-white/10 transition">✕</button>
        <img src={calLightbox} style={{maxWidth:"92vw",maxHeight:"85vh",objectFit:"contain",display:"block",borderRadius:12}}/>
      </div>
    )}
    </div>
  );
}


function App({session,onSignOut}){
  const[trades,   setTrades]   =useState(()=>ls.get("tj_trades",[]));
  const[portfolio,setPortfolio]=useState(()=>{
    const saved=ls.get("tj_portfolio",null);
    if(!saved)return{transactions:[],stepBaseMode:"first_deposit"};
    if(!saved.transactions)return{...saved,transactions:[]};
    return saved;
  });
  const[products, setProducts] =useState(()=>{
    const saved=ls.get("tj_products", DEFAULT_PRODUCTS);
    return saved.map(p=>{
      if(p.commission&&!p.commissionPerLeg){
        const{commission:_,...rest}=p;
        return{...rest,commissionPerLeg:+(p.commission/2/1.07).toFixed(4),vatEnabled:true,vatRate:0.07};
      }
      return p;
    });
  });
  const[page,     setPage]     =useState("positions");
  const[mobileMenu,setMobileMenu]=useState(false);
  const[showNotif, setShowNotif] =useState(false);
  const[notifHistory,setNotifHistory]=useState(()=>ls.get("tj_notif_history",[]));
  const[clock,    setClock]    =useState(new Date());
  const[profitDismissed,setProfitDismissed]=useState(false);
  const tfex=useTFEXMarketStatus();

  const[toasts,setToasts]=useState([]);
  const showToast=useCallback((message,variant="info")=>{
    const id=uid();
    setToasts(p=>[...p,{id,message,variant}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),3000);
  },[]);
  const dismissToast=useCallback(id=>setToasts(p=>p.filter(t=>t.id!==id)),[]);

  const[confirmState,setConfirmState]=useState(null);
  const showConfirm=useCallback((opts)=>setConfirmState({open:true,...opts}),[]);
  const hideConfirm=useCallback(()=>setConfirmState(null),[]);

  const[showSetup,setShowSetup]=useState(()=>!ls.get("tj_tutorial_done",false));
  // ─── Track peak equity separately ─────────────────────────
  useEffect(()=>{
    const txB=(portfolio?.transactions||[]).reduce((s,t)=>s+(t.type==="deposit"?t.amount:-t.amount),0);
    const rPL=trades.filter(t=>t.status==="closed").reduce((s,t)=>{
      const p=products.find(x=>x.id===t.productId);
      return s+calcNetPL(p,t.contracts,t.entryPrice,t.exitPrice,t.direction);
    },0);
    const unreal=trades.filter(t=>t.status==="open"&&t.entryPrice).reduce((s,t)=>{
      const p=products.find(x=>x.id===t.productId);if(!p)return s;
      const lp=(livePrices||{})[p.id]||t.currentPrice||t.entryPrice;
      return s+((lp-t.entryPrice)/p.tickSize)*p.tickValue*(t.remainingContracts||t.contracts)*(t.direction==="Long"?1:-1);
    },0);
    const equity=txB+rPL+unreal;
    const stored=portfolio?.peakEquity||0;
    if(equity>stored&&equity>0){
      setPortfolio(p=>({...p,peakEquity:equity}));
    }
  },[trades,products,livePrices,portfolio?.transactions,portfolio?.peakEquity]);

  // ─── Notification generator (persisted) ────────────────────
  useEffect(()=>{
    const today=new Date().toISOString().slice(0,10);
    const now=new Date().toISOString();
    const txBalance2=(portfolio?.transactions||[]).reduce((s,t)=>s+(t.type==="deposit"?t.amount:-t.amount),0);
    const realizedPL2=trades.filter(t=>t.status==="closed").reduce((s,t)=>{
      const p=products.find(x=>x.id===t.productId);
      return s+calcNetPL(p,t.contracts,t.entryPrice,t.exitPrice,t.direction);
    },0);
    const bal2=txBalance2+realizedPL2;
    const candidates=[];

    // IM Alert
    const usedM=trades.filter(t=>t.status==="open").reduce((s,t)=>{
      const p=products.find(x=>x.id===t.productId);
      return s+(p?(p.initialMargin||0)*(t.remainingContracts||t.contracts):0);
    },0);
    if(bal2>0&&usedM/bal2>=0.8){
      const bucket=Math.floor(usedM/bal2*10)*10;
      candidates.push({id:`im_${today}_${bucket}`,type:"danger",icon:"⚠️",
        title:"Margin Alert",
        detail:`ใช้ margin ${(usedM/bal2*100).toFixed(0)}% ของ balance`,
        msg:"IM เหลือน้อย — ระวัง margin call",time:now});
    }

    // Circuit Breaker
    // CB: track peak equity (stored in portfolio.peakEquity)
    const txBal2cb=(portfolio?.transactions||[]).reduce((s,t)=>s+(t.type==="deposit"?t.amount:-t.amount),0);
    const unrealTotal2=trades.filter(t=>t.status==="open"&&t.entryPrice).reduce((s,t)=>{
      const pp=products.find(x=>x.id===t.productId);if(!pp)return s;
      const lp=(livePrices||{})[pp.id]||t.currentPrice||t.entryPrice;
      return s+((lp-t.entryPrice)/pp.tickSize)*pp.tickValue*(t.remainingContracts||t.contracts)*(t.direction==="Long"?1:-1);
    },0);
    const currentEquity=txBal2cb+realizedPL2+unrealTotal2;
    // Update peakEquity if current is higher
    const storedPeak=portfolio?.peakEquity||0;
    const peakEquity=Math.max(storedPeak,currentEquity,txBal2cb);
    // Note: peakEquity is updated in a separate useEffect below
    const cbPct2=(portfolio?.circuitBreakerPct??30)/100;
    if(peakEquity>0&&currentEquity<peakEquity){
      const dd=(peakEquity-currentEquity)/peakEquity*100;
      const bucket=Math.floor(dd/5)*5;
      if(dd>=cbPct2*100){
        candidates.push({id:`cb_${today}_${bucket}`,type:"danger",icon:"🚨",
          title:"Circuit Breaker!",
          detail:`Equity ลดลง ${dd.toFixed(1)}% จาก peak ${fmtTHB(peakEquity,0)}฿`,
          msg:"ปิดทุกไม้แล้วนั่งนิ่ง — ห้ามเพิ่มขนาด",time:now});
      } else if(dd>=cbPct2*100*0.67){
        const wBucket=Math.floor(dd/5)*5;
        candidates.push({id:`cbw_${today}_${wBucket}`,type:"warn",icon:"🔴",
          title:"Drawdown Warning",
          detail:`Equity ลดลง ${dd.toFixed(1)}% จาก peak — เหลืออีก ${(cbPct2*100-dd).toFixed(1)}%`,
          msg:"ใกล้ถึง circuit breaker — ระวัง",time:now});
      }
    }

    // Profit reminder per open trade
    trades.filter(t=>t.status==="open"&&t.entryPrice).forEach(t=>{
      const p=products.find(x=>x.id===t.productId);
      if(!p)return;
      const lp=(livePrices||{})[p.id]||t.currentPrice||t.entryPrice;
      const unreal=((lp-t.entryPrice)/p.tickSize)*p.tickValue*(t.remainingContracts||t.contracts)*(t.direction==="Long"?1:-1);
      const profAlertPct=(portfolio?.profitAlertPct??5)/100;
      if(bal2<=0||unreal/bal2<=profAlertPct)return;
      const pct=unreal/bal2*100;
      const ticks=((lp-t.entryPrice)/p.tickSize)*(t.direction==="Long"?1:-1);
      const daysOpen=t.openDateTime?Math.floor((Date.now()-new Date(t.openDateTime))/86400000):0;
      const gearPV=p.contractSize*(t.entryPrice||0)*(t.remainingContracts||t.contracts);
      const gearX=bal2>0?(gearPV/bal2).toFixed(1):"?";
      const bucket=Math.floor(pct/5)*5;
      candidates.push({id:`profit_${t.id}_${today}_${bucket}`,type:"info",icon:"⚡",
        title:`${t.contractCode||p.currentContract} ${t.direction==="Long"?"▲":"▼"} ${t.remainingContracts||t.contracts}c`,
        detail:`+${pct.toFixed(1)}% port · +${ticks.toFixed(0)} ticks · Gearing ${gearX}X · ถือ ${daysOpen} วัน`,
        msg:"ทอดสมอกลางพายุ 🪝 ล็อค profit อย่ารอตอนย่อ",
        time:now});
    });

    // Big Win Cooldown Alert
    const cooldownPct=portfolio?.cooldownPct??20;
    const todayClosedTrades=trades.filter(t=>t.status==="closed"&&t.exitDateTime&&t.exitDateTime.slice(0,10)===today);
    todayClosedTrades.forEach(t=>{
      const p=products.find(x=>x.id===t.productId);
      const n=calcNetPL(p,t.contracts,t.entryPrice,t.exitPrice,t.direction);
      if(bal2>0&&n/bal2*100>=cooldownPct){
        const notifId="bigwin_"+t.id+"_"+today;
        candidates.push({id:notifId,type:"warn",icon:"🧊",
          title:"Big Win — Cooldown Mode",
          detail:(t.contractCode||p?.currentContract||t.productId)+" +"+fmtTHB(n,0)+"฿ (+"+(n/bal2*100).toFixed(1)+"%)",
          msg:"กำไรใหญ่เกิน "+cooldownPct+"% — ลด position size ลงครึ่งนึงในไม้ถัดไป เพื่อรักษากำไรไว้",
          time:now});
      }
    });
    const pRB=ls.get("tj_patterns",[]);
    if(pRB.length>0){
      const dRB=["อาทิตย์","จันทร์","อังคาร","พุธ","พฤหัส","ศุกร์","เสาร์"][new Date().getDay()];
      trades.filter(t=>t.status==="open").forEach(t=>{
        const p=products.find(x=>x.id===t.productId);
        const base=p?.baseSymbol||t.productId||"";
        pRB.forEach(pat=>{if((pat.product==="ทุก Product"||pat.product===base||pat.product===t.productId)&&(pat.day==="ทุกวัน"||pat.day===dRB)){candidates.push({id:"pat_"+pat.id+"_"+t.id+"_"+today,type:pat.severity==="danger"?"danger":pat.severity==="info"?"info":"warn",icon:"🧠",title:"Pattern: "+pat.trigger.slice(0,40),detail:(t.contractCode||p?.currentContract||t.productId)+" · "+t.direction,msg:pat.action,time:now});}});
      });
    }
    // Append only NEW ids to history
    setNotifHistory(prev=>{
      const existingIds=new Set(prev.map(n=>n.id));
      const toAdd=candidates.filter(c=>!existingIds.has(c.id)).map(c=>({...c,read:false}));
      if(toAdd.length===0)return prev;
      const updated=[...toAdd,...prev].slice(0,100); // keep max 100
      ls.set("tj_notif_history",updated);
      return updated;
    });
  },[trades,products,portfolio,livePrices]);

  const unreadCount=notifHistory.filter(n=>!n.read).length;
  const markRead=(id)=>setNotifHistory(prev=>{
    const updated=prev.map(n=>n.id===id?{...n,read:true}:n);
    ls.set("tj_notif_history",updated);
    return updated;
  });
  const markAllRead=()=>setNotifHistory(prev=>{
    const updated=prev.map(n=>({...n,read:true}));
    ls.set("tj_notif_history",updated);
    return updated;
  });
  const deleteAllNotifs=()=>{ls.set("tj_notif_history",[]);setNotifHistory([]);};
  const deleteOneNotif=(id)=>setNotifHistory(prev=>{
    const updated=prev.filter(n=>n.id!==id);
    ls.set("tj_notif_history",updated);
    return updated;
  });

  const completeSetup=useCallback(()=>{ls.set("tj_tutorial_done",true);setShowSetup(false);},[]);

  useEffect(()=>{ls.set("tj_trades",   trades);   },[trades]);
  useEffect(()=>{ls.set("tj_portfolio",portfolio); },[portfolio]);
  useEffect(()=>{ls.set("tj_products", products);  },[products]);

  // ─── Supabase sync ───────────────────────────────────────────────────────
  const authUid=session?.user?.id;
  const dbTimers=useRef({});
  // Load from Supabase on login
  useEffect(()=>{
    if(!authUid)return;
    db.loadAll(authUid).then(data=>{
      if(data.trades!==null)   { setTrades(data.trades);    ls.set("tj_trades",   data.trades);   }
      if(data.portfolio!==null){
        // Merge stepHistory: keep local events not yet in Supabase (generated before first save)
        setPortfolio(local=>{
          const remoteEvents=data.portfolio.stepHistory||[];
          const localEvents=local.stepHistory||[];
          const remoteIds=new Set(remoteEvents.map(e=>e.date+e.step+e.event));
          const newLocal=localEvents.filter(e=>!remoteIds.has(e.date+e.step+e.event));
          const merged={...data.portfolio,stepHistory:[...remoteEvents,...newLocal]};
          ls.set("tj_portfolio",merged);
          return merged;
        });
      }
      if(data.products!==null) { setProducts(data.products);  ls.set("tj_products", data.products);  }
      if(data.notesFreeform!==null){ ls.set("tj_notes",data.notesFreeform); }
      if(data.notesDaily!==null)   { ls.set("tj_daily_notes",data.notesDaily); }
    });
  },[authUid]);
  // Save to Supabase on changes (1.5 s debounce)
  useEffect(()=>{
    if(!authUid)return;
    clearTimeout(dbTimers.current.trades);
    dbTimers.current.trades=setTimeout(()=>{
      db.saveTrades(authUid,trades);
      if(sheetsSync.getUrl())sheetsSync.push(trades,products);
    },1500);
  },[trades,uid]);
  useEffect(()=>{
    if(!authUid)return;
    clearTimeout(dbTimers.current.portfolio);
    dbTimers.current.portfolio=setTimeout(()=>db.savePortfolio(authUid,portfolio),1500);
  },[portfolio,uid]);
  useEffect(()=>{
    if(!authUid)return;
    clearTimeout(dbTimers.current.products);
    dbTimers.current.products=setTimeout(()=>db.saveProducts(authUid,products),1500);
  },[products,uid]);

  // Notes & daily notes Supabase sync — driven by custom events from PageNotes/PageCalendar
  const syncNotesToCloud=useCallback((freeform,daily)=>{
    if(!authUid)return;
    clearTimeout(dbTimers.current.notes);
    dbTimers.current.notes=setTimeout(()=>db.saveNotes(uid,freeform,daily),1500);
  },[uid]);

  useEffect(()=>{const t=setInterval(()=>setClock(new Date()),1000);return()=>clearInterval(t);},[]);

  const txBalance=useMemo(()=>(portfolio.transactions||[]).reduce((s,t)=>s+(t.type==="deposit"?t.amount:-(t.amount)),0),[portfolio]);
  const realizedPL=useMemo(()=>trades.filter(t=>t.status==="closed").reduce((s,t)=>{
    const p=products.find(x=>x.id===t.productId);
    return s+calcNetPL(p,t.contracts,t.entryPrice,t.exitPrice,t.direction);
  },0),[trades,products]);
  const balance=txBalance+realizedPL;

  const openTradesApp=useMemo(()=>trades.filter(t=>t.status==="open"),[trades]);
  const allFetchTrades=useMemo(()=>[...openTradesApp,...products.filter(p=>p.yahooSymbol&&!openTradesApp.find(t=>t.productId===p.id)).map(p=>({productId:p.id,status:"open"}))],[openTradesApp,products]);
  const{prices:livePrices,timestamps:liveTimestampsAll,errors:liveErrorsAll,fetchNow:fetchPrices,fetching:pricesFetching}=useLivePrices(products,allFetchTrades);
  


  const stepBase=useMemo(()=>{
    const txs=portfolio.transactions;
    const sorted=[...txs].sort((a,b)=>new Date(a.date)-new Date(b.date));
    const first=sorted.find(t=>t.type==="deposit");
    const mode=portfolio.stepBaseMode||"first_deposit";
    return mode==="sum_deposits"?txs.filter(t=>t.type==="deposit").reduce((s,t)=>s+t.amount,0):(first?.amount||0);
  },[portfolio]);

  const stepBalance=txBalance+realizedPL;
  const stepThresholds=useMemo(()=>stepBase>0?Array.from({length:21},(_,i)=>stepBase*Math.pow(1.5,i+1)):[],[stepBase]);
  const currentStep=stepThresholds.filter(t=>stepBalance>=t).length;
  const prevStepRef=useRef(null);
  useEffect(()=>{
    if(prevStepRef.current===null){prevStepRef.current=currentStep;return;}
    const prev=prevStepRef.current;
    if(currentStep===prev)return;
    const now=new Date().toISOString();
    const nowDate=now.slice(0,10);
    const prevEvents=portfolio.stepHistory||[];
    const lastEvent=prevEvents.length?prevEvents[prevEvents.length-1]:null;
    // Debounce: skip if same event+step already recorded today
    const newEventType=currentStep>prev?"reached":"dropped";
    const newStep=currentStep>prev?currentStep:prev;
    if(lastEvent&&lastEvent.event===newEventType&&lastEvent.step===newStep&&lastEvent.date.slice(0,10)===nowDate){
      prevStepRef.current=currentStep;return;
    }
    const daysFromPrev=lastEvent?Math.floor((Date.now()-new Date(lastEvent.date))/86400000):null;
    const event={step:newStep,event:newEventType,date:now,balance:stepBalance,daysFromPrev};
    setPortfolio(p=>({...p,stepHistory:[...(p.stepHistory||[]),event]}));
    if(currentStep>prev)showToast(`🎉 ขึ้น Step ${currentStep}!`,"success");
    else showToast(`📉 ตกจาก Step ${prev} มาที่ Step ${currentStep}`,"error");
    prevStepRef.current=currentStep;
  },[currentStep]);

  const pendingWithdrawal=useMemo(()=>{
    const wt=portfolio?.withdrawalTarget??0.10;const target=wt===0?0:realizedPL*wt;
    const withdrawn=portfolio.transactions.filter(t=>t.type==="profit_withdrawal").reduce((s,t)=>s+t.amount,0);
    return Math.max(0,target-withdrawn);
  },[realizedPL,portfolio]);
  const prevPendingRef=useRef(0);
  useEffect(()=>{
    if(pendingWithdrawal>prevPendingRef.current+1000)setProfitDismissed(false);
    prevPendingRef.current=pendingWithdrawal;
  },[pendingWithdrawal]);

  const addTrade   =useCallback(t=>setTrades(p=>[...p,t]),[]);
  const addTrades  =useCallback(ts=>setTrades(p=>[...p,...ts]),[]);
  const handleImportBalance=useCallback(({amount,date})=>{
    if(!amount||amount<=0)return;
    setPortfolio(p=>{
      // Idempotent: skip if a setup deposit with same amount+date already exists
      const txDate=(date||new Date().toISOString().slice(0,16)).slice(0,10);
      const already=(p.transactions||[]).some(t=>
        t.note==="เงินเริ่มต้น (จาก Import)"&&
        Math.abs(t.amount-amount)<1&&
        (t.date||"").slice(0,10)===txDate
      );
      if(already)return p;
      const tx={id:uid(),type:"deposit",date:date||new Date().toISOString().slice(0,16),amount,note:"เงินเริ่มต้น (จาก Import)"};
      return{...p,transactions:[...(p.transactions||[]),tx]};
    });
  },[]);
  const updateTrade=useCallback(t=>setTrades(p=>p.map(x=>x.id===t.id?t:x)),[]);
  const deleteTrade=useCallback(id=>setTrades(p=>p.filter(x=>x.id!==id)),[]);

  const navItems=[
    {k:"positions",l:"Positions"},
    {k:"journal",l:"Journal"},
    {k:"steps",l:"⚡ Steps"},
    {k:"dashboard",l:"Dashboard"},
    {k:"calendar",l:"📅 Calendar"},
    {k:"notes",l:"📚 Notes"},
    {k:"settings",l:"Settings"},
  ];

  return(
    <div className="min-h-screen bg-primary text-txt">
            <NotificationCenter
        history={notifHistory}
        show={showNotif}
        onClose={()=>setShowNotif(false)}
        onMarkRead={markRead}
        onMarkAllRead={markAllRead}
        onDeleteAll={deleteAllNotifs}
        onDeleteOne={deleteOneNotif}
      />
<nav className="bg-card border-b border-border sticky top-0 z-30">
        <div className="max-w-screen-xl mx-auto px-4 flex items-center justify-between h-14">
          <div className="flex items-center gap-5">
            <div className="flex items-center gap-2 select-none">
              <div style={{background:"#6B3FA0",borderRadius:"8px",padding:"4px 10px"}}>
                <span style={{color:"white",fontWeight:800,fontSize:"15px",letterSpacing:"2px"}}>THUS</span>
              </div>
              <button onClick={()=>setShowNotif(v=>!v)}
                className="relative text-muted hover:text-txt transition mr-1"
                title={`Notifications${unreadCount>0?" ("+unreadCount+" ใหม่)":""}`}>
                🔔
                {unreadCount>0&&(
                  <span className="absolute -top-1 -right-1 min-w-[16px] h-4 rounded-full text-[9px] font-bold flex items-center justify-center text-white px-0.5"
                    style={{background:"#F6465D"}}>
                    {unreadCount>9?"9+":unreadCount}
                  </span>
                )}
              </button>
              <span style={{fontSize:"10px",color:"#848E9C",fontFamily:"monospace",userSelect:"none"}}>v3.16.5</span>
            </div>
            {/* Desktop nav */}
            <div className="hidden md:flex gap-0.5">
              {navItems.map(n=>(
                <button key={n.k} onClick={()=>setPage(n.k)}
                  className={`px-3 py-1.5 rounded-lg text-sm font-medium transition ${page===n.k?"bg-input text-txt":"text-muted hover:text-txt hover:bg-input/50"}`}>
                  {n.l}
                </button>
              ))}
            </div>
            {/* Mobile nav */}
            <div className="flex md:hidden items-center gap-2">
              <span className="text-sm font-medium text-txt">{navItems.find(n=>n.k===page)?.l||""}</span>
              <button onClick={()=>setMobileMenu(p=>!p)}
                className="w-8 h-8 rounded-lg bg-input flex flex-col items-center justify-center gap-1 transition hover:bg-input/80">
                <span className={`block w-4 h-0.5 bg-muted transition-all ${mobileMenu?"rotate-45 translate-y-1.5":""}`}/>
                <span className={`block w-4 h-0.5 bg-muted transition-all ${mobileMenu?"opacity-0":""}`}/>
                <span className={`block w-4 h-0.5 bg-muted transition-all ${mobileMenu?"-rotate-45 -translate-y-1.5":""}`}/>
              </button>
            </div>
          </div>
          <div className="flex items-center gap-3 text-sm">
            {pendingWithdrawal>0&&(
              <button onClick={()=>setPage("settings")}
                className="hidden md:flex items-center gap-1.5 text-xs bg-yellow/10 border border-yellow/20 text-yellow px-2.5 py-1 rounded-lg hover:bg-yellow/20 transition">
                💰 ค้างถอน {fmtTHB(pendingWithdrawal,0)} ฿
              </button>
            )}
            <div className="hidden md:flex flex-col items-end">
              <span className="text-muted text-xs">Portfolio Balance</span>
              <span className="font-semibold text-yellow">{fmtTHB(balance,0)} ฿</span>
            </div>
            {session&&(
              <button onClick={onSignOut} title={session.user.email}
                style={{padding:"5px 11px",borderRadius:7,border:"1px solid #2B3139",background:"transparent",
                  color:"#848E9C",cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",gap:5,transition:"all .18s"}}
                onMouseOver={e=>{e.currentTarget.style.color="#F6465D";e.currentTarget.style.borderColor="#F6465D";}}
                onMouseOut={e=>{e.currentTarget.style.color="#848E9C";e.currentTarget.style.borderColor="#2B3139";}}>
                👤 ออก
              </button>
            )}
          </div>
        </div>
      {mobileMenu&&(
        <div className="md:hidden border-t border-border bg-card">
          <div className="max-w-screen-xl mx-auto px-4 py-2 grid grid-cols-3 gap-1">
            {navItems.map(n=>(
              <button key={n.k}
                onClick={()=>{setPage(n.k);setMobileMenu(false);}}
                className={`py-2.5 px-2 rounded-lg text-sm font-medium transition text-center
                  ${page===n.k?"bg-input text-yellow":"text-muted hover:text-txt hover:bg-input/50"}`}>
                {n.l}
              </button>
            ))}
          </div>
        </div>
      )}
      </nav>

      <main className="max-w-screen-xl mx-auto px-4 py-5">
        {page==="positions"&&<PagePositions trades={trades} products={products} balance={balance} portfolio={portfolio} onAddTrade={addTrade} onUpdateTrade={updateTrade} onDeleteTrade={deleteTrade} showConfirm={showConfirm} showToast={showToast} livePrices={livePrices} liveTimestamps={liveTimestampsAll} liveErrors={liveErrorsAll} fetchPricesFn={fetchPrices}/>}
        {page==="journal"  &&<PageJournal   trades={trades} products={products} balance={balance} portfolio={portfolio} onUpdateTrade={updateTrade} onImportTrades={addTrades} onProductsChange={setProducts} onBalanceSet={handleImportBalance}/>}
        {page==="steps"    &&<PageSteps     trades={trades} products={products} portfolio={portfolio} livePrices={livePrices} onPortfolioChange={setPortfolio}/>}
        {page==="dashboard"&&<PageDashboard trades={trades} products={products} balance={balance} portfolio={portfolio}/>}
        {page==="calendar" &&<PageCalendar  trades={trades} products={products} uid={authUid} syncNotesToCloud={syncNotesToCloud}/>}
        {page==="notes"    &&<PageNotes uid={authUid} syncNotesToCloud={syncNotesToCloud}/>}
        {page==="settings" &&<PageSettings portfolio={portfolio} products={products} trades={trades} onPortfolioChange={setPortfolio} onProductsChange={setProducts} showToast={showToast} showConfirm={showConfirm}/>}
      </main>

      {pendingWithdrawal>0&&page!=="settings"&&!profitDismissed&&(
        <div className="fixed bottom-5 right-5 z-40 fade-in"
          style={{maxWidth:290,background:"#1E2329",border:"1px solid rgba(240,185,11,0.4)",borderRadius:14,padding:"12px 16px",boxShadow:"0 8px 32px rgba(0,0,0,0.5)"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:22}}>💰</span>
            <div style={{flex:1}}>
              <div style={{fontSize:11,color:"#848E9C",marginBottom:2}}>Profit Withdrawal</div>
              <div style={{fontSize:15,fontWeight:700,color:"#F0B90B"}}>{fmtTHB(pendingWithdrawal,0)} ฿</div>
              <div style={{fontSize:10,color:"#848E9C"}}>ควรถอนออกจาก port</div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <button onClick={()=>setPage("settings")}
                style={{padding:"4px 10px",borderRadius:7,border:"1px solid rgba(240,185,11,0.4)",background:"rgba(240,185,11,0.12)",color:"#F0B90B",cursor:"pointer",fontSize:11,fontWeight:600}}>
                ถอน
              </button>
              <button onClick={()=>setProfitDismissed(true)}
                style={{padding:"2px 10px",borderRadius:7,border:"1px solid #2B3139",background:"transparent",color:"#848E9C",cursor:"pointer",fontSize:10}}>
                ✕ ปิด
              </button>
            </div>
          </div>
        </div>
      )}
      <ConfirmDialog state={confirmState} onCancel={hideConfirm}/>
      <ToastContainer toasts={toasts} onDismiss={dismissToast}/>
      {showSetup&&<SetupJourney onComplete={completeSetup} products={products} onProductsChange={setProducts} onBalanceSet={handleImportBalance}/>}
    </div>
  );
}

// ─── Supabase Auth ────────────────────────────────────────────────────────────
function useAuth(){
  const[session,setSession]=useState(null);
  const[loading,setLoading]=useState(true);
  useEffect(()=>{
    SUPA.auth.getSession().then(({data})=>{
      setSession(data.session);
      setLoading(false);
    });
    const{data:{subscription}}=SUPA.auth.onAuthStateChange((_e,s)=>setSession(s));
    return()=>subscription.unsubscribe();
  },[]);
  return{session,loading};
}

function AuthScreen(){
  const[mode,setMode]=useState("login");
  const[email,setEmail]=useState("");
  const[pw,setPw]=useState("");
  const[err,setErr]=useState("");
  const[msg,setMsg]=useState("");
  const[busy,setBusy]=useState(false);

  const switchMode=m=>{ setMode(m);setErr("");setMsg(""); };

  const handleAuth=async()=>{
    if(!email||!pw)return;
    setErr("");setMsg("");setBusy(true);
    try{
      if(mode==="login"){
        const{error}=await SUPA.auth.signInWithPassword({email,password:pw});
        if(error)setErr(error.message);
      }else{
        const{error}=await SUPA.auth.signUp({email,password:pw});
        if(error)setErr(error.message);
        else setMsg("ส่งอีเมลยืนยันแล้ว — กรุณาตรวจสอบ inbox");
      }
    }catch(e){setErr(e.message);}
    setBusy(false);
  };

  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0B0E11",padding:"16px"}}>
      <div style={{width:"100%",maxWidth:380,background:"#1E2329",borderRadius:16,border:"1px solid #2B3139",padding:"32px 28px"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{background:"#6B3FA0",borderRadius:8,padding:"6px 14px",display:"inline-block",marginBottom:8}}>
            <span style={{color:"white",fontWeight:800,fontSize:18,letterSpacing:3}}>THUS</span>
          </div>
          <div style={{fontSize:12,color:"#848E9C"}}>Trading Journal • TFEX</div>
        </div>
        <div style={{display:"flex",background:"#0B0E11",borderRadius:8,padding:3,gap:3,marginBottom:22}}>
          {["login","signup"].map(m=>(
            <button key={m} onClick={()=>switchMode(m)}
              style={{flex:1,padding:"8px 0",borderRadius:6,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,
                background:mode===m?"#F0B90B":"transparent",color:mode===m?"#0B0E11":"#848E9C",transition:"all .18s"}}>
              {m==="login"?"เข้าสู่ระบบ":"สมัครสมาชิก"}
            </button>
          ))}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:13}}>
          <div>
            <div style={{fontSize:11,color:"#848E9C",marginBottom:5}}>อีเมล</div>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="your@email.com"
              style={{width:"100%",padding:"10px 13px",background:"#2B3139",border:"1px solid #3C434E",
                borderRadius:8,color:"#EAECEF",fontSize:14,outline:"none",boxSizing:"border-box"}}/>
          </div>
          <div>
            <div style={{fontSize:11,color:"#848E9C",marginBottom:5}}>รหัสผ่าน</div>
            <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••"
              onKeyDown={e=>e.key==="Enter"&&handleAuth()}
              style={{width:"100%",padding:"10px 13px",background:"#2B3139",border:"1px solid #3C434E",
                borderRadius:8,color:"#EAECEF",fontSize:14,outline:"none",boxSizing:"border-box"}}/>
          </div>
          {err&&<div style={{color:"#F6465D",fontSize:12,padding:"8px 11px",background:"rgba(246,70,93,0.1)",borderRadius:6}}>{err}</div>}
          {msg&&<div style={{color:"#0ECB81",fontSize:12,padding:"8px 11px",background:"rgba(14,203,129,0.1)",borderRadius:6}}>{msg}</div>}
          <button onClick={handleAuth} disabled={busy||!email||!pw}
            style={{width:"100%",padding:"11px 0",background:busy||!email||!pw?"#2B3139":"#F0B90B",
              border:"none",borderRadius:8,cursor:busy||!email||!pw?"not-allowed":"pointer",
              fontSize:14,fontWeight:700,color:busy||!email||!pw?"#848E9C":"#0B0E11",transition:"all .18s",marginTop:2}}>
            {busy?"กำลังดำเนินการ...":(mode==="login"?"เข้าสู่ระบบ":"สมัครสมาชิก")}
          </button>
        </div>
        {mode==="login"&&(
          <div style={{textAlign:"center",marginTop:16,fontSize:11,color:"#848E9C"}}>
            ลืมรหัสผ่าน?{" "}
            <button onClick={async()=>{
              if(!email){setErr("กรุณาใส่อีเมลก่อน");return;}
              const{error}=await SUPA.auth.resetPasswordForEmail(email);
              if(error)setErr(error.message);
              else setMsg("ส่งลิงก์รีเซ็ตรหัสผ่านไปที่อีเมลแล้ว");
            }} style={{background:"none",border:"none",color:"#F0B90B",cursor:"pointer",fontSize:11,padding:0}}>
              รีเซ็ตรหัสผ่าน
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

function Root(){
  const{session,loading}=useAuth();
  const handleSignOut=async()=>{ await SUPA.auth.signOut(); };
  // Remove splash overlay once React has mounted
  useEffect(()=>{
    // Delay slightly so any injected content (Netlify badge etc) is covered
    const t=setTimeout(()=>{
      const el=document.getElementById("splash");
      if(el){el.style.transition="opacity 0.15s";el.style.opacity="0";setTimeout(()=>el.remove(),150);}
    },200);
    return()=>clearTimeout(t);
  },[]);
  if(loading)return null;
  if(!session)return <AuthScreen/>;
  return <App session={session} onSignOut={handleSignOut}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
