          var sorted=[...byProduct].sort(function(a,b){return b.pnl-a.pnl;});
          var winner=sorted[0];var loser=sorted[sorted.length-1];
          var PNAME={s50:"S50",gold:"Gold",silver:"Silver",usdjpy:"USDJPY"};
          var PCLR={gold:"#F0B90B",s50:"#3B82F6",silver:"#9CA3AF",usdjpy:"#8B5CF6"};
          return(
            <div className="bg-card border border-border rounded-xl p-4">
              <h3 className="font-semibold text-sm mb-3">🏅 Winner / Loser Product</h3>
              <div className="grid grid-cols-2 gap-3">
                <div className="bg-green/5 border border-green/20 rounded-xl p-3">
                  <div className="text-muted text-[10px] uppercase tracking-wide mb-1">🥇 Winner</div>
                  <div className="font-bold text-sm" style={{color:PCLR[winner.id]||"#0ECB81"}}>{PNAME[winner.id]||winner.id}</div>
                  <div className="text-green font-semibold tabular-nums text-sm mt-0.5">+{fmtTHB(winner.pnl,0)} ฿</div>
                  <div className="text-muted text-[10px] mt-1">{winner.count} ไม้ · avg {winner.avgPL>=0?"+":""}{fmtTHB(winner.avgPL,0)} ฿</div>
                </div>
                <div className="bg-red/5 border border-red/20 rounded-xl p-3">
                  <div className="text-muted text-[10px] uppercase tracking-wide mb-1">💀 Loser</div>
                  <div className="font-bold text-sm" style={{color:PCLR[loser.id]||"#F6465D"}}>{PNAME[loser.id]||loser.id}</div>
                  <div className="text-red font-semibold tabular-nums text-sm mt-0.5">{fmtTHB(loser.pnl,0)} ฿</div>
                  <div className="text-muted text-[10px] mt-1">{loser.count} ไม้ · avg {loser.avgPL>=0?"+":""}{fmtTHB(loser.avgPL,0)} ฿</div>
                </div>
              </div>
            </div>
          );
        })()}

        {monthlyPL.length>0&&(()=>{
          var W=300,H=160,PT=24,PR=8,PB=30,PLL=8;
          var CW2=W-PLL-PR,CH2=H-PT-PB;
          var n2=monthlyPL.length;
          var maxV2=Math.max.apply(null,monthlyPL.map(m=>m.pnl).concat([0]));
          var minV2=Math.min.apply(null,monthlyPL.map(m=>m.pnl).concat([0]));
          var vR2=maxV2-minV2||1;
          var py2=function(v){return PT+(1-(v-minV2)/vR2)*CH2;};
          var zY=py2(0);
          var barW=Math.max(10,Math.floor((CW2/n2)*0.65));
          var gap2=(CW2-barW*n2)/(n2+1);
          var fmtMo=function(k){
            var parts=k.split("-"),y=+parts[0],m2=+parts[1];
            var names=["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
            return(names[m2-1]||m2)+"'"+(String(y).slice(2));
          };
          return(
            <div className="bg-card border border-border rounded-xl p-4">
              <h3 className="font-semibold text-sm mb-3">📅 Monthly P&amp;L</h3>
              <div className="w-full overflow-x-auto">
                <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",minWidth:200,height:"auto"}}>
                  <line x1={PLL} x2={PLL+CW2} y1={zY.toFixed(1)} y2={zY.toFixed(1)} stroke="rgba(255,255,255,0.15)" strokeWidth="1"/>
                  {monthlyPL.map(function(m,i){
                    var x=PLL+gap2+(barW+gap2)*i;
                    var barH=Math.abs(py2(m.pnl)-zY);
                    var barY=m.pnl>=0?py2(m.pnl):zY;
                    var col=m.pnl>=0?"#0ECB81":"#F6465D";
                    return(
                      <g key={m.month}>
                        <rect x={x.toFixed(1)} y={barY.toFixed(1)} width={barW} height={Math.max(2,barH).toFixed(1)} fill={col} fillOpacity="0.8" rx="2"/>
                        <text x={(x+barW/2).toFixed(1)} y={(m.pnl>=0?barY-3:barY+Math.max(2,barH)+9).toFixed(1)} textAnchor="middle" fontSize="7" fill={col}>{m.pnl>=0?"+":""}{Math.abs(m.pnl)>=1000?(m.pnl/1000).toFixed(0)+"k":m.pnl.toFixed(0)}</text>
                        <text x={(x+barW/2).toFixed(1)} y={H-4} textAnchor="middle" fontSize="7" fill="#848E9C">{fmtMo(m.month)}</text>
                      </g>
                    );
                  })}
                </svg>
              </div>
            </div>
          );
        })()}

        </div>

        
        {traderStyle&&(()=>{
          var s=traderStyle;
          return(
            <div className="bg-card border border-border rounded-xl p-5">
              <h3 className="font-semibold text-sm mb-3">🧠 Trader Style Profiler</h3>
              <div className="flex flex-col md:flex-row gap-4">
                <div className="flex-shrink-0 text-center bg-input/30 rounded-2xl p-5 min-w-[140px]">
                  <div className="text-5xl mb-2">{s.icon}</div>
                  <div className="font-bold text-yellow text-base">{s.name}</div>
                </div>
                <div className="flex-1 space-y-3">
                  <p className="text-muted text-sm leading-relaxed">{s.desc}</p>
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <div className="text-green text-xs font-semibold mb-1.5">Strengths</div>
                      <ul className="space-y-1">{s.strengths.map((x,i)=><li key={i} className="text-txt text-xs flex items-center gap-1.5"><span className="w-1.5 h-1.5 rounded-full bg-green flex-shrink-0"/>{x}</li>)}</ul>
                    </div>
                    <div>
                      <div className="text-orange text-xs font-semibold mb-1.5">Watch Out</div>
                      <ul className="space-y-1">{s.watchOut.map((x,i)=><li key={i} className="text-txt text-xs flex items-center gap-1.5"><span className="w-1.5 h-1.5 rounded-full bg-orange flex-shrink-0"/>{x}</li>)}</ul>
                    </div>
                  </div>
                  <div className="flex flex-wrap gap-2 pt-1">
                    {[["WR",metrics.winRate.toFixed(0)+"%",metrics.winRate>=50?"text-green":"text-red"],
                      ["PF",metrics.pf?fmtRatio(metrics.pf,2):"—",metrics.pf&&metrics.pf>=1?"text-green":"text-red"],
                      ["RR",metrics.rr?fmtRatio(metrics.rr,1)+"x":"—","text-yellow"],
                      ["DD","-"+metrics.maxDDPct.toFixed(1)+"%","text-red"]
                    ].map(function(item){var l=item[0],v=item[1],c=item[2];return(
                      <div key={l} className="bg-input/50 rounded-lg px-3 py-1.5 text-center">
                        <div className="text-muted text-[10px]">{l}</div>
                        <div className={"font-bold text-sm tabular-nums "+c}>{v}</div>
                      </div>
                    );})}
                  </div>
                </div>
              </div>
            </div>
          );
        })()}

        
                {durationBuckets.length>0&&(()=>{
          var bestBucket=null;
          durationBuckets.forEach(function(b){if(b.avgPL!=null&&(bestBucket===null||b.avgPL>bestBucket.avgPL))bestBucket=b;});
          return(
            <div className="bg-card border border-border rounded-xl p-4">
              <h3 className="font-semibold text-sm mb-3">⏱ Duration Analysis</h3>
              <div className="overflow-x-auto">
                <table className="w-full text-xs">
                  <thead>
                    <tr className="text-muted border-b border-border/40">
                      <th className="text-left pb-2 font-medium">ช่วงเวลา</th>
                      <th className="text-right pb-2 font-medium">Trades</th>
                      <th className="text-right pb-2 font-medium">Avg Ticks</th>
                      <th className="text-right pb-2 font-medium">Avg P/L</th>
                      <th className="text-right pb-2 font-medium">Win%</th>
                    </tr>
                  </thead>
                  <tbody>
                    {durationBuckets.map(function(b){
                      var isBest=b===bestBucket;
                      return(
                        <tr key={b.label} className={"border-b border-border/20 "+(isBest?"bg-green/5":"")}>
                          <td className={"py-2 font-medium "+(isBest?"text-green border-l-2 border-green pl-2":"")}>{b.label}</td>
                          <td className="py-2 text-right tabular-nums text-muted">{b.trades}</td>
                          <td className={"py-2 text-right tabular-nums "+(b.avgTkDur!=null&&b.avgTkDur>=0?"text-green":"text-red")}>
                            {b.avgTkDur!=null?(b.avgTkDur>=0?"+":"")+b.avgTkDur.toFixed(1):"—"}
                          </td>
                          <td className={"py-2 text-right tabular-nums font-semibold "+(b.avgPL!=null&&b.avgPL>=0?"text-green":"text-red")}>
                            {b.avgPL!=null?(b.avgPL>=0?"+":"")+fmtTHB(b.avgPL,0)+" ฿":"—"}
                          </td>
                          <td className={"py-2 text-right tabular-nums "+(b.winPct!=null&&b.winPct>=50?"text-green":"text-red")}>
                            {b.winPct!=null?b.winPct.toFixed(0)+"%":"—"}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              {bestBucket&&<div className="mt-3 text-xs text-muted bg-input/30 rounded-lg px-3 py-2">📊 คุณทำกำไรได้ดีที่สุดเมื่อถือ <span className="text-txt font-semibold">{bestBucket.label}</span></div>}
            </div>
          );
        })()}

        {closed.length>0&&(()=>{
          // Trend Lab computations
          var tlData=closed.map(function(t){
            var p=getP(t);
            var tks=(p&&t.exitPrice!=null)?((t.exitPrice-t.entryPrice)/p.tickSize)*(t.direction==="Long"?1:-1):null;
            return{...t,_ticks:tks,_p:p};
          }).filter(function(t){return t._ticks!=null;});
          if(tlData.length===0)return null;

          var allTicks=tlData.map(function(t){return t._ticks;});
          var avgTicks=allTicks.reduce(function(s,v){return s+v;},0)/allTicks.length;
          var bestTicks=Math.max.apply(null,allTicks);
          var worstTicks=Math.min.apply(null,allTicks);
          var avgContracts=tlData.reduce(function(s,t){return s+t.contracts;},0)/tlData.length;

          // Per-product avg ticks
          var prodTicksMap={};
          tlData.forEach(function(t){
            if(!prodTicksMap[t.productId])prodTicksMap[t.productId]={sum:0,n:0};
            prodTicksMap[t.productId].sum+=t._ticks;
            prodTicksMap[t.productId].n++;
          });
          var prodTicksArr=Object.entries(prodTicksMap).map(function(entry){
            var id=entry[0],v=entry[1];
            var p=(products||[]).find(function(pr){return pr.id===id;});
            return{id,name:p?p.baseSymbol||p.name:id,avg:v.sum/v.n,n:v.n};
          }).sort(function(a,b){return b.avg-a.avg;});
          var maxAbsProd=Math.max.apply(null,prodTicksArr.map(function(r){return Math.abs(r.avg);}));

          // Setup correlation
          var setupMap={};
          tlData.forEach(function(t){
            var s=t.setupType||"Other";
            if(!setupMap[s])setupMap[s]={tSum:0,wins:0,n:0};
            setupMap[s].tSum+=t._ticks;
            if(t._ticks>0)setupMap[s].wins++;
            setupMap[s].n++;
          });
          var setupArr=Object.entries(setupMap).map(function(entry){
            var s=entry[0],v=entry[1];
            var avgT=v.tSum/v.n;
            var wr=(v.wins/v.n)*100;
            return{setup:s,avgTicks:avgT,wr,n:v.n,quality:wr*avgT/100};
          }).sort(function(a,b){return b.quality-a.quality;});

          // Hold time buckets — dynamic based on actual data spread
          var holdMs=tlData.filter(function(t){return t.openDateTime&&t.exitDateTime;}).map(function(t){return new Date(t.exitDateTime)-new Date(t.openDateTime);}).filter(function(ms){return ms>0;});
          var maxHoldMs=holdMs.length?Math.max.apply(null,holdMs):86400000;
          var buckets=(function(){
            if(maxHoldMs<=3600000)return[{label:"<10m",ms:0,max:600000},{label:"10–30m",ms:600000,max:1800000},{label:"30m–1h",ms:1800000,max:3600000},{label:">1h",ms:3600000,max:Infinity}];
            if(maxHoldMs<=28800000)return[{label:"<30m",ms:0,max:1800000},{label:"30m–2h",ms:1800000,max:7200000},{label:"2h–6h",ms:7200000,max:21600000},{label:"6h–8h",ms:21600000,max:Infinity}];
            if(maxHoldMs<=86400000)return[{label:"<2h",ms:0,max:7200000},{label:"2h–6h",ms:7200000,max:21600000},{label:"6h–12h",ms:21600000,max:43200000},{label:">12h",ms:43200000,max:Infinity}];
            if(maxHoldMs<=604800000)return[{label:"<6h",ms:0,max:21600000},{label:"6h–1d",ms:21600000,max:86400000},{label:"1–3d",ms:86400000,max:259200000},{label:"3–7d",ms:259200000,max:Infinity}];
            return[{label:"<1d",ms:0,max:86400000},{label:"1–3d",ms:86400000,max:259200000},{label:"3–7d",ms:259200000,max:604800000},{label:">7d",ms:604800000,max:Infinity}];
          })();
          var bucketStats=buckets.map(function(b){
            var rows=tlData.filter(function(t){
              if(!t.openDateTime||!t.exitDateTime)return false;
              var ms=new Date(t.exitDateTime)-new Date(t.openDateTime);
              return ms>=b.ms&&ms<b.max;
            });
            return{label:b.label,n:rows.length,avg:rows.length?rows.reduce(function(s,t){return s+t._ticks;},0)/rows.length:null};
          }).filter(function(b){return b.n>0;});
          var bestBucketTL=bucketStats.reduce(function(best,b){return(b.avg!=null&&(best===null||b.avg>best.avg))?b:best;},null);

          // Overtrade detector
          var overtrades=tlData.filter(function(t){return t.contracts>avgContracts&&t._ticks<avgTicks;});

          var PROD_COLORS2={gold:"#F0B90B",s50:"#3B82F6",silver:"#9CA3AF",usdjpy:"#8B5CF6"};
          var SETUP_COLORS2={"ประคองตลาด":"#3B82F6","สวนเทรนด์":"#F59E0B","Sideway":"#8B5CF6","Snow Ball":"#06B6D4","Scalp":"#F97316","Run-Trend":"#0ECB81","Other":"#848E9C"};

          return(
            <div className="bg-card border border-border rounded-xl p-4 space-y-5">
              <h3 className="font-semibold text-sm">🔬 Trend Lab</h3>

              {/* Tick Summary — best/worst with product */}
              {(()=>{
                var bestT=tlData.reduce(function(b,t){return t._ticks>b._ticks?t:b;},tlData[0]);
                var worstT=tlData.reduce(function(b,t){return t._ticks<b._ticks?t:b;},tlData[0]);
                var getUnit=function(pid){return pid==="usdjpy"?"pip":"ticks";};
                var getSymbol=function(t){return t._p?t._p.baseSymbol||t._p.name:t.productId;};
                return(
                  <div className="grid grid-cols-2 gap-3">
                    <div className="bg-green/5 border border-green/20 rounded-xl p-3 text-center">
                      <div className="text-muted text-[10px] uppercase tracking-wide mb-1">🏆 Best Trade</div>
                      <div className="font-bold tabular-nums text-sm text-green">+{bestT._ticks.toFixed(1)} {getUnit(bestT.productId)}</div>
                      <div className="text-muted text-[10px] mt-1">{getSymbol(bestT)} · {fmtDate(bestT.exitDateTime)}</div>
                    </div>
                    <div className="bg-red/5 border border-red/20 rounded-xl p-3 text-center">
                      <div className="text-muted text-[10px] uppercase tracking-wide mb-1">💀 Worst Trade</div>
                      <div className="font-bold tabular-nums text-sm text-red">{worstT._ticks.toFixed(1)} {getUnit(worstT.productId)}</div>
                      <div className="text-muted text-[10px] mt-1">{getSymbol(worstT)} · {fmtDate(worstT.exitDateTime)}</div>
                    </div>
                  </div>
                );
              })()}

              {/* Per-product bars */}
              <div>
                <div className="text-muted text-xs font-medium mb-2">Avg Ticks ต่อ Product</div>
                <div className="space-y-2">
                  {prodTicksArr.map(function(r){
                    var pct=maxAbsProd>0?Math.abs(r.avg)/maxAbsProd*100:0;
                    var clr=PROD_COLORS2[r.id]||"#848E9C";
                    return(
                      <div key={r.id} className="flex items-center gap-3">
                        <div className="w-16 text-right text-xs font-semibold text-txt shrink-0">{r.name}</div>
                        <div className="flex-1 bg-input/30 rounded-full h-2 overflow-hidden">
                          <div className="h-2 rounded-full transition-all" style={{width:pct+"%",background:clr,opacity:r.avg>=0?1:0.5}}/>
                        </div>
                        <div className={"text-xs tabular-nums font-medium text-right shrink-0 "+(r.avg>=0?"text-green":"text-red")} style={{minWidth:"90px"}}>
                          {r.avg>=0?"+":""}{r.avg.toFixed(1)} {r.id==="usdjpy"?"pip":"ticks"}<span className="text-muted font-normal ml-1">({r.n})</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Setup correlation */}
              {setupArr.length>0&&(
                <div>
                  <div className="text-muted text-xs font-medium mb-2">Setup Correlation</div>
                  <div className="overflow-x-auto">
                    <table className="w-full text-xs">
                      <thead>
                        <tr className="text-muted border-b border-border/40">
                          <th className="text-left pb-1.5 font-medium">Setup</th>
                          <th className="text-right pb-1.5 font-medium">Avg Ticks</th>
                          <th className="text-right pb-1.5 font-medium">WR%</th>
                          <th className="text-right pb-1.5 font-medium">Quality</th>
                          <th className="text-right pb-1.5 font-medium">Trades</th>
                        </tr>
                      </thead>
                      <tbody>
                        {setupArr.map(function(r){
                          var clr=SETUP_COLORS2[r.setup]||"#848E9C";
                          return(
                            <tr key={r.setup} className="border-b border-border/20">
                              <td className="py-1.5"><span className="px-1.5 py-0.5 rounded text-[10px] font-semibold" style={{background:clr+"22",color:clr}}>{r.setup}</span></td>
                              <td className={"py-1.5 text-right tabular-nums font-medium "+(r.avgTicks>=0?"text-green":"text-red")}>{r.avgTicks>=0?"+":""}{r.avgTicks.toFixed(1)}</td>
                              <td className={"py-1.5 text-right tabular-nums "+(r.wr>=50?"text-green":"text-red")}>{r.wr.toFixed(0)}%</td>
                              <td className={"py-1.5 text-right tabular-nums font-semibold "+(r.quality>0?"text-green":"text-red")}>{r.quality>=0?"+":""}{r.quality.toFixed(2)}</td>
                              <td className="py-1.5 text-right tabular-nums text-muted">{r.n}</td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}

              {/* Hold time vs ticks */}
              {bucketStats.length>1&&(
                <div>
                  <div className="text-muted text-xs font-medium mb-2">Hold Time vs Avg Ticks</div>
                  <div className="flex gap-2 flex-wrap">
                    {bucketStats.map(function(b){
                      var isBest=b===bestBucketTL;
                      return(
                        <div key={b.label} className={"flex-1 min-w-[70px] rounded-xl p-2.5 text-center border "+(isBest?"border-green/40 bg-green/5":"border-border/40 bg-input/20")}>
                          <div className="text-muted text-[10px] mb-1">{b.label}</div>
                          <div className={"font-bold text-xs tabular-nums "+(b.avg>=0?"text-green":"text-red")}>{b.avg>=0?"+":""}{b.avg.toFixed(1)}</div>
                          <div className="text-muted/50 text-[9px]">{b.n} ไม้</div>
                        </div>
                      );
                    })}
                  </div>
                  {bestBucketTL&&<div className="mt-2 text-xs text-muted bg-input/30 rounded-lg px-3 py-2">🎯 Sweet spot: ถือ <span className="text-txt font-semibold">{bestBucketTL.label}</span> ได้ ticks เฉลี่ยสูงสุด</div>}
                </div>
              )}

              {/* Overtrade detector */}
              {overtrades.length>0&&(()=>{
                var getUnit2=function(pid){return pid==="usdjpy"?"pip":"ticks";};
                return <OvertradeDet overtrades={overtrades} getUnit={getUnit2} avgContracts={avgContracts} avgTicks={avgTicks}/>;
              })()}
            </div>
          );
        })()}

        {commStats.total>0&&(()=>{
          const rows=Object.entries(commStats.byProduct)
            .map(([id,v])=>({id,...v}))
            .sort((a,b)=>b.total-a.total);
          return(
            <div className="bg-card border border-border rounded-xl p-4">
              <h3 className="font-semibold text-sm mb-3">💸 ค่าคอมสะสม</h3>
              <div className="overflow-x-auto">
                <table className="w-full text-xs">
                  <thead>
                    <tr className="text-muted border-b border-border/40">
                      <th className="text-left pb-2 font-medium">Product</th>
                      <th className="text-right pb-2 font-medium">จำนวนไม้</th>
                      <th className="text-right pb-2 font-medium">ค่าคอม (฿)</th>
                    </tr>
                  </thead>
                  <tbody>
                    {rows.map(r=>(
                      <tr key={r.id} className="border-b border-border/20">
                        <td className="py-2 text-txt font-medium">{r.name}</td>
                        <td className="py-2 text-right tabular-nums text-muted">{r.count}</td>
                        <td className="py-2 text-right tabular-nums text-red/80">-{fmtTHB(r.total,0)}</td>
                      </tr>
                    ))}
                    <tr className="border-t border-border/60">
                      <td className="pt-2 font-bold text-yellow">รวม</td>
                      <td className="pt-2 text-right tabular-nums text-muted font-semibold">{rows.reduce((s,r)=>s+r.count,0)}</td>
                      <td className="pt-2 text-right tabular-nums font-bold text-yellow">-{fmtTHB(commStats.total,0)}</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          );
        })()}

        </div>
      )}

    </div>
  );
}

  const set=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  return(

      style={{background:"rgba(11,14,17,0.8)",backdropFilter:"blur(4px)"}}>

          <button onClick={onCancel} className="text-muted hover:text-txt text-xl leading-none">✕</button>

        <div className="p-5 space-y-4">
          <div>
            <Label>จำนวนเงิน (฿)</Label>

              placeholder="0" className={clsInput+" no-spin"} autoFocus/>
            {currentBalance>0&&<p className="text-muted text-xs mt-1">ยอดปัจจุบัน {fmtTHB(currentBalance,0)} ฿</p>}
          </div>
          <div><Label>วันที่</Label>

          </div>
          <div><Label>หมายเหตุ (optional)</Label>
            <input value={f.note} onChange={set("note")} placeholder="เช่น ทอดสมอ, ปรับพอร์ต..." className={clsInput}/>
          </div>
        </div>
        <div className="flex gap-2 p-4 border-t border-border/40">
          <button onClick={onCancel} className={clsBtn("default")}>ยกเลิก</button>
          <button disabled={!f.amount||+f.amount<=0}
            onClick={()=>onSubmit({id:uid(),type:"profit_withdrawal",amount:+f.amount,date:f.date,note:f.note})}
            className={clsBtn("yellow")+" flex-1 disabled:opacity-30 disabled:cursor-not-allowed"}>
            บันทึก
          </button>
        </div>
      </div>
    </div>
  );
}

function PageSettings({portfolio,products,trades,onPortfolioChange,onProductsChange,showToast,showConfirm}){

  const[aiKey,setAiKey]=useState(()=>ls.get("tj_ai_key",""));
  const[sheetsUrl,setSheetsUrl]=useState(()=>sheetsSync.getUrl());
  const[sheetsStatus,setSheetsStatus]=useState(null);
  const[sheetsSyncing,setSheetsSyncing]=useState(false);
  const handleSheetsSync=async()=>{
    sheetsSync.setUrl(sheetsUrl);
    setSheetsSyncing(true);setSheetsStatus(null);
    const res=await sheetsSync.push(trades,products);
    setSheetsSyncing(false);
    setSheetsStatus(res.ok?`OK — sync ${res.count} positions`:`Error: ${res.err}`);
  };
  const[editProduct,setEditProduct]=useState(null);
  const[editField,setEditField]=useState({});

  const[showWithdrawModal,setShowWithdrawModal]=useState(false);

  const realizedPL=useMemo(()=>(trades||[]).filter(t=>t.status==="closed").reduce((s,t)=>{
    const p=(products||[]).find(x=>x.id===t.productId);
    return s+calcNetPL(p,t.contracts,t.entryPrice,t.exitPrice,t.direction);
  },0),[trades,products]);

  const balance=txBalance+realizedPL;

  const withdrawalTarget=portfolio?.withdrawalTarget??0.10;
  const targetWithdrawal=Math.max(0,realizedPL*withdrawalTarget);
  const totalWithdrawn=portfolio.transactions.filter(t=>t.type==="profit_withdrawal").reduce((s,t)=>s+t.amount,0);

            <span>Realized P/L: <span className={`tabular-nums font-medium ${realizedPL>=0?"text-green":"text-red"}`}>{realizedPL>=0?"+":""}{fmtTHB(realizedPL,0)} ฿</span></span>

            </tr></thead>
            <tbody>

function useTFEXMarketStatus(){
  const HOLIDAYS=["01-01","06-04","13-04","14-04","15-04","01-05","05-05","28-07","12-08","23-10","05-12","10-12","31-12"];
  const getStatus=(now)=>{
    const bkk=new Date(now.toLocaleString("en-US",{timeZone:"Asia/Bangkok"}));
    const dow=bkk.getDay();
    if(dow===0||dow===6)return{isOpen:false,sessionName:null,nextOpen:null,holiday:true};
    const mmdd=String(bkk.getMonth()+1).padStart(2,"0")+"-"+String(bkk.getDate()).padStart(2,"0");
    if(HOLIDAYS.includes(mmdd))return{isOpen:false,sessionName:null,nextOpen:null,holiday:true};
    const hm=bkk.getHours()*60+bkk.getMinutes();
    if(hm>=18*60+50||hm<3*60){
      const nextDay=new Date(bkk);
      if(hm>=18*60+50)nextDay.setDate(nextDay.getDate()+1);
      const nextDow=nextDay.getDay();
      const nextMmdd=String(nextDay.getMonth()+1).padStart(2,"0")+"-"+String(nextDay.getDate()).padStart(2,"0");
      if(nextDow===0||nextDow===6||HOLIDAYS.includes(nextMmdd))return{isOpen:false,sessionName:null,nextOpen:"09:45",holiday:false};
      return{isOpen:true,sessionName:"ดึก",nextOpen:null,holiday:false};
    }
    if(hm>=9*60+45&&hm<12*60+30)return{isOpen:true,sessionName:"เช้า",nextOpen:null,holiday:false};
    if(hm>=13*60+45&&hm<16*60+55)return{isOpen:true,sessionName:"บ่าย",nextOpen:null,holiday:false};
    if(hm<9*60+45)return{isOpen:false,sessionName:null,nextOpen:"09:45",holiday:false};
    if(hm>=12*60+30&&hm<13*60+45)return{isOpen:false,sessionName:null,nextOpen:"13:45",holiday:false};
    if(hm>=16*60+55&&hm<18*60+50)return{isOpen:false,sessionName:null,nextOpen:"18:50",holiday:false};
    return{isOpen:false,sessionName:null,nextOpen:"09:45",holiday:false};
  };
  const[status,setStatus]=useState(()=>getStatus(new Date()));
  useEffect(()=>{
    const tick=()=>setStatus(getStatus(new Date()));
    const t=setInterval(tick,30000);
    return()=>clearInterval(t);
  },[]);
  return status;
}

function SetupJourney({onComplete,products,onProductsChange,onBalanceSet}){
  const[step,setStep]=useState(0);
  // Step 0: Welcome  Step 1: Balance  Step 2: Products
  const TOTAL=4;

  // Balance step state
  const today=new Date();
  const yesterday=new Date(today);yesterday.setDate(today.getDate()-1);
  const defDate=yesterday.toISOString().slice(0,10);
  const[balAmt,setBalAmt]=useState("");
  const[balDate,setBalDate]=useState(defDate);
  const[balSkipped,setBalSkipped]=useState(false);
  const balanceSavedRef=useRef(false); // prevent double-count on Back+Next

  // Products step state — editable commissions per product
  const[comms,setComms]=useState(()=>{
    var m={};
    (products||[]).forEach(function(p){m[p.id]=String(p.commissionPerLeg);});
    return m;
  });

  // Series step state
  const[seriesEdits,setSeriesEdits]=useState(()=>{
    var m={};
    (products||[]).filter(function(p){return !p._isLegacy;}).forEach(function(p){m[p.id]=p.series||"";});
    return m;
  });

  function handleBalanceNext(){
    var n=parseFloat(String(balAmt).replace(/,/g,""));
    if(n>0&&!balanceSavedRef.current){
      var txDate=(balDate||defDate)+"T09:00";
      onBalanceSet&&onBalanceSet({amount:n,date:txDate});
      balanceSavedRef.current=true;
    }
    setStep(2);
  }

  function handleProductSave(){
    onProductsChange&&onProductsChange(function(prev){
      return prev.map(function(p){
        if(p._isLegacy)return p;
        var newComm=parseFloat(comms[p.id]);
        var newSeries=seriesEdits[p.id]||p.series||"";
        var CYCLE=["H","M","U","Z"];
        var newContract=p.baseSymbol+newSeries;
        var ni=(CYCLE.indexOf(newSeries[0])+1)%4;
        var yy=newSeries.slice(1);
        var ny=ni===0?(+yy+1)%100:"";
        var nextSer=CYCLE[ni]+(ni===0?String(ny).padStart(2,"0"):yy);
        var nextContract=p.baseSymbol+nextSer;
        var out={...p,series:newSeries,currentContract:newContract,nextContract:nextContract};
        if(!isNaN(newComm)&&newComm>=0)out.commissionPerLeg=newComm;
        return out;
      });
    });
  }

  function finish(){
    handleProductSave();
    onComplete();
  }

  // ---- Step renders ----
  function renderStep0(){
    return(
      <div className="flex flex-col items-center text-center px-2 py-4 gap-4">
        <div className="text-5xl">🏆</div>
        <div>
          <h2 className="text-xl font-bold text-txt mb-1">ยินดีต้อนรับสู่<br/><span className="text-yellow">THUS Trading Journal</span></h2>
          <p className="text-muted text-sm leading-relaxed mt-2">บันทึกและวิเคราะห์เทรดของคุณอย่างมีระบบ<br/>ใช้เวลาแค่ 2 นาที ตั้งค่าเบื้องต้นให้พร้อมใช้งาน</p>
        </div>
        <div className="grid grid-cols-3 gap-2 w-full max-w-xs mt-2">
          {[["📊","Dashboard"],["📋","Journal"],["⚡","21 Steps"],["📍","Positions"],["📅","Calendar"],["⚙️","Settings"]].map(function(item){
            return(<div key={item[1]} className="bg-input/60 rounded-xl py-2.5 text-center"><div className="text-xl mb-0.5">{item[0]}</div><div className="text-[10px] text-muted">{item[1]}</div></div>);
          })}
        </div>
      </div>
    );
  }

  function renderStep1(){
    var n=parseFloat(String(balAmt).replace(/,/g,""));
    var valid=n>0;
    return(
      <div className="flex flex-col gap-4 px-2 py-2">
        <div className="text-center">
          <div className="text-4xl mb-2">💰</div>
          <h2 className="text-lg font-bold text-txt">เงินลงทุนเริ่มต้น</h2>
          <p className="text-muted text-sm mt-1">ระบุยอดเงินที่จะใช้เทรดในตอนเริ่มต้น<br/><span className="text-yellow/80">จำเป็นต่อการคำนวณ % Port และ Equity Curve</span></p>

          </div>

    );

  function renderStep2(){
    return(

        </div>
        <div className="space-y-2 max-h-56 overflow-y-auto pr-1">
          {(products||[]).filter(function(p){return !p._isLegacy;}).map(function(p){

      </div>
    );
  }


  function renderStep3(){
    var yy=String(new Date().getFullYear()).slice(-2);
    var nyy=String(new Date().getFullYear()+1).slice(-2);
    var SERIES_OPTS=["H"+yy,"M"+yy,"U"+yy,"Z"+yy,"H"+nyy,"M"+nyy,"U"+nyy,"Z"+nyy];
    var activeProds=(products||[]).filter(function(p){return !p._isLegacy;});
    return(
      <div className="flex flex-col gap-3 px-2 py-2">
        <div className="text-center">
          <div className="text-4xl mb-2">📅</div>
          <h2 className="text-lg font-bold text-txt">อัปเดต Series</h2>

        </div>
        <div className="space-y-2 max-h-56 overflow-y-auto pr-1">
          {activeProds.map(function(p){
            var cur=seriesEdits[p.id]||p.series||"";
            return(
              <div key={p.id} className="flex items-center gap-3 bg-input/30 border border-border/60 rounded-xl px-3 py-2.5">
                <div className="flex-1 min-w-0">
                  <div className="font-semibold text-txt text-sm">{p.baseSymbol}</div>
                  <div className="text-xs text-muted font-mono">{p.currentContract}</div>
                </div>
                <select value={cur}
                  onChange={function(e){var id=p.id;var v=e.target.value;setSeriesEdits(function(prev){return{...prev,[id]:v};});}}
                  className="bg-input border border-border rounded-lg px-2 py-1 text-txt text-xs outline-none focus:border-yellow/50 tabular-nums">
                  {SERIES_OPTS.map(function(s){return(<option key={s} value={s}>{p.baseSymbol+s}</option>);})}
                </select>
              </div>
            );
          })}
        </div>
        <p className="text-center text-muted/60 text-xs">Series คือ เดือน+ปีที่ contract จะหมดอายุ เช่น H26=มี.ค.26</p>
      </div>
    );
  }
  var stepContent=[renderStep0,renderStep1,renderStep2,renderStep3];
  var stepTitles=["ยินดีต้อนรับ","เงินทุน","ค่าคอม","Series"];

  return(
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4"
      style={{background:"rgba(11,14,17,0.9)",backdropFilter:"blur(6px)"}}>

async function aiProcessNote(rawText,existingTags,apiKey){
  const tagList=existingTags.join(", ")||"#mindset, #risk, #entry, #rule, #psychology";
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:600,
      messages:[{role:"user",content:`You are a trading knowledge assistant for a Thai TFEX trader.
Process this raw note and return ONLY valid JSON (no markdown, no extra text):
{
  "type": "quote or rule or lesson or idea",
  "content": "refined clear actionable version (Thai or English matching original, 1-3 sentences)",
  "source": "extracted source name if mentioned, else empty string",
  "tags": ["#tag1","#tag2"],
  "reasoning": "one line explanation"
}

Rules:
- type "quote" = from book/person, "rule" = trading rule, "lesson" = personal experience, "idea" = hypothesis
- content must be concise and actionable
- max 4 tags, reuse from existing when appropriate: ${tagList}
- tags must start with #

Raw note: "${rawText}"`}]
    })
  });
  if(!res.ok)throw new Error("API Error: "+res.status);
  const data=await res.json();
  const text=data.content?.[0]?.text||"";
  const clean=text.replace(/```json|```/g,"").trim();
  return JSON.parse(clean);
}

    tagInput:"",
  });
  const[aiLoading,setAiLoading]=useState(false);
  const[aiResult,setAiResult]=useState(null);
  const[aiError,setAiError]=useState("");
  const set=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  const handleAiProcess=async()=>{
    if(!f.content.trim())return;
    if(!apiKey){setAiError("ยังไม่ได้ตั้งค่า API Key ใน Settings");return;}
    setAiLoading(true);setAiError("");setAiResult(null);
    try{
      const result=await aiProcessNote(f.content,allTags,apiKey);
      setAiResult(result);
    }catch(e){
      setAiError("AI Error: "+e.message);
    }finally{
      setAiLoading(false);
    }
  };
  const applyAiResult=()=>{
    if(!aiResult)return;
    setF(p=>({...p,
      type:aiResult.type||p.type,
      content:aiResult.content||p.content,
      source:aiResult.source||p.source,
      tags:aiResult.tags||p.tags,
    }));
    setAiResult(null);
  };
  const addTag=()=>{
    const t=f.tagInput.trim().replace(/^#?/,"#");
    if(t.length>1&&!f.tags.includes(t)){
      setF(p=>({...p,tags:[...p.tags,t],tagInput:""}));
    }
  };
  const removeTag=(t)=>setF(p=>({...p,tags:p.tags.filter(x=>x!==t)}));
  const handleSave=()=>{
    if(!f.content.trim())return;
    onSave({
      id:initial?.id||uid(),
      type:f.type,content:f.content.trim(),source:f.source.trim(),
      tags:f.tags,createdAt:initial?.createdAt||new Date().toISOString().slice(0,10),
      reviewCount:initial?.reviewCount||0,lastReviewed:initial?.lastReviewed||null,
    });
  };
  return(
    <div className="fixed inset-0 bg-black/75 backdrop-blur-sm z-50 flex items-center justify-center p-4"
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="fade-in bg-card border border-border rounded-2xl w-full max-w-lg shadow-2xl max-h-[90vh] flex flex-col">
        <div className="flex items-center justify-between px-5 py-4 border-b border-border flex-shrink-0">
          <h2 className="font-semibold text-txt">{initial?"แก้ไข Note":"เพิ่ม Note ใหม่"}</h2>
          <button onClick={onClose} className="text-muted hover:text-txt w-7 h-7 flex items-center justify-center rounded hover:bg-input">✕</button>
        </div>
        <div className="p-5 space-y-4 overflow-y-auto flex-1">
          <div>
            <Label>ประเภท</Label>
            <div className="flex gap-2">
              {Object.entries(NOTE_TYPES).map(([k,v])=>(
                <button key={k} onClick={()=>setF(p=>({...p,type:k}))}
                  className={`flex-1 py-2 rounded-lg text-sm transition border flex items-center justify-center gap-1
                    ${f.type===k?"border-yellow/40 bg-yellow/10 text-yellow font-semibold":"border-border bg-input text-muted hover:text-txt"}`}>
                  {v.icon} {v.label}
                </button>
              ))}
            </div>
          </div>
          <div>
            <Label>เนื้อหา *</Label>
            <textarea value={f.content} onChange={set("content")} rows={4}
              placeholder="จด quote, กฎ, บทเรียน หรือไอเดีย..."
              className={clsInput+" resize-none"} autoFocus/>
            <div className="flex items-center gap-2 mt-2">
              {apiKey?(
                <button type="button" onClick={handleAiProcess} disabled={aiLoading||!f.content.trim()}
                  className={`${clsBtn("default","sm")} flex items-center gap-1.5 disabled:opacity-40`}>
                  {aiLoading?(
                    <><span className="w-3 h-3 border-2 border-muted border-t-yellow rounded-full animate-spin inline-block"/>กำลังประมวลผล...</>
                  ):"✨ ให้ AI ช่วย"}
                </button>
              ):(
                <span className="text-muted text-xs">ตั้งค่า API Key ใน Settings เพื่อใช้ AI</span>
              )}
            </div>
            {aiError&&<p className="text-red text-xs mt-1">{aiError}</p>}
            {aiResult&&(
              <div className="fade-in bg-yellow/5 border border-yellow/20 rounded-xl p-3 space-y-2 mt-2">
                <div className="flex items-center justify-between">
                  <span className="text-yellow text-xs font-semibold">✨ AI Suggestion</span>
                  <button onClick={()=>setAiResult(null)} className="text-muted hover:text-txt text-xs">✕</button>
                </div>
                <div className="space-y-1 text-xs">
                  <div><span className="text-muted">Type: </span>
                    <span className="text-txt font-medium">{NOTE_TYPES[aiResult.type]?.icon} {NOTE_TYPES[aiResult.type]?.label}</span>
                  </div>
                  <div><span className="text-muted">Content: </span>
                    <span className="text-txt">{aiResult.content}</span>
                  </div>
                  {aiResult.source&&<div><span className="text-muted">Source: </span>
                    <span className="text-txt">{aiResult.source}</span>
                  </div>}
                  <div className="flex gap-1 flex-wrap">
                    {(aiResult.tags||[]).map(t=>(
                      <span key={t} className="px-1.5 py-0.5 rounded bg-yellow/10 text-yellow text-[10px]">{t}</span>
                    ))}
                  </div>
                  <p className="text-muted/70 italic text-[10px]">{aiResult.reasoning}</p>
                </div>
                <div className="flex gap-2 pt-1">
                  <button onClick={()=>setAiResult(null)} className={clsBtn("default","sm")}>แก้เอง</button>
                  <button onClick={applyAiResult} className={`${clsBtn("yellow","sm")} flex-1`}>✅ ใช้เลย</button>
                </div>
              </div>
            )}
          </div>
          <div>
            <Label>แหล่งที่มา (ไม่บังคับ)</Label>
            <input value={f.source} onChange={set("source")}
              placeholder="เช่น Market Wizards, พี่โอห์ม, ประสบการณ์ตรง..."
              className={clsInput}/>
          </div>
          <div>
            <Label>Tags</Label>
            <div className="flex gap-2 mb-2 flex-wrap">
              {f.tags.map(t=>(
                <span key={t} className="flex items-center gap-1 text-xs px-2 py-0.5 rounded-full bg-yellow/10 text-yellow border border-yellow/20">
                  {t}<button onClick={()=>removeTag(t)} className="hover:text-red ml-0.5">✕</button>
                </span>
              ))}
            </div>
            <div className="flex gap-2">
              <input value={f.tagInput} onChange={set("tagInput")}
                onKeyDown={e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();addTag();}}}
                placeholder="#mindset หรือกด Enter เพื่อเพิ่ม"
                className={clsInput+" flex-1"}/>
              <button onClick={addTag} className={clsBtn("default","sm")}>+ เพิ่ม</button>
            </div>
            <div className="flex flex-wrap gap-1 mt-2">
              {["#mindset","#risk","#entry","#psychology","#rule","#classic"].map(t=>(
                !f.tags.includes(t)&&(
                  <button key={t} onClick={()=>setF(p=>({...p,tags:[...p.tags,t]}))}
                    className="text-[10px] px-2 py-0.5 rounded-full border border-border text-muted hover:text-yellow hover:border-yellow/30 transition">
                    {t}
                  </button>
                )
              ))}
            </div>
          </div>
        </div>
        <div className="flex gap-2 px-5 py-4 border-t border-border flex-shrink-0">
          <button onClick={onClose} className={clsBtn("default")}>ยกเลิก</button>
          <button onClick={handleSave} disabled={!f.content.trim()}
            className={`${clsBtn("yellow")} flex-1 disabled:opacity-30 disabled:cursor-not-allowed`}>
            💾 บันทึก
          </button>
        </div>
      </div>
    </div>
  );
}


function MarketPatternModal({pattern,onSave,onCancel}){
  const PL=["S50","Gold","Silver","USDJPY","ทุก Product"];
  const DY=["ทุกวัน","จันทร์","อังคาร","พุธ","พฤหัส","ศุกร์"];
  const isEdit=!!pattern?.id;
  const[product,setProduct]=useState(pattern?.product||"ทุก Product");
  const[day,setDay]=useState(pattern?.day||"ทุกวัน");
  const[trigger,setTrigger]=useState(pattern?.trigger||"");
  const[lesson,setLesson]=useState(pattern?.lesson||"");
  const[action,setAction]=useState(pattern?.action||"");
  const[severity,setSeverity]=useState(pattern?.severity||"warn");
  const valid=trigger.trim()&&action.trim();
  function save(){if(!valid)return;onSave({id:pattern?.id||uid(),product,day,trigger:trigger.trim(),lesson:lesson.trim(),action:action.trim(),severity,createdAt:pattern?.createdAt||new Date().toISOString()});}
  return(
    <Modal title={isEdit?"แก้ไข Pattern":"เพิ่ม Market Pattern"} onClose={onCancel} width="max-w-lg">
      <div className="p-5 space-y-4">
        <div className="grid grid-cols-2 gap-3">
          <div><Label>Product</Label><select value={product} onChange={e=>setProduct(e.target.value)} className="w-full bg-input border border-border rounded-lg px-3 py-2 text-sm text-txt mt-1">{PL.map(p=><option key={p}>{p}</option>)}</select></div>
          <div><Label>วัน</Label><select value={day} onChange={e=>setDay(e.target.value)} className="w-full bg-input border border-border rounded-lg px-3 py-2 text-sm text-txt mt-1">{DY.map(d=><option key={d}>{d}</option>)}</select></div>
        </div>
        <div><Label>Trigger *</Label><textarea value={trigger} onChange={e=>setTrigger(e.target.value)} rows={2} placeholder="เช่น: S50 gap 2 วันติดกัน" className="w-full bg-input border border-border rounded-lg px-3 py-2 text-sm text-txt mt-1 resize-none"/></div>
        <div><Label>บทเรียน</Label><textarea value={lesson} onChange={e=>setLesson(e.target.value)} rows={2} placeholder="เช่น: มักตาม heavy sell-off" className="w-full bg-input border border-border rounded-lg px-3 py-2 text-sm text-txt mt-1 resize-none"/></div>
        <div><Label>Action *</Label><textarea value={action} onChange={e=>setAction(e.target.value)} rows={2} placeholder="เช่น: ลด size 50%" className="w-full bg-input border border-border rounded-lg px-3 py-2 text-sm text-txt mt-1 resize-none"/></div>
        <div className="flex items-center gap-3"><Label>ระดับ</Label>{[["warn","⚠️"],["danger","🚨"],["info","💡"]].map(([v,l])=>(<button key={v} onClick={()=>setSeverity(v)} className={`px-3 py-1 rounded-lg text-xs font-medium transition ${severity===v?"bg-input text-yellow":"text-muted hover:text-txt"}`}>{l}</button>))}</div>
        <div className="flex gap-3 pt-1"><button onClick={onCancel} className={clsBtn("muted")+" flex-1"}>ยกเลิก</button><button onClick={save} disabled={!valid} className={clsBtn("yellow")+" flex-1 disabled:opacity-40"}>💾 บันทึก</button></div>
      </div>
    </Modal>
  );
}
function PageNotes({uid,syncNotesToCloud}){
  const[notes,setNotes]=useState(()=>{
    const saved=ls.get("tj_notes",null);
    return saved||STARTER_NOTES;
  });
  const[search,setSearch]=useState("");
  const[activeTag,setActiveTag]=useState(null);
  const[sortMode,setSortMode]=useState("newest");
  const[showForm,setShowForm]=useState(false);
  const[editNote,setEditNote]=useState(null);
  const[randomNote,setRandomNote]=useState(null);
  const[patterns,setPatterns]=useState(()=>ls.get("tj_patterns",[]));
  const[showPM,setShowPM]=useState(false);
  const[editP,setEditP]=useState(null);
  function savePat(p){const u=editP?patterns.map(x=>x.id===p.id?p:x):[p,...patterns];setPatterns(u);ls.set("tj_patterns",u);setShowPM(false);setEditP(null);}
  function delPat(id){const u=patterns.filter(x=>x.id!==id);setPatterns(u);ls.set("tj_patterns",u);}

  useEffect(()=>{
    if(notes.length>0){
      const idx=Math.floor(Math.random()*notes.length);
      setRandomNote(notes[idx]);
    }
  },[]);

  useEffect(()=>{
    ls.set("tj_notes",notes);
    if(syncNotesToCloud)syncNotesToCloud(notes,ls.get("tj_daily_notes",{}));
  },[notes]);

  const saveNote=(n)=>{
    if(editNote){
      setNotes(p=>p.map(x=>x.id===n.id?n:x));
    }else{
      setNotes(p=>[n,...p]);
    }
    setShowForm(false);setEditNote(null);
  };
  const deleteNote=(id)=>setNotes(p=>p.filter(x=>x.id!==id));
  const reviewNote=(id)=>{
    setNotes(p=>p.map(x=>x.id===id?{...x,reviewCount:(x.reviewCount||0)+1,lastReviewed:new Date().toISOString().slice(0,10)}:x));
    const remaining=notes.filter(x=>x.id!==id);
    if(remaining.length>0)setRandomNote(remaining[Math.floor(Math.random()*remaining.length)]);
    else setRandomNote(null);
  };

  const allTags=useMemo(()=>{
    const m={};
    notes.forEach(n=>(n.tags||[]).forEach(t=>{m[t]=(m[t]||0)+1;}));
    return Object.entries(m).sort((a,b)=>b[1]-a[1]);
  },[notes]);

  const filtered=useMemo(()=>{
    let r=[...notes];
    if(search)r=r.filter(n=>n.content.toLowerCase().includes(search.toLowerCase())||
      (n.source||"").toLowerCase().includes(search.toLowerCase())||
      (n.tags||[]).some(t=>t.includes(search.toLowerCase())));
    if(activeTag)r=r.filter(n=>(n.tags||[]).includes(activeTag));
    if(sortMode==="newest")r.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
    if(sortMode==="leastReviewed")r.sort((a,b)=>(a.reviewCount||0)-(b.reviewCount||0));
    return r;
  },[notes,search,activeTag,sortMode]);

  return(
    <div className="space-y-4">
      {randomNote&&(
        <div className="bg-card border border-border rounded-xl p-5">
          <div className="flex items-center justify-between mb-3">
            <h3 className="font-semibold text-sm">🎲 Random Review</h3>
            <button onClick={()=>{const r=notes.filter(x=>x.id!==randomNote.id);setRandomNote(r[Math.floor(Math.random()*r.length)]||null);}}
              className="text-xs text-muted hover:text-txt px-2 py-1 rounded hover:bg-input transition">⏭ ข้าม</button>
          </div>
          <div className="bg-input/40 rounded-xl p-4 space-y-2">
            <div className="flex items-start gap-2">
              <span className="text-xl flex-shrink-0">{NOTE_TYPES[randomNote.type]?.icon||"📝"}</span>
              <p className="text-txt text-sm leading-relaxed flex-1">"{randomNote.content}"</p>
            </div>
            {randomNote.source&&<p className="text-muted text-xs ml-7">— {randomNote.source}</p>}
            <div className="flex items-center justify-between ml-7 mt-1">
              <div className="flex gap-1 flex-wrap">
                {(randomNote.tags||[]).map(t=>(
                  <span key={t} className="text-[10px] px-1.5 py-0.5 rounded bg-yellow/10 text-yellow">{t}</span>
                ))}
              </div>
              <button onClick={()=>reviewNote(randomNote.id)}
                className={clsBtn("green","sm")+" text-xs"}>👍 จำแล้ว</button>
            </div>
            <p className="text-muted text-[10px] ml-7">อ่านแล้ว {randomNote.reviewCount||0} ครั้ง</p>
          </div>
        </div>
      )}

      <div className="bg-card border border-border rounded-xl p-4 space-y-3">
        <div className="flex gap-2 flex-wrap items-center">
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="🔍 ค้นหา note, tag, แหล่งที่มา..."
            className={clsInput+" flex-1 min-w-[200px]"}/>
          <div className="flex rounded-lg overflow-hidden border border-border text-xs">
            <button onClick={()=>setSortMode("newest")}
              className={`px-3 py-1.5 transition ${sortMode==="newest"?"bg-yellow text-black font-semibold":"text-muted hover:text-txt hover:bg-input"}`}>
              ล่าสุด
            </button>
            <button onClick={()=>setSortMode("leastReviewed")}
              className={`px-3 py-1.5 transition ${sortMode==="leastReviewed"?"bg-yellow text-black font-semibold":"text-muted hover:text-txt hover:bg-input"}`}>
              ยังไม่ได้อ่าน
            </button>
          </div>
          <button onClick={()=>{setEditNote(null);setShowForm(true);}}
            className={clsBtn("yellow","sm")}>+ เพิ่ม</button>
        </div>
        {allTags.length>0&&(
          <div className="flex flex-wrap gap-1.5">
            <button onClick={()=>setActiveTag(null)}
              className={`px-2 py-0.5 rounded-full text-xs transition border ${!activeTag?"bg-yellow/10 border-yellow/30 text-yellow":"border-border text-muted hover:text-txt"}`}>
              ทั้งหมด ({notes.length})
            </button>
            {allTags.map(([tag,count])=>(
              <button key={tag} onClick={()=>setActiveTag(activeTag===tag?null:tag)}
                className={`px-2 py-0.5 rounded-full text-xs transition border ${activeTag===tag?"bg-yellow/10 border-yellow/30 text-yellow":"border-border text-muted hover:text-txt"}`}>
                {tag} ({count})
              </button>
            ))}
          </div>
        )}
      </div>

      {filtered.length===0?(
        <div className="bg-card border border-border rounded-xl p-10 text-center text-muted text-sm">
          {search||activeTag?"ไม่พบ note ที่ตรงกับ filter":"ยังไม่มี note — กด + เพิ่ม เพื่อเริ่มต้น"}
        </div>
      ):(
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
          {filtered.map(n=>(
            <div key={n.id} className="bg-card border border-border rounded-xl p-4 flex flex-col gap-2 hover:border-yellow/20 transition group">
              <div className="flex items-start justify-between gap-2">
                <div className="flex items-center gap-1.5">
                  <span className="text-base">{NOTE_TYPES[n.type]?.icon||"📝"}</span>
                  <span className="text-[10px] font-medium px-1.5 py-0.5 rounded"
                    style={{background:NOTE_COLORS[n.type]+"22",color:NOTE_COLORS[n.type]}}>
                    {NOTE_TYPES[n.type]?.label}
                  </span>
                </div>
                <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition">
                  <button onClick={()=>{setEditNote(n);setShowForm(true);}}
                    className="text-muted hover:text-yellow text-xs px-1.5 py-1 rounded hover:bg-input">✏️</button>
                  <button onClick={()=>deleteNote(n.id)}
                    className="text-muted hover:text-red text-xs px-1.5 py-1 rounded hover:bg-input">🗑</button>
                </div>
              </div>
              <p className="text-sm text-txt leading-relaxed flex-1">"{n.content}"</p>
              {n.source&&<p className="text-muted text-xs">— {n.source}</p>}
              <div className="flex items-center justify-between mt-auto pt-1">
                <div className="flex gap-1 flex-wrap">
                  {(n.tags||[]).map(t=>(
                    <button key={t} onClick={()=>setActiveTag(activeTag===t?null:t)}
                      className="text-[10px] px-1.5 py-0.5 rounded bg-input hover:bg-yellow/10 text-muted hover:text-yellow transition">
                      {t}
                    </button>
                  ))}
                </div>
                <div className="flex items-center gap-2">
                  <span className="text-[10px] text-muted/60">👁 {n.reviewCount||0}</span>
                  <button onClick={()=>reviewNote(n.id)}
                    className="text-[10px] text-muted hover:text-green transition px-1.5 py-0.5 rounded hover:bg-green/10">
                    +review
                  </button>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      {showForm&&(
        <NoteFormModal
          initial={editNote}
          onSave={saveNote}
          onClose={()=>{setShowForm(false);setEditNote(null);}}
          allTags={allTags.map(([t])=>t)}/>
      )}
      <div className="bg-card border border-border rounded-2xl p-5">
        <div className="flex items-center justify-between mb-4">
          <div><h2 className="font-semibold text-txt">🧠 Market Pattern Library</h2><p className="text-muted text-xs mt-0.5">Pattern ที่เคยเกิด — เตือนอัตโนมัติ</p></div>
          <button onClick={()=>{setEditP(null);setShowPM(true);}} className="px-3 py-1.5 rounded-lg bg-yellow text-[#0B0E11] text-xs font-bold hover:brightness-110 transition">+ เพิ่ม</button>
        </div>
        {patterns.length===0
          ?<div className="text-center py-8 text-muted text-sm"><div className="text-3xl mb-2">🧠</div><p>ยังไม่มี pattern</p></div>
          :<div className="space-y-2">{patterns.map(pat=>{
            const sc={warn:"border-yellow/20 bg-yellow/5",danger:"border-red/20 bg-red/5",info:"border-green/20 bg-green/5"};
            const si={warn:"⚠️",danger:"🚨",info:"💡"};
            return(
              <div key={pat.id} className={`border rounded-xl p-3 ${sc[pat.severity]||"border-border"}`}>
                <div className="flex items-start justify-between gap-2">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-1.5 flex-wrap mb-1">
                      <span className="text-[10px] font-bold px-1.5 py-0.5 rounded bg-input text-muted">{pat.product}</span>
                      {pat.day!=="ทุกวัน"&&<span className="text-[10px] px-1.5 py-0.5 rounded bg-input text-muted">{pat.day}</span>}
                      <span className="text-[10px]">{si[pat.severity]}</span>
                    </div>
                    <p className="text-xs font-medium text-txt">{pat.trigger}</p>
                    {pat.lesson&&<p className="text-[11px] text-muted mt-0.5">{pat.lesson}</p>}
                    <p className="text-[11px] text-yellow mt-1">→ {pat.action}</p>
                  </div>
                  <div className="flex gap-1 flex-shrink-0">
                    <button onClick={()=>{setEditP(pat);setShowPM(true);}} className="text-muted hover:text-txt text-xs p-1">✏️</button>
                    <button onClick={()=>delPat(pat.id)} className="text-muted/40 hover:text-red text-xs p-1">🗑</button>
                  </div>
                </div>
              </div>
            );
          })}</div>}
        {showPM&&<MarketPatternModal pattern={editP} onSave={savePat} onCancel={()=>{setShowPM(false);setEditP(null);}}/>}
      </div>
    </div>
  );
}
